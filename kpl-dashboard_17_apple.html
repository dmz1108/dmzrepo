function rankingOptionalNumber(value) {
  if (value == null || value === '') return null;
  const number = Number(value);
  return Number.isFinite(number) ? number : null;
}

function rankingRowsToBoards(rankingList) {
  return (rankingList || []).map(row => ({
    plateId: row[0],
    name: row[1],
    memberCount: row[2],
    gainPct: parseFloat(row[3]),
    turnover: row[4],
    amount: row[5],
    netInflow: parseFloat(row[6]),
    superLargeNetInflow: rankingOptionalNumber(row[7]),
    superLargeNetInflowRatio: rankingOptionalNumber(row[8]),
    largeNetInflow: rankingOptionalNumber(row[9]),
    largeNetInflowRatio: rankingOptionalNumber(row[10]),
  }));
}

function boardPassesGainFloor(board, zsType = state.zsType) {
  const gain = Number(board?.gainPct);
  if (Number.isFinite(gain)) return gain >= MIN_BOARD_GAIN_PCT;
  return isThsType(zsType);
}

async function refillDeletedBoardSlot(seq) {
  if (state.boards.length >= BOARD_COUNT) return;
  const hiddenBoards = getHiddenBoards(state.zsType);
  const existingIds = new Set(state.boards.map(board => String(board.plateId)));
  setCacheStatus('缓存: 补位中');

  for (let step = 1; seq === state.loadSeq; step += 1) {
    const rankingData = await fetchBoardRanking(state.zsType, getBoardFetchCount(step)).catch(e => ({ _err: e.message }));
    if (seq !== state.loadSeq) return;
    const rankingList = rankingData && !rankingData._err ? (rankingData?.List || rankingData?.list || rankingData?.data || []) : [];
    if (!rankingList.length) break;
    const rankingAll = rankingRowsToBoards(rankingList);
    rememberBoardNames(rankingAll, state.zsType);

    const lastLoadedGain = rankingAll.length ? Number(rankingAll[rankingAll.length - 1].gainPct) : null;
    const candidates = rankingAll
      .filter(board => !hiddenBoards.has(String(board.plateId)))
      .filter(board => !existingIds.has(String(board.plateId)))
      .filter(board => boardPassesGainFloor(board, state.zsType));

    for (const candidate of candidates) {
      if (seq !== state.loadSeq || state.boards.length >= BOARD_COUNT) return;
      const hydrated = await hydrateBoardZtCount(candidate).catch(() => null);
      if (!hydrated || Number(hydrated.ztCount) < MIN_BOARD_ZT_COUNT) continue;
      existingIds.add(String(hydrated.plateId));
      state.boards = [...state.boards, hydrated];
      appendBoardSkeleton(hydrated);
      updateBoardHeader(hydrated);
      writePreviewCache();
      document.getElementById('update-meta').textContent = `更新: ${formatTime(new Date())}`;
      setCacheStatus('缓存: 已补位');
      return;
    }

    if ((Number.isFinite(lastLoadedGain) && lastLoadedGain < MIN_BOARD_GAIN_PCT) || rankingList.length < getBoardFetchCount(step)) {
      break;
    }
  }

  setCacheStatus('缓存: 无可补位');
}

async function deleteBoardCard(btn) {
  if (!canManageDashboardCards()) {
    showError('普通用户只有查看权限，不能删除卡片');
    return;
  }
  const plateId = btn?.dataset?.plateId;
  const boardName = btn?.dataset?.boardName || plateId;
  if (!plateId) return;
  if (!confirm(`删除「${boardName}」这张卡片？`)) return;

  const board = state.boards.find(b => String(b.plateId) === String(plateId)) || { plateId, name: boardName };
  const seq = ++state.loadSeq;
  state.expandedCards.delete(String(plateId));
  saveHiddenBoard(board);
  delete state.cardData[plateId];
  state.boards = state.boards.filter(b => String(b.plateId) !== String(plateId));
  const card = document.getElementById(`card-${plateId}`);
  if (card) card.remove();
  writePreviewCache();
  renderDeletedBoardsPanel();
  if (state.usingSnapshot || state.date !== chinaToday()) {
    if (!state.boards.length) renderBoardSkeletons([]);
    renderBoardPicker();
    return;
  }
  try {
    await refillDeletedBoardSlot(seq);
  } catch (err) {
    showError(err.message || String(err));
  }
  if (!state.boards.length) renderBoardSkeletons([]);
  renderBoardPicker();
}

async function permanentlyDeleteBoard(btn) {
  if (!canManageDashboardCards()) {
    showError('普通用户只有查看权限，不能永久删除卡片');
    return;
  }
  const plateId = btn?.dataset?.plateId;
  const boardName = btn?.dataset?.boardName || plateId;
  const zsType = btn?.dataset?.zsType || state.zsType;
  if (!plateId) return;
  if (!confirm(`永久删除「${boardName}」？以后它不会再出现在卡片页面里。`)) return;

  const meta = savePermanentHiddenBoard({ plateId, name: boardName }, zsType);
  removeBoardFromPreviewCache(plateId, zsType);
  state.expandedCards.delete(String(plateId));
  delete state.cardData[plateId];
  if (String(zsType) === String(state.zsType)) {
    state.boards = state.boards.filter(board => String(board.plateId) !== String(plateId));
  }
  removeDeletedBoardMeta(plateId, zsType);
  try {
    await syncPermanentHiddenBoard(meta, zsType);
  } catch (err) {
    showError(`已在本机页面永久删除，但后台黑名单同步失败：${err.message}`);
  }
  renderDeletedBoardsPanel();
  if (String(zsType) === String(state.zsType)) refreshAll();
}

async function refreshMissingDeletedBoardNames(rows) {
  const groups = new Map();
  for (const row of rows || []) {
    const zsType = String(row?.zsType || state.zsType);
    if (!row?.plateId || resolveBoardName(row.plateId, zsType)) continue;
    if (!groups.has(zsType)) groups.set(zsType, new Set());
    groups.get(zsType).add(String(row.plateId));
  }
  for (const [zsType, ids] of groups.entries()) {
    const missing = [...ids];
    if (!missing.length) continue;
    const lookupKey = `${zsType}:${missing.sort().join(',')}`;
    const lastTriedAt = Number(boardNameLookupTriedAt.get(lookupKey) || 0);
    if (boardNameLookupInFlight.has(lookupKey) || Date.now() - lastTriedAt < 15000) continue;

    boardNameLookupInFlight.add(lookupKey);
    boardNameLookupTriedAt.set(lookupKey, Date.now());
    try {
      const names = await fetchBoardNames(missing, zsType);
      rememberBoardNames(Object.entries(names).map(([plateId, name]) => ({ plateId, name })), zsType);
      renderDeletedBoardsPanel();
    } catch {
      // 名称补全失败不影响删除列表操作
    } finally {
      boardNameLookupInFlight.delete(lookupKey);
    }
  }
}

function gainClass(v) {
  if (v == null || isNaN(v)) return 'flat';
  if (v > 0) return 'up';
  if (v < 0) return 'down';
  return 'flat';
}
function fmtPct(v, withSign = true) {
  if (v == null || isNaN(v)) return '--';
  const n = Number(v);
  const sign = n < 0 ? '-' : (n > 0 && withSign ? '+' : '');
  const mag = Math.abs(n).toFixed(2) + '%';
  return `<span class="v-sign">${sign}</span><span class="v-mag">${mag}</span>`;
}
function fmtYi(v) {
  if (v == null || isNaN(v)) return '--';
  return (Number(v) >= 0 ? '+' : '') + (Number(v) / 1e8).toFixed(2) + ' 亿';
}
function fmtYiHTML(v) {
  if (v == null || isNaN(v)) return '--';
  const n = Number(v);
  const sign = n >= 0 ? '+' : '-';
  const mag = (Math.abs(n) / 1e8).toFixed(2);
  return `<span class="v-sign">${sign}</span><span class="v-mag">${mag}<span class="yi-unit">亿</span></span>`;
}

// 涨停判断（参考文档 §7）
function ztLabel(code, gainPct) {
  const c = String(code);
  // ST 判断需股票名称,这里只用代码大致判断板块
  if (c.startsWith('30') || c.startsWith('68')) return { tag: '20cm', threshold: 19.5 };
  if (c.startsWith('8') || c.startsWith('4')) return { tag: '30cm', threshold: 29.0 };
  return { tag: '10cm', threshold: 9.8 };
}
function isZT(code, name, gainPct) {
  const isSt = name && name.toUpperCase().includes('ST');
  if (isSt) return gainPct >= 4.8;
  const { threshold } = ztLabel(code, gainPct);
  return gainPct >= threshold;
}
function isLimitUpRow(stock) {
  if (isExternalConceptType()) return Number(stock?.ztState) === 1;
  return !isNaN(stock?.gain) && isZT(stock.code, stock.name, stock.gain);
}

function afterCloseItems(status, { includeSnapshots = true } = {}) {
  const items = Array.isArray(status?.items) ? status.items : [];
  return includeSnapshots ? items : items.filter(item => !String(item?.key || '').startsWith('snapshot-'));
}

function afterCloseItemStateText(item, status) {
  if (item?.skipped || isMarketClosedStatus(status)) return '无需同步';
  if (item?.ok) return 'OK';
  if (!status?.isAfterClose && item?.key !== 'mainReasonDb') return '待收盘';
  if (item?.pending) return '待9点';
  return '缺';
}

function afterCloseStatusSummary(status, prefix) {
  if (!status) return `${prefix}: 检查中`;
  if (isMarketClosedStatus(status)) return `${prefix}${formatStatusDay(status.day)}: ${marketClosedStatusLabel(status)}`;
  if (!status.isAfterClose) return `${prefix}${formatStatusDay(status.day)}: 待收盘`;
  const items = afterCloseItems(status);
  if (!items.length) return `${prefix}${formatStatusDay(status.day)}: 无数据`;
  const missing = items.filter(item => !item.ok);
  if (!missing.length) {
    const sourceSummary = reviewHealthSourceSummary(status);
    return sourceSummary.missing.length
      ? `${prefix}${formatStatusDay(status.day)}: 源${sourceSummary.ready}/${sourceSummary.total}`
      : `${prefix}${formatStatusDay(status.day)}: OK`;
  }
  const pending = missing.filter(item => item.pending);
  if (pending.length && pending.length === missing.length) return `${prefix}${formatStatusDay(status.day)}: 待9点`;
  return `${prefix}${formatStatusDay(status.day)}: ${items.length - missing.length}/${items.length}`;
}

function afterCloseStatusDetail(status, prefix) {
  if (!status) return `${prefix}: 检查中`;
  const items = afterCloseItems(status);
  if (isMarketClosedStatus(status)) {
    return `${prefix} ${status.day}\n${status.marketClosedNote || `${marketClosedStatusLabel(status)}，盘后数据无需同步`}`;
  }
  if (!status.isAfterClose) {
    return `${prefix} ${status.day}\n未收盘，盘后数据会在15:00后生成`;
  }
  const detail = items.map(item => {
    const countText = Number.isFinite(Number(item.total)) && item.total
      ? `${item.count || 0}/${item.total}`
      : `${item.count || 0}`;
    const sourceText = item.key === 'closeDb' && item.source
      ? ` · 来源: ${formatAfterCloseSource(item.source)}`
      : '';
    const noteText = item.key === 'mainReasonDb' ? '' : (item.note ? ` · ${item.note}` : (item.pending && item.readyAt ? ` · 等待 ${item.readyAt}` : ''));
    const labelDay = item.key === 'mainReasonDb' ? (item.day || status.mainReasonDay || status.day) : status.day;
    const label = item.key === 'mainReasonDb' ? `${formatStatusDay(labelDay)}主因库` : item.label;
    return `${label}: ${afterCloseItemStateText(item, status)}${countText ? ` ${countText}` : ''}${sourceText}${noteText}`;
  }).join('\n');
  return `${prefix} ${status.day}\n${detail || '暂无状态'}`;
}

function renderAfterCloseStatus(status) {
  if (!status) {
    statusPillState.afterCloseState = 'pending';
    statusPillState.afterCloseLabel = '检查中';
    statusPillState.afterCloseTitle = '盘后数据状态';
    statusPillState.afterCloseCloseSourceLabel = '';
    renderStatusPill();
    return;
  }
  const items = (Array.isArray(status.items) ? status.items : [])
    .filter(item => !String(item?.key || '').startsWith('snapshot-'));
  const closeDbItem = items.find(item => item?.key === 'closeDb');
  statusPillState.afterCloseCloseSourceLabel = formatAfterCloseSource(closeDbItem?.source);
  const missing = items.filter(item => !item.ok);
  const pending = missing.filter(item => item.pending);
  const onlyMainReasonMissing = missing.length === 1 && missing[0]?.key === 'mainReasonDb';
  const allVisibleOk = items.length > 0 && missing.length === 0;
  if (!status.isAfterClose) {
    statusPillState.afterCloseState = 'pending';
    statusPillState.afterCloseLabel = '未收盘';
  } else if (allVisibleOk) {
    statusPillState.afterCloseState = 'ok';
    statusPillState.afterCloseLabel = 'OK';
  } else if (onlyMainReasonMissing) {
    const item = missing[0];
    const mainReasonDay = item.day || status.mainReasonDay || status.day;
    statusPillState.afterCloseState = item.pending ? 'pending' : 'missing';
    statusPillState.afterCloseLabel = `${formatStatusDay(mainReasonDay)}主因库：${item.pending ? '待9点' : '缺'}`;
  } else if (pending.length && pending.length === missing.length) {
    statusPillState.afterCloseState = 'pending';
    statusPillState.afterCloseLabel = '待9点';
  } else {
    statusPillState.afterCloseState = 'missing';
    statusPillState.afterCloseLabel = `${items.length - missing.length}/${items.length}`;
  }
  const detail = items.map(item => {
    const countText = Number.isFinite(Number(item.total)) && item.total
      ? `${item.count || 0}/${item.total}`
      : `${item.count || 0}`;
    const sourceText = item.key === 'closeDb' && item.source
      ? ` · 来源: ${formatAfterCloseSource(item.source)}`
      : '';
    const noteText = item.note ? ` · ${item.note}` : (item.pending && item.readyAt ? ` · 等待 ${item.readyAt}` : '');
    const mainReasonDay = item.day || status.mainReasonDay || status.day;
    const label = item.key === 'mainReasonDb' ? `${formatStatusDay(mainReasonDay)}主因库` : item.label;
    const stateText = item.ok ? 'OK' : (item.pending ? '待9点' : '缺');
    return `${label}：${stateText}${countText ? ` ${countText}` : ''}${sourceText}${noteText}`;
  }).join('\n');
  statusPillState.afterCloseTitle = `${status.day} 盘后数据\n${detail || '暂无状态'}`;
  renderStatusPill();
}

async function refreshAfterCloseStatus() {
  try {
    const todayStatus = await fetchAfterCloseStatus(chinaToday(), { mainReasonMode: 'same-day' });
    const baseStatus = await fetchAfterCloseStatus(chinaToday());
    const previousDay = baseStatus?.mainReasonDay || state.date;
    const previousStatus = await fetchAfterCloseStatus(previousDay, { mainReasonMode: 'same-day' });
    statusPillState.previousAfterCloseStatus = previousStatus;
    statusPillState.todayAfterCloseStatus = todayStatus;
    statusPillState.healthUpdatedAt = formatTime(new Date());
    const previousItems = afterCloseItems(previousStatus);
    const todayItems = afterCloseItems(todayStatus);
    const previousMissing = previousStatus?.isAfterClose ? previousItems.filter(item => !item.ok) : [];
    const todayMissing = todayStatus?.isAfterClose ? todayItems.filter(item => !item.ok) : [];
    const closeDbItem = previousItems.find(item => item?.key === 'closeDb') || todayItems.find(item => item?.key === 'closeDb');
    statusPillState.afterCloseCloseSourceLabel = formatAfterCloseSource(closeDbItem?.source);
    statusPillState.afterCloseLabel = `${afterCloseStatusSummary(previousStatus, '昨日')} · ${afterCloseStatusSummary(todayStatus, '今日')}`;
    statusPillState.afterCloseTitle = `${afterCloseStatusDetail(previousStatus, '昨日状态')}\n\n${afterCloseStatusDetail(todayStatus, '今日状态')}`;
    if (previousMissing.length) {
      statusPillState.afterCloseState = 'missing';
    } else if (todayMissing.length) {
      statusPillState.afterCloseState = 'missing';
    } else if (!todayStatus?.isAfterClose) {
      statusPillState.afterCloseState = 'pending';
    } else {
      statusPillState.afterCloseState = 'ok';
    }
    renderStatusPill();
    renderDataHealthPanel();
    fetchLimitupMainReasonDay(previousDay)
      .then(data => {
        statusPillState.healthMainReason = data;
        statusPillState.healthUpdatedAt = formatTime(new Date());
        renderDataHealthPanel();
      })
      .catch(err => {
        statusPillState.healthMainReason = { ok: false, error: err.message || String(err) };
        statusPillState.healthUpdatedAt = formatTime(new Date());
        renderDataHealthPanel();
      });
  } catch (err) {
    statusPillState.afterCloseState = 'missing';
    statusPillState.afterCloseLabel = '异常';
    statusPillState.afterCloseTitle = err.message;
    statusPillState.afterCloseCloseSourceLabel = '';
    renderStatusPill();
    renderDataHealthPanel();
  }
}

  try {

function startJiuyangongsheAuthPolling() {
  if (jiuyangongsheAuthPollTimer) clearInterval(jiuyangongsheAuthPollTimer);
  let attempts = 0;
  const poll = async () => {
    attempts += 1;
    try {
      const res = await fetch(`${KPL_STATS_BASE}/api/jiuyangongshe-auth/auto-status?day=${encodeURIComponent(state.date)}&_=${Date.now()}`, {
        cache: 'no-store',
        headers: adminHeaders(),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `授权状态读取失败 ${res.status}`);
      if (data.authStatus) renderJiuyangongsheAuthStatus(data.authStatus);
      else renderJiuyangongsheAuthStatus(data);
      if (data.ok || data.status === 'saved') {
        clearInterval(jiuyangongsheAuthPollTimer);
        jiuyangongsheAuthPollTimer = null;
        refreshJiuyangongsheAuthStatus();
      } else if (attempts >= 180) {
        clearInterval(jiuyangongsheAuthPollTimer);
        jiuyangongsheAuthPollTimer = null;
        statusPillState.jygLabel = '未完成';
        statusPillState.jygState = 'missing';
        statusPillState.jygTitle = '韭研公社授权超时，请重新点击状态栏授权';
        renderStatusPill();
      }
    } catch (err) {
      clearInterval(jiuyangongsheAuthPollTimer);
      jiuyangongsheAuthPollTimer = null;
      statusPillState.jygLabel = '异常';
      statusPillState.jygState = 'error';
      statusPillState.jygTitle = err.message;
      renderStatusPill();
      showError(err.message || String(err));
    }
  };
  poll();
  jiuyangongsheAuthPollTimer = setInterval(poll, 2000);
}

function formatReviewDateTime(value) {
  if (!value) return '--';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleString('zh-CN', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false,
  });
}

function formatLimitTime(value) {
  const raw = String(value ?? '').replace(/\D/g, '');
  if (!raw) return '--';
  const s = raw.padStart(6, '0').slice(-6);
  return `${s.slice(0, 2)}:${s.slice(2, 4)}:${s.slice(4, 6)}`;
}

function formatReviewConfidence(value) {
  const n = Number(value);
  if (!Number.isFinite(n) || n <= 0) return '--';
  return `${Math.round(n * 100)}%`;
}

function formatReviewSource(source, headline = '') {
  const raw = String(source || '').trim();
  const title = String(headline || '');
  if (title.includes('湖南人涨停复盘')) return 'TGB';
  if (!raw) return '--';
  if (raw.includes('tgb-hunan-ocr')) return 'TGB';
  if (raw.includes('tgb-hunan')) return 'TGB';
  if (raw.includes('tgb')) return 'TGB';
  if (raw.includes('xuangubao') || raw.includes('xuangutong')) return '选股宝';
  if (raw.includes('kaipanla') || raw.includes('fupanla')) return '复盘啦';
  if (raw.includes('jiuyangongshe')) return '韭研公社';
  if (raw.includes('ths-limitup-structured') || raw.includes('ths-limitup-focus')) return '同花顺涨停池';
  if (raw.includes('review-auto-consensus')) return '复盘多源共识';
  if (raw.includes('multi-source-consensus')) return '多源共识';
  if (raw.includes('kpl')) return 'KPL';
  if (raw.includes('limit-up-db')) return '涨停库';
  return raw;
}

function reviewSourceHeadline(source, headline) {
  const src = String(source || '');
  const text = String(headline || '').trim();
  if (!text) return '';
  if (src.includes('tgb-hunan') || text.includes('湖南人涨停复盘')) return '';
  return text;
}

function renderLimitupReview(data) {
  const root = document.getElementById('limitup-review-root');
  if (!root) return;
  const day = data?.day || state.date;
  const normalizedData = Array.isArray(data?.tabs)
    ? data
    : {
        ...data,
        tabs: [{
          key: 'final',
          label: '综合归纳',
          sourceLabel: '综合归纳',
          count: Array.isArray(data?.stocks) ? data.stocks.length : 0,
          topics: Array.isArray(data?.topics) ? data.topics : [],
          rows: Array.isArray(data?.stocks) ? data.stocks : [],
        }],
      };
  const tabs = Array.isArray(normalizedData?.tabs) ? normalizedData.tabs : [];
  if (!normalizedData?.ok || !tabs.length) {
    root.innerHTML = `<div class="review-empty">${escapeHTML(formatStatusDay(day))} 暂无涨停主因库</div>`;
    return;
  }
  const activeTab = tabs.find(tab => String(tab.key || '') === String(state.reviewSourceTab || 'final')) || tabs[0];
  if (state.reviewSourceTab !== activeTab.key) state.reviewSourceTab = activeTab.key || 'final';
  const stocks = Array.isArray(activeTab?.rows) ? activeTab.rows : [];
  const topics = Array.isArray(activeTab?.topics) ? activeTab.topics : [];
  const activeSourceStats = (Array.isArray(normalizedData?.sourceStats) ? normalizedData.sourceStats : [])
    .filter(stat => Number(stat?.stockCount || stat?.rowCount || 0) > 0);
  const sourceCountFromStats = activeSourceStats.length;
  const sourceCountFromTabs = tabs
    .filter(tab => String(tab.key || '') !== 'final' && Number(tab.count || (Array.isArray(tab.rows) ? tab.rows.length : 0)) > 0)
    .length;
  const reviewSourceCount = sourceCountFromStats || sourceCountFromTabs;
  // 单股折叠:只数=1的主因(各占一票)折成一张"散票"卡,减少碎卡;点开仍逐股显示各自真主因。
  const singleTopicSet = new Set(topics.filter(t => Number(t.count || 0) === 1).map(t => String(t.topic || '')));
  const foldSingles = singleTopicSet.size >= 2;
  const topicRank = new Map(topics.map((item, index) => [String(item.topic || ''), index]));
  const selectedTopic = state.reviewSelectedTopic && (String(state.reviewSelectedTopic) === '__singles__' || topics.some(item => String(item.topic || '') === String(state.reviewSelectedTopic)))
    ? String(state.reviewSelectedTopic)
    : '';
  if (state.reviewSelectedTopic !== selectedTopic) state.reviewSelectedTopic = selectedTopic;
  const searchTerm = String(state.reviewSearchTerm || '').trim();
  const normalizedSearch = searchTerm.toLowerCase();
  // 先按主因分组算 10日QI/30日QI（近10日主次数 ∩ 近10/30日涨幅 均居前）+ 连板龙；分组与排序无关，可先算
  const topicGroups = new Map();
  for (const s of stocks) {
    const tp = String(s.boardTopic || s.primaryRawTopic || s.primaryTopic || s.primaryReasonName || '未归类');
    if (!topicGroups.has(tp)) topicGroups.set(tp, []);
    topicGroups.get(tp).push(s);
  }
  const leaderByTopic = new Map();

// ===== 详情卡手动拖动定位（位置记 localStorage，跨重渲染保留；双击手柄复位）=====
let _reviewDragBound = false;
function reviewDetailOffset() {
  try { const o = JSON.parse(localStorage.getItem('review_detail_offset') || ''); return (o && typeof o.x === 'number') ? o : { x: 0, y: 0 }; }
  catch { return { x: 0, y: 0 }; }
}
function applyReviewDetailOffset() {
  const c = document.getElementById('review-stock-detail');
  if (!c) return;
  const o = reviewDetailOffset();
  c.style.transform = (o.x || o.y) ? `translate(${o.x}px, ${o.y}px)` : '';
}
function ensureReviewDetailDrag() {
  applyReviewDetailOffset();
  if (_reviewDragBound) return;
  _reviewDragBound = true;
  document.addEventListener('mousedown', (e) => {
    const grip = e.target.closest && e.target.closest('.review-detail-drag');
    if (!grip) return;
    const c = document.getElementById('review-stock-detail');
    if (!c) return;
    e.preventDefault();
    const start = reviewDetailOffset();
    const sx = e.clientX, sy = e.clientY;
    let pending = start;
    grip.classList.add('dragging');
    const move = (ev) => {
      pending = { x: start.x + (ev.clientX - sx), y: start.y + (ev.clientY - sy) };
      c.style.transform = `translate(${pending.x}px, ${pending.y}px)`;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      grip.classList.remove('dragging');
      try { localStorage.setItem('review_detail_offset', JSON.stringify(pending)); } catch {}
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  document.addEventListener('dblclick', (e) => {
    if (!(e.target.closest && e.target.closest('.review-detail-drag'))) return;
    try { localStorage.removeItem('review_detail_offset'); } catch {}
    applyReviewDetailOffset();
  });
}

function renderStrategyL2History(data) {
  if (!canUseL2AdminTools()) return '';
  const allJobs = Array.isArray(data?.jobs) ? data.jobs : [];
  const byPlate = new Map();
  for (const job of allJobs) {
    const key = `${job?.zsType ?? ''}:${String(job?.plateId || '')}`;
    if (!String(job?.plateId || '')) continue;
    const useful = Array.isArray(job?.results) && job.results.length > 0;
    const current = byPlate.get(key);
    if (!current || (!current.useful && useful)) byPlate.set(key, { job, useful });
  }
  const jobs = [...byPlate.values()].map(row => row.job)
    .sort((a, b) => String(b?.createdAt || '').localeCompare(String(a?.createdAt || '')));
  if (!jobs.length) return '';
  const cards = jobs.map(job => {
    const picked = Array.isArray(job?.picked) ? job.picked : [];
    const resultCount = Array.isArray(job?.results) ? job.results.length : 0;
    const trigger = job?.trigger === 'strategy-auto' ? '自动' : (job?.trigger === 'manual' ? '手动' : '扫描');
    const status = String(job?.status || '');
    const statusText = status === 'done' ? '完成' : (status === 'running' ? '计算中' : (status === 'queued' ? '排队中' : '失败'));
    const rows = picked.slice(0, 6).map(row => {
      const gain = Number(row?.gainPct);
      const gainClass = !Number.isFinite(gain) ? 'flat' : (gain >= 0 ? 'up' : 'down');
      return `<span class="ml-l2-pick" title="${escapeHTML(`${row?.code || ''} · 主动比${row?.activeRatio ?? '--'} · 被动比${row?.passiveRatio ?? '--'}`)}">
        <b>${escapeHTML(String(row?.name || row?.code || ''))}</b>
        <i class="${gainClass}">${Number.isFinite(gain) ? `${gain >= 0 ? '+' : ''}${gain.toFixed(2)}%` : '--'}</i>
        <em>主${row?.activeRatio ?? '--'} · 被${row?.passiveRatio ?? '--'}</em>
      </span>`;
    }).join('');
    const remaining = Math.max(0, picked.length - 6);
    const empty = status === 'done' && resultCount > 0 && !picked.length
      ? '<div class="ml-l2-empty">扫描完成，没有达到当前筛选阈值的股票。</div>'
      : (status === 'done' && !resultCount ? '<div class="ml-l2-empty">任务未取得可用成分股结果。</div>' : '');

      </div>
      <div class="ml-l2-job-meta">
        <span><i>扫描</i><b>${Number(job?.scanned || 0)}/${Number(job?.total || 0)}</b></span>
        <span><i>结果</i><b>${resultCount}</b></span>
        <span><i>入选</i><b>${picked.length}</b></span>
      </div>
      ${rows ? `<div class="ml-l2-pick-list">${rows}${remaining ? `<span class="ml-l2-more">+${remaining}</span>` : ''}</div>` : empty}
    </article>`;
  }).join('');
  return `<section class="strategy-section ml-l2-history">

function strategyPlainMoney(value) {
  if (value === null || value === undefined || value === '') return '';
  const n = Number(value);
  if (!Number.isFinite(n)) return '';
  const abs = Math.abs(n);
  if (abs >= 1e8) return `${n < 0 ? '-' : ''}${(abs / 1e8).toFixed(1)}亿`;
  if (abs >= 1e4) return `${n < 0 ? '-' : ''}${Math.round(abs / 1e4)}万`;
  return String(Math.round(n));
}
function strategySealAmountText(value) {

    const l2Detail = m.l2ScanDetail || {};

    const trendParts = [];

async function confirmMainlineTheme(key, theme) {
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/strategy-mainline-confirm?day=${encodeURIComponent(state.date)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...adminHeaders() },
      body: JSON.stringify({ key, theme }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);
    clearError();
    await loadStrategyMainlines(state.date);
  } catch (e) {
    showError(`确认主线失败：${e.message || e}`);
  }
}
async function unconfirmMainlineTheme() {
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/strategy-mainline-confirm?day=${encodeURIComponent(state.date)}`, {
      method: 'DELETE',
      headers: adminHeaders(),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);
    clearError();
    await loadStrategyMainlines(state.date);
  } catch (e) {
    showError(`取消主线确认失败：${e.message || e}`);
  }
}
async function loadStrategyMainlineReview() {
  const el = document.getElementById('strategy-mainline-review');
  if (!el) return;
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/strategy-mainline-review?days=10&_=${Date.now()}`, { cache: 'no-store' });
    const d = await res.json();
    const cur = document.getElementById('strategy-mainline-review');
    if (cur) cur.innerHTML = renderMainlineReviewHTML(d);
  } catch (e) {
    const cur = document.getElementById('strategy-mainline-review');
    if (cur) cur.innerHTML = '';
  }
}
function renderMainlineReviewHTML(d) {
  const rows = (d && d.days) || [];
  if (!rows.length) return '';
  const stats = d.stats || {};
  // 明星等级标签:expected=预期明星(进入封板验证);confirmed=预测时已封板(当时已确认,不算预判);
  // active=仅资金活跃(不进统计);无 level 的旧记录=等级未知(不进统计)。
  const starLevelChip = (s) => {
    if (!s) return '';
    if (s.predictLevel === 'expected') return '<i class="mlr-lvl exp" title="预测时为预期明星(尚未封板)">预期</i>';
    if (s.predictLevel === 'confirmed') return '<i class="mlr-lvl" title="预测时已封板,只作展示,不算预判成功">当时已确认</i>';
    if (s.predictLevel === 'active') return '<i class="mlr-lvl" title="预测时仅资金活跃,未达预期明星门槛,不进封板统计">活跃</i>';
    if (s.predictLevel === undefined) return '';
    return '<i class="mlr-lvl" title="旧记录未保存预测时等级,不进封板统计">等级未知</i>';
  };
  // 封板状态:仅预期明星展示验证结果;pending=待验证(当日未收盘)/noData=终盘涨停库缺失或不完整
  const sealChip = (s) => {
    if (!s || s.predictLevel !== 'expected') return '';
    if (s.sealStatus === 'sealed') return '<i class="mlr-seal on" title="预期明星当日最终封板确认">封✓</i>';
    if (s.sealStatus === 'notSealed') return '<i class="mlr-seal" title="预期明星当日最终未封板">未封</i>';
    if (s.sealStatus === 'pending') return '<i class="mlr-seal wait" title="当日尚未收盘,待盘后验证">待验证</i>';
    return '<i class="mlr-seal wait" title="终盘涨停库缺失或不完整,无法判断">数据不足</i>';
  };
  const gainCell = (s, isStar) => {
    if (!s) return '<span class="mlr-na">—</span>';
    const extra = isStar ? starLevelChip(s) + sealChip(s) : '';
    const metric = (label, value, title) => {
      if (value == null) return `<span class="mlr-perf na" title="${escapeHTML(title)}"><i>${label}</i><b>--</b></span>`;
      const n = Number(value);

  const actualCell = (r) => {

    <div class="mlr-head">
      <div class="mlr-title"><span class="mlr-ic">📋</span>预判回看</div>

    <div class="mlr-list">${body}</div>

function pinyinInitialForChar(char) {
  const text = String(char || '');
  if (!text) return '';
  if (/^[a-z0-9]$/i.test(text)) return text.toLowerCase();
  if (!/[\u3400-\u9fff]/u.test(text) || !PINYIN_COLLATOR) return '';
  for (let i = PINYIN_BOUNDARY_CHARS.length - 1; i >= 0; i--) {
    if (PINYIN_COLLATOR.compare(text, PINYIN_BOUNDARY_CHARS[i]) >= 0) {
      return PINYIN_INITIAL_CHARS[i] || '';
    }
  }
  return '';
}

function pinyinInitials(text) {
  return Array.from(String(text || '')).map(pinyinInitialForChar).join('');
}

// 常见多音字 → 可能的声母集合（仅收录不同声母的读音）。与 collator 结果取并集，
// 让「长电科技」既能用 cdkj(cháng) 也能用 zdkj(zhǎng) 搜到。
const PINYIN_POLYPHONE = {
  '长': 'cz', '重': 'cz', '行': 'hx', '藏': 'cz', '参': 'cs', '乐': 'ly', '单': 'dsc',
  '厦': 'sx', '查': 'cz', '区': 'qo', '解': 'jx', '仇': 'cq', '会': 'hk', '降': 'jx',
  '调': 'dt', '便': 'bp', '朝': 'cz', '给': 'gj', '卡': 'kq',
};
function pinyinInitialVariantsForChar(char) {
  const set = new Set();
  const base = pinyinInitialForChar(char);
  if (base) set.add(base);
  for (const ch of (PINYIN_POLYPHONE[char] || '')) set.add(ch);
  return set.size ? [...set] : [''];
}
// 生成名称所有声母变体（多音字做笛卡尔积，做上限保护）
function pinyinInitialsVariants(text) {
  let combos = [''];
  for (const ch of Array.from(String(text || ''))) {
    const opts = pinyinInitialVariantsForChar(ch);
    const next = [];
    for (const prefix of combos) {
      for (const o of opts) {
        next.push(prefix + o);
        if (next.length >= 64) break;
      }
      if (next.length >= 64) break;
    }
    combos = next;
  }
  return [...new Set(combos)];
}

function reviewStockSearchText(stock) {

let reviewUniverseCache = { day: '', stocks: [] };
async function ensureReviewUniverse(day) {
  const key = String(day || '');
  if (reviewUniverseCache.day === key && reviewUniverseCache.stocks.length) return reviewUniverseCache;
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/limit-up-main-reason-db/recent-universe?day=${encodeURIComponent(key)}&days=30`, { cache: 'no-store' });
    const data = await res.json();
    reviewUniverseCache = { day: key, stocks: Array.isArray(data?.stocks) ? data.stocks : [] };
  } catch { reviewUniverseCache = { day: key, stocks: [] }; }
  return reviewUniverseCache;
}
function resolveReviewUniverseCode(term, day) {
  const q = String(term || '').trim().toLowerCase();
  if (!q || reviewUniverseCache.day !== String(day || '')) return '';
  for (const s of reviewUniverseCache.stocks) {
    if (reviewStockSearchText(s).includes(q)) return String(s.code || '');
  }
  return '';
}
function resolveExactReviewUniverseStock(term, day) {
  const q = String(term || '').trim().toLowerCase();
  if (!q || reviewUniverseCache.day !== String(day || '')) return null;
  return reviewUniverseCache.stocks.find(s => [s?.code, s?.name, s?.initials]
    .map(value => String(value || '').trim().toLowerCase())
    .includes(q)) || null;
}
function maybeAutoJumpToReviewUniverseStock(stock, term, day) {
  const ref = String(stock?.latestDay || '').trim();
  const normalizedTerm = String(term || '').trim().toLowerCase();
  if (!ref || !normalizedTerm || ref === String(day || '')) return;

// 涨停复盘默认日期只作用于复盘页显示，不改全局 state.date。
// 看板/策略始终用 state.date，默认就是当天。
function reviewClockFallbackDay(baseDay = state.date) {
  const today = chinaToday();
  const base = String(baseDay || today);
  if (base !== today) return base;          // 用户手选过去日期 → 尊重
  const cn = new Date(Date.now() + (new Date().getTimezoneOffset() * 60000) + 8 * 3600000);  // 北京时间
  const d = new Date(cn);
  const isTrading = x => x.getDay() !== 0 && x.getDay() !== 6;   // 排周末
  if (!isTrading(d) || d.getHours() < 15) {                       // 周末 或 未收盘 → 回退到最近交易日
    do { d.setDate(d.getDate() - 1); } while (!isTrading(d));
  }
  return formatDate(d);
}

function reviewPayloadHasRows(data) {
  if (!data || !data.ok) return false;
  if (Array.isArray(data.stocks) && data.stocks.length) return true;
  return (Array.isArray(data.tabs) ? data.tabs : []).some(tab => Array.isArray(tab.rows) && tab.rows.length);
}

async function resolveReviewLoadDay() {
  const explicit = String(state.reviewDateOverride || '').trim();
  if (explicit) return { day: explicit };
  const today = chinaToday();
  const base = String(state.date || today);
  if (base !== today) return { day: base };

  const clockDay = reviewClockFallbackDay(base);
  if (clockDay !== base) return { day: clockDay };

  const todayData = await fetchLimitupMainReasonDay(base).catch(() => null);
  if (reviewPayloadHasRows(todayData)) return { day: base, data: todayData };

  const latestDay = await fetchLatestTradingDay(base).catch(() => null);
  if (latestDay && latestDay !== base) return { day: latestDay };
  return todayData ? { day: base, data: todayData } : { day: base };
}

async function refreshLimitupReviewPage() {
  if (!ensureAccountAccess('review')) return;
  const seq = ++state.reviewLoadSeq;
  renderLimitupReviewLoading();
  const updateEl = document.getElementById('update-meta');
  if (updateEl) updateEl.textContent = '主因库读取中...';
  try {
    const resolved = await resolveReviewLoadDay();
    const reviewDay = resolved.day || state.date;
    const requestedReviewDay = String(state.reviewDateOverride || state.date || '').trim();
    state.reviewResolvedNote = !state.reviewDateOverride && requestedReviewDay && String(reviewDay) !== requestedReviewDay
      ? `${formatStatusDay(requestedReviewDay)} 尚未生成涨停复盘，当前自动显示最近有效交易日 ${formatStatusDay(reviewDay)}。`
      : '';
    if (state.page === 'review') setDatePickerValue(reviewDay);
    const data = resolved.data || await fetchLimitupMainReasonDay(reviewDay);
    if (seq !== state.reviewLoadSeq) return;
    state.reviewData = data;
    renderLimitupReview(data);
    ensureReviewUniverse(data?.day || reviewDay).then(() => {
      if (seq === state.reviewLoadSeq && String(state.reviewSearchTerm || '').trim()) renderLimitupReview(state.reviewData);
    });
    if (updateEl) {
      updateEl.textContent = data?.ok
        ? `主因库: ${data.day} · ${formatReviewDateTime(data.savedAt)}${state.reviewResolvedNote ? ` · ${state.reviewResolvedNote}` : ''}`
        : `无主因库: ${reviewDay}`;
    }
  } catch (err) {
    if (seq !== state.reviewLoadSeq) return;
    state.reviewResolvedNote = '';
    renderLimitupReviewError(err.message || String(err));
    if (updateEl) updateEl.textContent = '主因库读取失败';
  }
}

function isAfterChinaClose() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Shanghai',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
  }).formatToParts(now);
  const map = Object.fromEntries(parts.map(part => [part.type, part.value]));
  const hour = Number(map.hour);
  const minute = Number(map.minute);
  return hour > 15 || (hour === 15 && minute >= 0);
}

}

function getStockSecid(code) {
  const c = String(code || '').replace(/\D/g, '');
  if (!c) return '';
  return `${c.startsWith('6') ? '1' : '0'}.${c}`;
}

function shiftDateText(day, deltaDays) {
  const d = new Date(`${day}T00:00:00`);
  d.setDate(d.getDate() + deltaDays);
  return formatDate(d).replace(/-/g, '');
}

async function fetchStockDailyKline(code, day) {
  const secid = getStockSecid(code);
  if (!secid) return [];
  const beg = shiftDateText(day, -45);
  const end = String(day || '').replace(/-/g, '');
  const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&beg=${beg}&end=${end}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const json = await res.json();
  return json?.data?.klines || [];
}

function limitUpThreshold(code, name) {
  const c = String(code || '');
  const n = String(name || '').toUpperCase();
  if (n.includes('ST')) return 4.75;
  if (c.startsWith('30') || c.startsWith('68') || c.startsWith('43') || c.startsWith('83') || c.startsWith('87') || c.startsWith('92')) return 19.5;
  return 9.75;
}

async function calcRecentZtCount(stock, day) {
  const klines = await fetchStockDailyKline(stock.code, day).catch(() => []);
  const threshold = limitUpThreshold(stock.code, stock.name);
  return klines.slice(-10).reduce((sum, row) => {
    const cols = String(row).split(',');
    const pct = parseFloat(cols[8]);
    return sum + (Number.isFinite(pct) && pct >= threshold ? 1 : 0);
  }, 0);
}

function polarToPoint(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return {
    x: cx + r * Math.cos(rad),
    y: cy + r * Math.sin(rad),
  };
}

function describePieSlice(cx, cy, r, startDeg, endDeg) {
  const start = polarToPoint(cx, cy, r, startDeg);
  const end = polarToPoint(cx, cy, r, endDeg);
  const largeArc = endDeg - startDeg > 180 ? 1 : 0;
  return `M ${cx} ${cy} L ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)} Z`;
}

function renderBreadthDial(upCount, downCount) {
  const up = Number(upCount) || 0;
  const down = Number(downCount) || 0;
  const total = up + down;
  const upRatio = total ? up / total : 0.5;
  const upDeg = Math.round(upRatio * 360);
  const upPct = total ? Math.round(upRatio * 100) : '--';
  const upSlice = document.getElementById('breadth-up-slice');
  const downSlice = document.getElementById('breadth-down-slice');
  upSlice.setAttribute('d', describePieSlice(78, 78, 72, 0, Math.max(upDeg, 0.01)));
  downSlice.setAttribute('d', describePieSlice(78, 78, 72, Math.max(upDeg, 0.01), 360));
  document.getElementById('breadth-center-pct').textContent = total ? `${upPct}%` : '--';
  document.getElementById('breadth-ratio').textContent = total ? `${upPct}% 上涨` : '--';
  document.getElementById('breadth-up').textContent = `▲ ${up || '--'}`;
  document.getElementById('breadth-down').textContent = `▼ ${down || '--'}`;
}

      qi10: qi.qi10.has(String(r.code)),
      qi30: qi.qi30.has(String(r.code)),
    }));
    html.push(renderZtListTable(`涨停榜单 (显示 ${ztRows.length}/${data.ztListTotal || data.ztList.length})`, ztRows));
  }

  // 近 10 日涨停次数
  if (mergedZt10.length) {
    html.push(renderZtCountTable('近 10 日涨停次数 Top10', markQiRows(mergedZt10, qi)));
  } else {
    html.push(emptySection('近 10 日涨停次数 Top10'));
  }

  // 近 10 日涨幅
  if (data.gain10 && data.gain10.length) {
    html.push(renderGainTable('近 10 日涨幅前 10', markQiRows(data.gain10, qi)));
  } else {
    html.push(emptySection('近 10 日涨幅前 10'));
  }

  // 近 30 日涨幅
  if (data.gain30 && data.gain30.length) {
    html.push(renderGainTable('近 30 日涨幅前 10', markQiRows(data.gain30, qi)));
  } else {
    html.push(emptySection('近 30 日涨幅前 10'));
  }

  if (!html.length) {
    card.insertAdjacentHTML('beforeend', '<div class="card-empty">暂无数据</div>');
  } else {
    card.insertAdjacentHTML('beforeend', `<div class="card-body">${html.join('')}</div>`);
  }
}

function loadingSection(title) {
  return `<div class="section">
    <div class="section-header"><b>${title}</b></div>
    <div class="card-loading section-loading"><span class="spinner"></span> 正在加载</div>
  </div>`;
}

function renderProgressiveCardContent(plateId, data) {
  const card = document.getElementById(`card-${plateId}`);
  if (!card) return;
  const loadingEl = card.querySelector(':scope > .card-loading, :scope > .card-error');
  if (loadingEl) loadingEl.remove();

  let body = card.querySelector(':scope > .card-body');
  if (!body) {
    card.insertAdjacentHTML('beforeend', '<div class="card-body"></div>');
    body = card.querySelector(':scope > .card-body');
  }

  const html = [];
  const mergedZt10 = mergeCurrentZtIntoZt10(data);
  const starCodes = getStarStockCodes(data, mergedZt10);
  const crownStarCodes = boardAllowsMainStar(plateId) ? getCrownStarStockCodes(starCodes, mergedZt10) : new Set();
  updateMainStarPreview(plateId, data, mergedZt10, starCodes, crownStarCodes);
  const qi = computeBoardQiCodes(data, mergedZt10);
  { const s = renderQiSummarySection(qi, data, mergedZt10); if (s) html.push(s); }

  if (data.ztList && data.ztList.length) {
    const mainCountMap = new Map((data.zt10 || []).map(r => [String(r.code), r.ztCount]));
    const ztRows = filterNonStRows(data.ztList).map(r => ({
      ...r,
      mainZtCount: mainCountMap.has(String(r.code)) ? mainCountMap.get(String(r.code)) : null,
      qi10: qi.qi10.has(String(r.code)),
      qi30: qi.qi30.has(String(r.code)),
    }));
    html.push(renderZtListTable(`涨停榜单 (显示 ${ztRows.length}/${data.ztListTotal || data.ztList.length})`, ztRows));
  } else {
    html.push(data._ztListDone ? emptySection('涨停榜单') : loadingSection('涨停榜单'));
  }

  if (mergedZt10.length) {
    html.push(renderZtCountTable('近 10 日涨停次数 Top10', markQiRows(mergedZt10, qi)));
  } else {
    html.push(data._zt10Done ? emptySection('近 10 日涨停次数 Top10') : loadingSection('近 10 日涨停次数 Top10'));
  }

  if (data.gain10 && data.gain10.length) {
    html.push(renderGainTable('近 10 日涨幅前 10', markQiRows(data.gain10, qi)));
  } else {
    html.push(data._gain10Done ? emptySection('近 10 日涨幅前 10') : loadingSection('近 10 日涨幅前 10'));
  }

  if (data.gain30 && data.gain30.length) {
    html.push(renderGainTable('近 30 日涨幅前 10', markQiRows(data.gain30, qi)));
  } else {
    html.push(data._gain30Done ? emptySection('近 30 日涨幅前 10') : loadingSection('近 30 日涨幅前 10'));
  }

  body.innerHTML = html.join('');
}

function initProgressiveCardBodies() {
  for (const b of state.boards) {
    const data = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
    data._ztListDone = !!(data.ztList && data.ztList.length);
    data._zt10Done = !!(data.zt10 && data.zt10.length);
    data._gain10Done = !!(data.gain10 && data.gain10.length);
    data._gain30Done = !!(data.gain30 && data.gain30.length);
    renderProgressiveCardContent(b.plateId, data);
  }
}

function findBoardByPlateId(plateId) {
  const key = String(plateId);
  return state.boards.find(b => String(b.plateId) === key);
}

function boardAllowsMainStar(plateId) {
  const board = findBoardByPlateId(plateId);
  return Number(board?.netInflow) > MAIN_STAR_MIN_NET_INFLOW;
}

function hasLoadedCardDetails(data) {
  return !!(data && data._ztListDone && data._zt10Done && data._gain10Done && data._gain30Done);
}

async function loadCardDetails(board) {
  const plateId = board.plateId;
  const plateKey = String(plateId);
  const data = state.cardData[plateId] || (state.cardData[plateId] = {});
  const detailSeq = state.loadSeq;
  const renderIfCurrent = () => {
    if (detailSeq === state.loadSeq && findBoardByPlateId(plateId)) {
      renderProgressiveCardContent(plateId, data);
    }
  };

  if (hasLoadedCardDetails(data)) {
    renderIfCurrent();
    return data;
  }
  if (state.cardDetailLoads[plateKey]) {
    renderIfCurrent();
    return state.cardDetailLoads[plateKey];
  }

  data._ztListDone = !!(data.ztList && data.ztList.length);
  data._zt10Done = !!(data.zt10 && data.zt10.length && data.zt10Source === 'precise');
  data._gain10Done = !!(data.gain10 && data.gain10.length);
  data._gain30Done = !!(data.gain30 && data.gain30.length);
  setCacheStatus(data._gain10Done && data._gain30Done ? '缓存: 命中' : '缓存: 详情计算中');
  renderIfCurrent();

  const task = (async () => {
    const plates = [plateId];
    const names = [board.name];

    const plateTask = (async () => {
      try {
        await loadSinglePlateData(board);
      } finally {
        data._ztListDone = true;
        renderIfCurrent();
      }
    })();

    const ztGeneTask = (isExternalConceptType() || isDisabledType() ? Promise.resolve(null) : fetchZtGene(plates, names, state.date)).then(ztGeneRes => {
      if (!ztGeneRes) return;
      const ztMap = unwrapAggregate(ztGeneRes, plates);
      if (!ztMap || data.zt10Source === 'precise') return;
      const globalRows = collectAllZtCountRows(ztMap);
      const perBoard = ztMap[plateId] || ztMap[String(plateId)] || ztMap[board.name] || ztMap[String(board.name)] || {};
      const fallbackZt10 = normalizeZtCountRows(pickArray(perBoard, [
        'top_zt_count',
        'zt_count',
        'top10d_zt_count',
        'top10_zt_count',
        'zt10',
        'top_zt',
        'items',
        'stocks',
        'list',
        'List',
      ]));
      data.globalZt10 = globalRows;
      data.zt10 = fallbackZt10;
      data._zt10Done = true;
      renderIfCurrent();
    }).catch(() => {});

    const preciseTask = fetchPreciseZt10(plates, names, state.date).then(preciseZtRes => {
      const preciseZtMap = preciseZtRes?.boards;
      const preciseRows = preciseZtMap?.[plateId] || preciseZtMap?.[String(plateId)] || preciseZtMap?.[board.name] || preciseZtMap?.[String(board.name)] || [];
      if (Array.isArray(preciseRows) && preciseRows.length) {
        data.zt10 = normalizeZtCountRows(preciseRows);
        data.zt10Source = 'precise';
      }
      data._zt10Done = true;
      renderIfCurrent();
    }).catch(() => {
      data._zt10Done = true;
      renderIfCurrent();
    });

    const gainTask = fetchGainRank(plates, state.date).then(gainRankRes => {
      const gainMap = unwrapAggregate(gainRankRes, plates);
      const perBoard = gainMap?.[plateId] || gainMap?.[String(plateId)] || {};
      data.gain10 = pickArray(perBoard, ['top10d_gain', 'gain10', 'top_10d']);
      data.gain30 = pickArray(perBoard, ['top30d_gain', 'gain30', 'top_30d']);
      data._gain10Done = true;
      data._gain30Done = true;
      setCacheStatus('缓存: 详情已更新');
      renderIfCurrent();
    }).catch(() => {
      data._gain10Done = true;
      data._gain30Done = true;
      setCacheStatus('缓存: 详情失败');
      renderIfCurrent();
    });

    await Promise.allSettled([plateTask, ztGeneTask, preciseTask, gainTask]);
    data._detailLoaded = true;
    return data;
  })();

  state.cardDetailLoads[plateKey] = task.finally(() => {
    delete state.cardDetailLoads[plateKey];
  });
  return state.cardDetailLoads[plateKey];
}

// ===== 10日QI / 30日QI：板块内「近10日涨停次数」与「近10/30日涨幅」均居前列的综合龙头 =====
const QI_RANK_TOPK = 5;     // 名次门槛：两项都要进板块前 5
const QI_MIN_COUNT = 2;     // 近10日涨停次数下限
const QI_MAX_PER_KIND = 3;  // 每类最多 3 只
function qiRankMap(rows, valOf) {
  const m = new Map();
  [...(rows || [])]
    .map(r => ({ code: String(r.code || ''), v: Number(valOf(r) || 0) }))
    .filter(r => r.code)
    .sort((a, b) => b.v - a.v)
    .forEach((r, i) => { if (!m.has(r.code)) m.set(r.code, { rank: i + 1, v: r.v }); });
  return m;
}
function pickQiCodes(countMap, gainMap) {
  const out = [];
  for (const [code, c] of countMap) {
    const g = gainMap.get(code);
    if (!g) continue;
    if (c.rank <= QI_RANK_TOPK && g.rank <= QI_RANK_TOPK && c.v >= QI_MIN_COUNT && g.v > 0) {
      out.push({ code, score: c.rank + g.rank });
    }
  }
  out.sort((a, b) => a.score - b.score);
  return new Set(out.slice(0, QI_MAX_PER_KIND).map(o => o.code));
}
// 板块卡：QI 次数维度用「主次数」(ztCount，因本板块综合归纳主因涨停的次数)，
// 确保 QI 真正属于本板块；涨幅用近10/30日涨幅。这些表已跨10/30天，含今天没涨停的票。
function computeBoardQiCodes(data, mergedZt10) {
  const countMap = qiRankMap(mergedZt10, r => r.ztCount);
  const g10 = qiRankMap(data && data.gain10, r => r.gain);
  const g30 = qiRankMap(data && data.gain30, r => r.gain);
  return { qi10: pickQiCodes(countMap, g10), qi30: pickQiCodes(countMap, g30) };
}
function markQiRows(rows, qi) {
  return (rows || []).map(r => ({
    ...r,
    qi10: qi.qi10.has(String(r.code)),
    qi30: qi.qi30.has(String(r.code)),
  }));
}
function qiTagBadge(kind) {
  const num = kind === '30' ? '30' : '10';
  const tip = kind === '30'
    ? '30日QI：近10日因本板块涨停次数(≥2)与近30日涨幅均居板块前列;涨幅为K线口径(含快照日盘中)'
    : '10日QI：近10日因本板块涨停次数(≥2)与近10日涨幅均居板块前列;涨幅为K线口径(含快照日盘中)';
  // 与原表格徽章一致(同 .badge .badge-star 类 + 同 qi-badge-mark logo)；蓝点改用与左上角品牌一致的绕轨动画(qi-spark)
  const mark = `<svg class="qi-badge-mark" viewBox="12 28 116 84" aria-hidden="true"><ellipse cx="65" cy="68" rx="53.2" ry="22" transform="rotate(-28 65 68)" stroke="var(--border-strong)" stroke-width="4" fill="none"></ellipse><circle cx="61" cy="68" r="30" stroke="currentColor" stroke-width="13" fill="none"></circle><path d="M78 84 L92 98" stroke="currentColor" stroke-width="13" stroke-linecap="round"></path><rect x="105" y="60" width="13" height="38" rx="6.5" fill="currentColor"></rect><g transform="rotate(-28 65 68)"><circle class="qi-spark" r="9" fill="var(--accent)"></circle></g></svg>`;
  return `<span class="badge badge-star qi-tag" title="${tip}">${mark}<b class="qi-tag-num">${num}</b></span>`;
}
function rowQiBadges(row) {
  return (row && row.qi10 ? qiTagBadge('10') : '') + (row && row.qi30 ? qiTagBadge('30') : '');
}
function renderQiSummarySection(qi, data, mergedZt10) {
  const nameMap = new Map();
  for (const r of [...(mergedZt10 || []), ...((data && data.gain10) || []), ...((data && data.gain30) || []), ...((data && data.ztList) || [])]) {
    const c = String(r.code || ''); if (c && !nameMap.has(c)) nameMap.set(c, r.name || c);
  }
  const names = set => [...set].map(c => nameMap.get(c) || c);
  const q10 = names(qi.qi10), q30 = names(qi.qi30);
  if (!q10.length && !q30.length) return '';
  const seg = (kind, arr) => arr.length
    ? `<div class="qi-sum-line">${qiTagBadge(kind)}<span class="qi-sum-names">${arr.map(n => escapeHTML(n)).join('、')}</span></div>`
    : '';
  return `<div class="section qi-sum"><div class="section-header"><b>板块QI龙头</b></div>${seg('10', q10)}${seg('30', q30)}</div>`;
}
function getStarStockCodes(data, mergedZt10 = mergeCurrentZtIntoZt10(data)) {
  const ztTop5 = new Set(mergedZt10.slice(0, 5).map(r => String(r.code)));
  return new Set((data.gain10 || [])
    .slice(0, 8)
    .map(r => String(r.code))
    .filter(code => ztTop5.has(code)));
}

function getCrownStarStockCodes(starCodes, mergedZt10) {
  return new Set((mergedZt10 || [])
    .filter(r => starCodes.has(String(r.code)) && Number(r.ztCount) > 0)
    .map(r => String(r.code)));
}

function getMainStarPreviewRows(data, mergedZt10, starCodes, crownStarCodes) {
  const sourceRows = [
    ...(data.ztList || []),
    ...(mergedZt10 || []),
    ...(data.gain10 || []),
    ...(data.gain30 || []),
  ];
  const byCode = new Map(sourceRows.filter(r => r.code).map(r => [String(r.code), r]));
  const result = [];
  for (const code of crownStarCodes || []) {
    const row = byCode.get(String(code));
    if (!row || isStStockName(row.name)) continue;
    result.push(row);
  }
  return result;
}

function updateMainStarPreview(plateId, data, mergedZt10, starCodes, crownStarCodes) {
  const card = document.getElementById(`card-${plateId}`);
  const el = card?.querySelector('.board-main-star-preview');
  if (!el) return;
  const rows = getMainStarPreviewRows(data || {}, mergedZt10 || [], starCodes || new Set(), crownStarCodes || new Set());
  if (!rows.length) {
    el.classList.remove('has-star');
    el.innerHTML = '';
    return;
  }
  const names = rows.slice(0, 2).map(r => r.name || r.code).filter(Boolean);
  const suffix = rows.length > 2 ? ` +${rows.length - 2}` : '';
  const qiMark = `<span class="preview-star-brand" aria-hidden="true"><svg class="qi-preview-logo" viewBox="0 0 160 135" fill="none"><ellipse cx="65" cy="68" rx="53.2" ry="22" transform="rotate(-28 65 68)" stroke="var(--border-strong)" stroke-width="4" fill="none"></ellipse><circle cx="61" cy="68" r="30" stroke="currentColor" stroke-width="13" fill="none"></circle><path d="M78 84 L92 98" stroke="currentColor" stroke-width="13" stroke-linecap="round"></path><rect x="105" y="60" width="13" height="38" rx="6.5" fill="currentColor"></rect><g transform="rotate(-28 65 68)"><circle class="qi-preview-spark" cx="118.2" cy="68" r="11" fill="var(--accent)"></circle></g></svg></span>`;
  el.classList.add('has-star');
  el.innerHTML = `${qiMark}<span class="preview-star-copy"><span class="preview-star-title">主线明星股</span><span class="preview-star-names">${names.map(n => `<span class="preview-star-name">${escapeHTML(n)}</span>`).join('')}${suffix ? `<span class="preview-star-name preview-star-more">${escapeHTML(suffix.trim())}</span>` : ''}</span></span>`;
}

function isStStockName(name) {
  return /(^|\W)\*?ST|退市/i.test(String(name || ''));
}

function filterNonStRows(rows) {
  return (rows || []).filter(r => !isStStockName(r.name));
}

function mergeCurrentZtIntoZt10(data) {
  if (data.zt10Source === 'precise') {
    const rows = filterNonStRows(normalizeZtCountRows(data.zt10 || []));
    const currentByCode = new Map((data.ztList || []).filter(r => r.code).map(r => [String(r.code), r]));
    const currentByName = new Map((data.ztList || []).filter(r => r.name).map(r => [String(r.name), r]));
    return rows.map(r => {
      const current = currentByCode.get(String(r.code)) || currentByName.get(String(r.name));
      return current ? { ...r, todayGain: current.gain } : r;
    });
  }
  const rows = filterNonStRows(normalizeZtCountRows(data.zt10 || []));
  const globalRows = filterNonStRows(normalizeZtCountRows(data.globalZt10 || []));
  const globalByCode = new Map(globalRows.filter(r => r.code).map(r => [String(r.code), r]));
  const globalByName = new Map(globalRows.filter(r => r.name).map(r => [String(r.name), r]));
  const seen = new Set(rows.map(r => String(r.code || r.name)));
  for (const stock of data.ztList || []) {
    if (isStStockName(stock.name)) continue;
    const key = String(stock.code || stock.name);
    if (seen.has(key)) continue;
    const matched = globalByCode.get(String(stock.code)) || globalByName.get(String(stock.name));
    rows.unshift({
      code: stock.code,
      name: stock.name,
      totalCount: matched?.totalCount ?? null,
      ztCount: matched?.ztCount ?? matched?.totalCount ?? null,
      todayGain: stock.gain,
      fromCurrentZt: true,
    });
    seen.add(key);
  }
  return rows;
}

async function hydrateCurrentZtCountsFromKline(data) {
  const rows = normalizeZtCountRows(data.zt10 || []);
  const byCode = new Map(rows.filter(r => r.code).map(r => [String(r.code), r]));
  const byName = new Map(rows.filter(r => r.name).map(r => [String(r.name), r]));
  const additions = await Promise.all((data.ztList || []).map(async stock => {
    const count = await calcRecentZtCount(stock, state.date);
    return {
      code: stock.code,
      name: stock.name,
      totalCount: count,
      ztCount: count,
      todayGain: stock.gain,
    };
  }));

  for (const item of additions) {
    const existing = byCode.get(String(item.code)) || byName.get(String(item.name));
    if (existing) {
      existing.totalCount = Math.max(Number(existing.totalCount) || 0, item.totalCount);
      existing.ztCount = Math.max(Number(existing.ztCount) || 0, item.ztCount);
      if (existing.todayGain == null || isNaN(existing.todayGain)) existing.todayGain = item.todayGain;
    } else if (item.totalCount > 0 || item.ztCount > 0) {
      rows.unshift(item);
    }
  }

  data.zt10 = rows
    .filter(r => Number(r.totalCount) > 0 || Number(r.ztCount) > 0)
    .sort((a, b) => (Number(b.totalCount) || 0) - (Number(a.totalCount) || 0)
      || (Number(b.ztCount) || 0) - (Number(a.ztCount) || 0)
      || (Number(b.todayGain) || 0) - (Number(a.todayGain) || 0));
}

function fmtCount(v) {
  if (v == null || v === '') return '--';
  const n = Number(v);
  return Number.isFinite(n) ? String(n) : '--';
}

function markStarRows(rows, starCodes, crownStarCodes = new Set()) {
  return filterNonStRows(rows).map(r => ({
    ...r,
    isStar: starCodes.has(String(r.code)),
    isCrownStar: crownStarCodes.has(String(r.code)),
  }));
}

function renderStarBadge(row) {

  return `<span class="badge badge-star${crownClass}" title="${label}" aria-label="${label}">${mark}</span>`;
}

function emptySection(title) {

function dashLeaderBadge(label) {
  return `<span class="badge" style="color:#e0a23c;border-color:rgba(224,162,60,0.45);" title="该板块龙头">★${label}</span>`;

function renderZtListTable(title, rows) {
  // 涨停榜单：连板信息(ztState);连板最高者为龙头并排前
  const sorted = [...rows].sort((a, b) => (Number(b.ztState || 0) - Number(a.ztState || 0)));
  const maxZt = Math.max(0, ...sorted.map(r => Number(r.ztState || 0)));

// 策略页数据：今天读 /api/strategy/today（实时），过去某天读 /api/strategy/snapshot（15点快照）。
// 服务器仍返回 { focus, strong, boards }；页面只展示重点关注，单独强势板块区由共振榜替代。
async function loadStrategyData(day) {
  const cur = state.strategyData[day];
  if (cur && (cur.loading || cur.done)) return;
  state.strategyData[day] = { loading: true };
  const isToday = day === chinaToday();
  let result;
  try {
    const pathQ = isToday
      ? `/api/strategy/today?day=${encodeURIComponent(day)}`
      : `/api/strategy/snapshot?day=${encodeURIComponent(day)}`;
    const res = await fetch(`${KPL_STATS_BASE}${pathQ}&_=${Date.now()}`, { cache: 'no-store' });
    if (res.status === 404) result = { done: true, notFound: true };
    else if (!res.ok) result = { done: true, error: 'HTTP ' + res.status };
    else result = { done: true, data: await res.json(), isSnapshot: !isToday };
  } catch (e) {
    result = { done: true, error: (e && e.message) || String(e) };
  }
  state.strategyData[day] = result;
  if (state.page === 'strategy' && state.date === day) renderStrategyPage();
}

// 同步「确认」到服务器（全站共用的重点关注，管理员写）。看板点确认/取消时调用。
function syncFocusToServer(action, board, day = state.date) {
  const finish = () => {
    delete state.strategyData[day];                    // 当天数据失效
    if (state.page === 'strategy' && state.date === day) renderStrategyPage(); // 在策略页则立即刷新
  };
  try {
    const base = `${KPL_STATS_BASE}/api/strategy/focus?day=${encodeURIComponent(day)}`;
    if (action === 'add') {
      fetch(base, {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, (typeof adminHeaders === 'function' ? adminHeaders() : {})),
        body: JSON.stringify({ plateId: String(board.plateId), name: board.name || '', zsType: board.zsType ?? state.zsType }),
      }).then(finish).catch(finish);
    } else {
      fetch(`${base}&plateId=${encodeURIComponent(board.plateId)}`, {
        method: 'DELETE',
        headers: (typeof adminHeaders === 'function' ? adminHeaders() : {}),
      }).then(finish).catch(finish);
    }
  } catch (e) { finish(); }
}

function strategyBoardExplainHTML(board, isFocusCard, reasons, smartPickState) {
  const list = [];
  const reasonSet = new Set(reasons || []);
  const l2Admin = canUseL2AdminTools();
  if (board && board.searchResult && l2Admin) list.push(`来自${board.searchSourceLabel || zsLabel(board.zsType)}搜索结果，可直接按该板块成分股计算 L2。`);
  if (isFocusCard) list.push(l2Admin ? '已确认进入重点关注池，优先用于策略跟踪和 L2 扫描。' : '已确认进入重点关注池。');
  if (reasonSet.has('gain')) list.push('实时涨幅进入市场前列。');
  if (reasonSet.has('zt')) list.push('涨停家数进入市场前列。');
  const gain = Number(board && board.gainPct);
  const zt = Number(board && board.ztCount);
  const net = Number(board && board.netInflow);
  if (Number.isFinite(gain)) list.push(`板块涨幅${gain > 0 ? '+' : ''}${gain.toFixed(2)}%。`);
  if (Number.isFinite(zt) && zt > 0) list.push(`${zt}只成分股涨停。`);
  if (Number.isFinite(net) && net > 0) list.push(`净流入约${strategyPlainMoney(net)}，资金维度支持。`);
  if (board && board.qiLeaders && (((board.qiLeaders.qi10 || []).length) || ((board.qiLeaders.qi30 || []).length))) {
    list.push('板块内存在 10日/30日 QI 龙头。');
  }
  if (smartPickState && smartPickState.done && smartPickState.count > 0) {
    list.push(l2Admin ? `L2已筛出${smartPickState.count}只主动买盘占优个股。` : `重点关注${smartPickState.count}只个股。`);
  }
  if (!list.length) return '';
  return `<div class="strategy-explain strategy-board-explain">
    <div class="strategy-explain-title">为什么关注</div>
    <ul>${list.slice(0, 4).map(item => `<li>${escapeHTML(item)}</li>`).join('')}</ul>
  </div>`;
}

function strategyPickReasonText(row, threshold) {
  const th = Number(threshold || state.smartPickThreshold || 1.5);
  const active = Number(row && row.activeRatio);
  const passive = Number(row && row.passiveRatio);
  const support = Number(row && row.supportRatio);
  const signals = (row && row.pickSignals) || {};
  const signalCount = Number(row && row.pickSignalCount) || 0;
  const parts = [];
  if (signalCount) parts.push(`满足${signalCount}/3`);
  if (Number.isFinite(active)) parts.push(`主动买/主动卖 ${active.toFixed(2)}${signals.active ? ` ≥ ${th}` : ''}`);
  if (Number.isFinite(passive)) parts.push(`被动买/被动卖 ${passive.toFixed(2)}${signals.passive ? ` ≥ ${th}` : ''}`);
  if (Number.isFinite(support)) parts.push(`综合买/卖 ${support.toFixed(2)}${signals.support ? ` ≥ ${th}` : ''}`);
  const buy = Number(row && row.buySupport);
  const sell = Number(row && row.sellPressure);
  if (Number.isFinite(buy) && Number.isFinite(sell)) parts.push(`买方${strategyPlainMoney(buy)} / 卖方${strategyPlainMoney(sell)}`);
  return parts.join('；');
}

function strategyBoardCardHTML(board, reasons) {

  const id = String(board.plateId);
  const minLbl = ((state.smartPickMinAmount || 500000) / 1e4) + '万';   // 单笔最小金额展示（如 50万）
  const scanButtonText = isSearchCard ? '计算' : 'L2扫描';

  // L2 扫描状态
  const sp = state.smartPick[id];
  const explainHtml = strategyBoardExplainHTML(board, isFocusCard, reasonList, sp);
  let nameTag = '', btnExtra = '', pickedHtml = '';
  if (sp && !admin) {
    const publicPicked = Array.isArray(sp.picked) ? sp.picked : [];
    if (Number(sp.count) > 0 && publicPicked.length) {
      nameTag = '<span class="sc-pick-tag done">重点关注</span>';
      const rows = publicPicked.map(p => {
        const code = escapeHTML(String(p.code));
        const pname = escapeHTML(String(p.name));

          <div class="sc-picked-lbl">重点关注 ${publicPicked.length} 只</div>
          ${rows}
        </div>`;
    }
  } else if (sp) {
    if (sp.loading) {
      const batchText = sp.batchCount ? ` ${sp.currentBatch || 0}/${sp.batchCount}` : '';
      const progressText = sp.total ? ` · ${sp.scanned || 0}/${sp.total}` : '';
      nameTag = `<span class="sc-pick-tag loading">L2扫描中${batchText}</span>`;
      pickedHtml = `<div class="sc-picked"><div class="sc-picked-lbl">${escapeHTML(sp.note || '按实时涨幅快照顺序扫描')}${escapeHTML(progressText)}</div></div>`;
      btnExtra = '" disabled="disabled';
    } else if (sp.error) {
      nameTag = '<span class="sc-pick-tag none">L2失败</span>';
      pickedHtml = `<div class="sc-picked"><div class="sc-picked-lbl">${escapeHTML(sp.note || 'L2扫描启动失败')}</div></div>`;
    } else if (sp.available === false) {
      nameTag = '<span class="sc-pick-tag none">L2未接入</span>';
      pickedHtml = `<div class="sc-picked"><div class="sc-picked-lbl">${escapeHTML(sp.note || 'L2账号或依赖未配置')}</div></div>`;
    } else if (sp.done && !sp.total) {
      nameTag = '<span class="sc-pick-tag none">成分股为空</span>';
      pickedHtml = `<div class="sc-picked"><div class="sc-picked-lbl">${escapeHTML(sp.note || '没有拿到该板块的成分股，请刷新后重试')}</div></div>`;
    } else if (sp.count > 0) {
      nameTag = admin ? '<span class="sc-pick-tag done">L2已筛出</span>' : '<span class="sc-pick-tag done">重点关注</span>';
      const rows = sp.picked.map(p => {
        const code = escapeHTML(String(p.code));
        const pname = escapeHTML(String(p.name));
        if (!admin) return `<div class="sc-picked-row sc-focus-only"><span class="sc-pcode">${code}</span>${pname}<span class="sc-focus-note">重点关注</span></div>`;
        const key = id + ':' + p.code;
        const open = state.smartPickExpanded.has(key);
        const sums = p.thresholds || {};
        const pickExplain = strategyPickReasonText(p, sp.threshold || state.smartPickThreshold || 1.5);
        const ratioText = value => {
          if (value === Infinity || value === 'Infinity') return '∞';
          return Number.isFinite(Number(value)) ? Number(value).toFixed(2) : '--';
        };
        const ratioOf = (buy, sell) => {
          const b = Number(buy) || 0;
          const s = Number(sell) || 0;
          if (s > 0) return b / s;
          return b > 0 ? Infinity : 0;
        };
        const thresholdSummary = value => sums[String(value)] || (value === 500000 ? p : { activeBuy: 0, passiveBuy: 0, activeSell: 0, passiveSell: 0 });
        const moneyPair = (label, buy, sell, ratio, cls) => `
          <div class="sc-pick-pair ${cls}">
            <span>${label}<b>${ratioText(ratio)}</b></span>
            <em>买 ${fmtMoneyWan(buy)}</em>
            <em>卖 ${fmtMoneyWan(sell)}</em>
          </div>`;
        const moneyGroup = (label, s = {}) => {
          const activeRatio = ratioOf(s.activeBuy, s.activeSell);
          const passiveRatio = ratioOf(s.passiveBuy, s.passiveSell);
          return `
          <div class="sc-pick-detail-group">
            <div class="sc-pick-detail-title">
              <span>${label}</span>
              <em>主动比 ${ratioText(activeRatio)} · 被动比 ${ratioText(passiveRatio)}</em>
            </div>
            ${moneyPair('主动', s.activeBuy, s.activeSell, activeRatio, 'active')}
            ${moneyPair('被动', s.passiveBuy, s.passiveSell, passiveRatio, 'passive')}
          </div>`;
        };
        const detailThresholds = [
          [500000, '≥50万'],
          [3000000, '≥300万'],
          [5000000, '≥500万'],
          [8000000, '≥800万'],
          [10000000, '≥1000万'],
        ];
        const detail = open ? `
          <div class="sc-pick-detail">
            <div class="sc-pick-money-grid">
              ${detailThresholds.map(([value, label]) => moneyGroup(label, thresholdSummary(value))).join('')}
            </div>
            ${pickExplain ? `<span class="sc-pick-explain">入选依据：${escapeHTML(pickExplain)}</span>` : ''}
            <span class="sc-pick-detail-note">主动按单笔成交统计；被动按同一挂单订单号累计统计</span>
          </div>` : '';
        return `<div class="sc-picked-row sc-clickable" onclick="smartPickDetail('${id}','${code}')">
            <span class="sc-pcode">${code}</span>${pname}
            <span class="sc-row-caret">${open ? '▴' : '▾'}</span>
          </div>${detail}`;
      }).join('');
      const pickedLabel = admin
        ? `L2选出 ${sp.count} 只 · 已扫 ${sp.scanned || sp.total || 0}/${sp.total || 0} · 阈值 ${state.smartPickThreshold || 1.5}`
        : `重点关注 ${sp.count} 只`;
      pickedHtml = `
        <div class="sc-picked">
          <div class="sc-picked-lbl">${escapeHTML(pickedLabel)}</div>
          ${rows}
        </div>`;
    } else {
      nameTag = '<span class="sc-pick-tag none">L2无入选</span>';
      if (sp.done && sp.total) {
        pickedHtml = `<div class="sc-picked"><div class="sc-picked-lbl">已按实时涨幅快照扫描 ${sp.scanned || 0}/${sp.total} 只，暂无达到阈值的个股。</div></div>`;
      }
    }
  }

  // 板块 QI 龙头（10日/30日，复用 QI 徽章）
  const ql = board.qiLeaders;
  let qiHtml = '';
  if (ql && ((ql.qi10 && ql.qi10.length) || (ql.qi30 && ql.qi30.length))) {
    const seg = (kind, arr) => (arr && arr.length)

    qiHtml = `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;">
      <div style="font-size:11px;color:var(--text-faint);letter-spacing:0.04em;">板块 QI 龙头</div>
      ${seg('10', ql.qi10)}${seg('30', ql.qi30)}

  }
  return `
    <div class="strategy-board-card" data-plate-id="${escapeHTML(id)}">
      <div class="strategy-card-head">
        <span class="strategy-card-name">${escapeHTML(name)}${nameTag}</span>
        <span class="strategy-card-badges">${badges}</span>

      </div>` : ''}
      ${pickedHtml}
    </div>

}

  if (!plateId) return null;
  const rawName = String(board?.name || board?.plateName || board?.boardName || board?.title || '').trim();
  const name = (cleanBoardName ? cleanBoardName(rawName, plateId) : rawName) || rawName || plateId;
  const gainPct = strategySearchNumber(board?.gainPct ?? board?.gain ?? board?.zf ?? board?.changePct);
  const ztCount = strategySearchNumber(board?.ztCount ?? board?.limitUpCount ?? board?.zt);
  const netInflow = strategySearchNumber(board?.netInflow ?? board?.net_inflow ?? board?.fund ?? board?.amount);
  const stockCount = strategySearchNumber(board?.stockCount ?? board?.count ?? board?.stock_count);
  return {
    plateId,
    name,
    zsType: source.zsType,
    gainPct,
    ztCount,
    netInflow,
    stockCount,
    searchResult: true,
    searchSource: source.key,
    searchSourceLabel: source.label,
    sourceIndex,
  };
}

async function fetchStrategyBoardSearchRows(source, query) {
  const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  const timer = controller ? setTimeout(() => controller.abort(), 9000) : null;
  try {
    const res = await fetch(`${KPL_STATS_BASE}${source.url}?cache=1&_=${Date.now()}`, {
      cache: 'no-store',
      signal: controller ? controller.signal : undefined,
    });
    if (!res.ok) throw new Error(`${source.label}板块目录读取失败`);
    const data = await res.json();
    const q = String(query || '').trim().toLowerCase();
    return (data.boards || [])
      .map((board, index) => normalizeStrategyBoardSearchRow(board, source, index))
      .filter(Boolean)
      .filter(row => {
        const name = String(row.name || '').toLowerCase();
        const id = String(row.plateId || '').toLowerCase();
        return name.includes(q) || id.includes(q);
      });
  } finally {
    if (timer) clearTimeout(timer);
  }
}

async function runStrategyBoardSearch() {
  const input = document.getElementById('strategy-board-search-input');
  const query = String((input && input.value) || state.strategyBoardSearchQuery || '').trim();
  state.strategyBoardSearchQuery = query;
  state.strategyBoardSearchError = '';
  if (!query) {
    state.strategyBoardSearchResults = [];
    renderStrategyPage();
    return;
  }
  state.strategyBoardSearchLoading = true;
  renderStrategyPage();
  try {
    const settled = await Promise.allSettled(STRATEGY_BOARD_SEARCH_SOURCES.map(source => fetchStrategyBoardSearchRows(source, query)));
    const groups = settled.filter(item => item.status === 'fulfilled').map(item => item.value);
    const failedCount = settled.filter(item => item.status !== 'fulfilled').length;
    const q = query.toLowerCase();
    state.strategyBoardSearchResults = groups.flat()
      .map(row => ({
        ...row,
        searchScore: (String(row.name).toLowerCase() === q ? 4 : 0)
          + (String(row.name).toLowerCase().startsWith(q) ? 2 : 0)
          + (String(row.plateId).toLowerCase() === q ? 3 : 0),
      }))
      .sort((a, b) => b.searchScore - a.searchScore
        || a.sourceIndex - b.sourceIndex
        || (Number(b.gainPct) || -Infinity) - (Number(a.gainPct) || -Infinity)
        || String(a.name).localeCompare(String(b.name), 'zh-Hans-CN'))
      .slice(0, 24);
    state.strategyBoardSearchError = failedCount && !state.strategyBoardSearchResults.length
      ? '部分板块源读取超时，请稍后重试'
      : '';
  } catch (e) {
    state.strategyBoardSearchResults = [];
    state.strategyBoardSearchError = (e && e.message) || '板块搜索失败';
  } finally {
    state.strategyBoardSearchLoading = false;
    renderStrategyPage();
  }
}

function clearStrategyBoardSearch() {
  state.strategyBoardSearchQuery = '';
  state.strategyBoardSearchResults = [];
  state.strategyBoardSearchError = '';
  renderStrategyPage();
}

function renderStrategyBoardSearchHTML() {

function normalizeSmartPickJob(d) {
  const done = d && (d.status === 'done' || d.status === 'error');
  return {
    loading: !!d && !done,
    done: !!done,
    error: !!(d && (d.status === 'error' || d.error)),
    available: !d || d.available !== false,
    publicOnly: !!(d && d.publicOnly),
    note: (d && (d.note || d.error)) || '',
    jobId: d && d.jobId,
    status: d && d.status,
    count: (d && (d.pickedCount ?? (Array.isArray(d.picked) ? d.picked.length : 0))) || 0,
    total: (d && d.total) || 0,
    scanned: (d && d.scanned) || 0,
    currentBatch: (d && d.currentBatch) || 0,
    batchCount: (d && d.batchCount) || 0,
    threshold: (d && d.threshold) || state.smartPickThreshold || 1.5,
    minAmount: (d && d.minAmount) || state.smartPickMinAmount || 500000,
    picked: (d && d.picked) || [],
    results: (d && d.results) || [],
    sortSnapshotAt: d && d.sortSnapshotAt,
  };
}

function pollSmartPick(plateId, jobId) {
  setTimeout(() => {
    const cur = state.smartPick[plateId];
    if (!cur || cur.jobId !== jobId || !cur.loading) return;
    fetch(`${KPL_STATS_BASE}/api/strategy/focus-l2-scan?jobId=${encodeURIComponent(jobId)}&_=${Date.now()}`, {
      cache: 'no-store',
      headers: typeof adminHeaders === 'function' ? adminHeaders() : {},
    })
      .then(async r => {
        const d = await r.json().catch(() => null);
        if (!r.ok || (d && d.error)) {
          return { status: 'error', error: (d && d.error) || `L2扫描状态读取失败 HTTP ${r.status}` };
        }
        return d;
      })
      .then(d => {
        state.smartPick[plateId] = normalizeSmartPickJob(d);
        refreshSmartPickCard(plateId);
        if (state.smartPick[plateId] && state.smartPick[plateId].loading) pollSmartPick(plateId, jobId);
      })
      .catch(() => {
        state.smartPick[plateId] = { done: true, error: true, count: 0, picked: [], note: 'L2扫描状态读取失败' };
        refreshSmartPickCard(plateId);
      });
  }, 1600);
}

// L2扫描：L1只取板块成分股实时涨幅快照排序，L2逐笔成交分批统计主动买/主动卖。
function smartPick(plateId, sourceEl) {
  if (!canUseL2AdminTools()) {
    showError('只有 panda、qi_admin 可以执行 L2 扫描');
    return;
  }
  plateId = String(plateId);
  const cur = state.smartPick[plateId];
  if (cur && cur.loading) return;
  state.smartPick[plateId] = { loading: true, note: '正在建立L2扫描任务' };
  refreshSmartPickCard(plateId);
  const th = encodeURIComponent(state.smartPickThreshold || 1.5);
  const minAmt = encodeURIComponent(500000);
  const zsType = sourceEl && sourceEl.dataset ? sourceEl.dataset.zsType : '';
  const boardName = sourceEl && sourceEl.dataset ? sourceEl.dataset.boardName : '';
  fetch(`${KPL_STATS_BASE}/api/strategy/focus-l2-scan?plateId=${encodeURIComponent(plateId)}&day=${encodeURIComponent(state.date)}&threshold=${th}&minAmount=${minAmt}&_=${Date.now()}`, {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/json' }, (typeof adminHeaders === 'function' ? adminHeaders() : {})),
    body: JSON.stringify({ plateId, day: state.date, zsType, boardName, threshold: state.smartPickThreshold || 1.5, minAmount: 500000 }),
    cache: 'no-store',
  })
    .then(async r => {
      const d = await r.json().catch(() => null);
      if (!r.ok || !d) return { error: (d && d.error) || `L2扫描启动失败 HTTP ${r.status}` };
      return d;
    })
    .then(d => {
      if (d && d.error) {
        state.smartPick[plateId] = { done: true, error: true, count: 0, picked: [], note: d.error };
        return;
      }
      state.smartPick[plateId] = normalizeSmartPickJob(d);
      if (state.smartPick[plateId].jobId && state.smartPick[plateId].loading) pollSmartPick(plateId, state.smartPick[plateId].jobId);
    })
    .catch(() => { state.smartPick[plateId] = { done: true, error: true, count: 0, picked: [], note: 'L2扫描启动失败' }; })
    .finally(() => { refreshSmartPickCard(plateId); });
}

function fmtMoneyWan(yuan) {

// ====== QI 龙头作战室：把各板块分散的 QI 龙头汇成总榜（聚合 + 梯队 + 今日新晋 + 引领排序 + 筛选） ======
function buildClientQiBoard(d) {
  // 旧快照无 qiBoard 时的客户端兜底：仅从各板块 qiLeaders 聚合，无连板/封板/新晋
  const byCode = new Map();
  const eat = (b, e, kind) => {
    const code = String((e && e.code) || ''); if (!code) return;
    const cur = byCode.get(code) || { code, name: String((e && e.name) || ''), boards: [], kinds: new Set(), count: 0, total: 0, gain: 0 };
    if (!cur.name) cur.name = String((e && e.name) || '');
    if (!cur.boards.some(x => x.plateId === String(b.plateId))) cur.boards.push({ name: b.name || '', plateId: String(b.plateId), zsType: b.zsType });
    cur.kinds.add(kind);
    cur.count = Math.max(cur.count, Number(e && e.count) || 0);
    cur.total = Math.max(cur.total, Number(e && e.total) || 0);
    cur.gain = Math.max(cur.gain, Number(e && e.gain) || 0);
    byCode.set(code, cur);
  };
  const boards = (d && d.boards) || {};
  for (const pid of Object.keys(boards)) {
    const b = Object.assign({ plateId: pid }, boards[pid] || {});
    const ql = b.qiLeaders; if (!ql) continue;
    (ql.qi10 || []).forEach(e => eat(b, e, '10'));
    (ql.qi30 || []).forEach(e => eat(b, e, '30'));
  }
  const leaders = [...byCode.values()].map(c => ({
    code: c.code, name: c.name, boards: c.boards, boardCount: c.boards.length,
    kinds: [...c.kinds].sort(), count: c.count, totalCount: c.total || c.count, gain: Number((Number(c.gain) || 0).toFixed(2)),
    lianban: 0, sealTime: '', gainToday: null,
    leadScore: (c.count || 0) * 3 + c.boards.length * 2, tier: 4, isNew: false,
  })).sort((a, b) => b.leadScore - a.leadScore || b.count - a.count);
  return { day: d && d.date, prevDay: '', total: leaders.length, newCount: 0, leaders, _client: true };
}

function qiwStockExplain(l) {
  const list = [];
  const kinds = (l.kinds || []).map(String);
  if (kinds.includes('10') && kinds.includes('30')) list.push('10日和30日 QI 同时命中');
  else if (kinds.includes('10')) list.push('10日 QI 命中');
  else if (kinds.includes('30')) list.push('30日 QI 命中');
  if (Number(l.lianban) >= 2) list.push(`${Number(l.lianban)}连板`);
  if (Number(l.totalCount || l.count) > 0) list.push(`近10日${Number(l.totalCount || l.count)}次`);
  if (l.isNew) list.push('今日新晋');
  if ((l.boardCount || (l.boards || []).length) > 1) list.push(`跨${Number(l.boardCount || (l.boards || []).length)}个板块`);
  return list.slice(0, 3).join(' · ');
}
