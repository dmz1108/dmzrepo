// QI 龙头作战室：强势热点条 → 板块作战分区(左板块名片+右精选≤3龙头战绩卡)
function renderStrategyQiWarRoom(d) {
  let qb = d && d.qiBoard;
  if (!qb || !Array.isArray(qb.leaders)) qb = buildClientQiBoard(d);
  if (!qb.leaders.length) return '';
  const cbn = (typeof cleanBoardName === 'function') ? cleanBoardName : (n) => n;
  const boardsMeta = (d && d.boards) || {};
  const focusIds = new Set(((d && d.focus) || []).map(b => String(b.plateId)));
  // 每个被龙头命中的板块建 lane(候选龙头=boards 里含该板块的票)
  const laneMap = new Map();
  const ensureLane = (pid) => {
    pid = String(pid || ''); if (!pid) return null;
    if (!laneMap.has(pid)) laneMap.set(pid, { plateId: pid, plate: Object.assign({ plateId: pid }, boardsMeta[pid] || {}), cands: [] });
    return laneMap.get(pid);
  };
  for (const l of qb.leaders) for (const b of (l.boards || [])) { const ln = ensureLane(b.plateId); if (ln) ln.cands.push(l); }
  // 板块强度分(热点条+lane 共用)：涨幅 + 涨停数×3 + lane内最高连板×4 + 重点关注微加权
  const scoreCache = new Map();
  const boardScore = (pid) => {
    pid = String(pid); if (scoreCache.has(pid)) return scoreCache.get(pid);
    const ln = laneMap.get(pid); if (!ln) { scoreCache.set(pid, -1); return -1; }
    const m = ln.plate || {};
    const maxLb = ln.cands.reduce((mx, l) => Math.max(mx, Number(l.lianban) || 0), 0);
    const s = (Number(m.gainPct) || 0) * 1 + (Number(m.ztCount) || 0) * 3 + maxLb * 4 + (focusIds.has(pid) ? 5 : 0);
    scoreCache.set(pid, s); return s;
  };
  // 一票只归最强板块(去重，避免同票多分区刷屏)
  const homeStocks = new Map();
  for (const l of qb.leaders) {
    const bs = (l.boards || []).map(b => String(b.plateId)).filter(p => laneMap.has(p));
    if (!bs.length) continue;
    let home = bs[0], hs = boardScore(home);
    for (const p of bs) { const s = boardScore(p); if (s > hs) { hs = s; home = p; } }
    if (!homeStocks.has(home)) homeStocks.set(home, []);
    homeStocks.get(home).push(l);
  }
  // 板块内综合打分(连板主导+涨停次数+10日涨幅+今日/新晋微加分)，取 Top≤3
  const pickScore = (l) => (Number(l.lianban) || 0) * 40
    + Math.min(Number(l.totalCount || l.count) || 0, 8) * 8
    + Math.max(0, Math.min(Number(l.gain) || 0, 60)) * 0.6
    + (Number(l.gainToday) > 0 ? Number(l.gainToday) * 0.4 : 0)
    + (l.isNew ? 6 : 0);
  let lanes = [...laneMap.keys()].map(pid => {
    const ln = laneMap.get(pid);
    const stocks = (homeStocks.get(pid) || []).slice().sort((a, b) => pickScore(b) - pickScore(a)).slice(0, 3);
    return { plate: ln.plate, plateId: pid, score: boardScore(pid), stocks };
  }).filter(L => L.stocks.length).sort((a, b) => b.score - a.score);
  if (!lanes.length) return '';
  const maxScore = lanes.reduce((mx, L) => Math.max(mx, L.score), 1) || 1;
  const totalStocks = lanes.reduce((n, L) => n + L.stocks.length, 0);
  const hotbar = `<div class="qiw-hotbar">${lanes.map((L, i) => {
    const g = Number(L.plate.gainPct);
    const gtxt = Number.isFinite(g) ? `<em class="${g >= 0 ? 'up' : 'dn'}">${g >= 0 ? '+' : ''}${g}%</em>` : '';
    const zt = Number.isFinite(Number(L.plate.ztCount)) ? `<span class="qiw-hot-zt">${L.plate.ztCount}涨停</span>` : '';
    return `<button class="qiw-hot${i === 0 ? ' lead' : ''}" type="button" onclick="qiwScrollTo('${escapeHTML(L.plateId)}')"><span class="qiw-hot-rk">${i + 1}</span><b>${escapeHTML(cbn(L.plate.name, L.plateId) || L.plate.name || '—')}</b>${gtxt}${zt}</button>`;
  }).join('')}</div>`;
  const lanesHtml = lanes.map((L, i) => {
    const m = L.plate; const g = Number(m.gainPct);
    const bar = Math.max(6, Math.round(L.score / maxScore * 100));
    const net = (m.netInflow != null && typeof fmtYiHTML === 'function') ? fmtYiHTML(m.netInflow) : '';
    return `<div class="qiw-lane${i === 0 ? ' is-top' : ''}" id="qil-${escapeHTML(L.plateId)}">
      <div class="qiw-lane-side"><span class="qiw-lane-rail"></span>
        <div class="qiw-lane-name">${escapeHTML(cbn(m.name, L.plateId) || m.name || '—')}<b class="qiw-rank">#${i + 1}</b></div>

async function hydrateBoardZtCount(board) {
  const [qjRes, stocksRes] = await Promise.all([
    fetchPlateInfoQj(board.plateId).catch(() => null),
    fetchPlateStocks(board.plateId).catch(() => null),
  ]);
  const arr = qjRes?.List || qjRes?.list || [];
  if (arr.length > 5) {
    if (board.netInflow == null || isNaN(board.netInflow)) {
      board.netInflow = parseFloat(arr[3]);
    }
  }

  if (stocksRes) {
    const list = stocksRes.List || stocksRes.list || stocksRes.data || [];
    const stocks = list.map(s => ({
      code: s[0],
      name: s[1],
      gain: parseFloat(s[6]),
      ztState: s[23],
    }));
    const ztList = stocks.filter(isLimitUpRow)
      .sort((a, b) => b.gain - a.gain);
    board.ztCount = ztList.length;
    const gainValues = stocks
      .map(stock => Number(stock.gain))
      .filter(Number.isFinite);
    const shouldBackfillThsGain = isThsType()
      && Number(board.gainPct) === 0
      && gainValues.some(value => value !== 0);
    if ((!Number.isFinite(Number(board.gainPct)) || shouldBackfillThsGain) && gainValues.length) {
      board.gainPct = gainValues.reduce((sum, value) => sum + value, 0) / gainValues.length;
    }
    const cardData = state.cardData[board.plateId] || (state.cardData[board.plateId] = {});
    cardData.ztList = ztList;
    cardData.ztListTotal = ztList.length;
  } else if (arr.length > 5) {
    board.ztCount = Number(arr[5]) || 0;
  }
  return board;
}

async function streamStrongBoards(rankingCandidates, seq, scanState = {}) {
  if (!scanState.initialized) {
    scanState.initialized = true;
    scanState.freshStarted = false;
    scanState.shownIds = new Set();
    setCacheStatus('缓存: 筛选预览');
    if (!scanState.preservePreview) {
      state.boards = [];
      state.cardData = {};
      scanState.freshStarted = true;
      renderBoardSkeletons([], { filtering: true });
    }
  }

  const concurrency = Math.min(6, rankingCandidates.length);
  let cursor = 0;
  let completed = 0;
  const shownIds = scanState.shownIds || new Set();
  scanState.shownIds = shownIds;

  function freshBoardCount() {
    return scanState.freshStarted ? state.boards.length : shownIds.size;
  }

  function shouldContinueScan() {
    return (
      seq === state.loadSeq &&
      cursor < rankingCandidates.length &&
      freshBoardCount() < BOARD_COUNT
    );
  }

  async function worker() {
    while (shouldContinueScan()) {
      const idx = cursor++;
      const candidate = rankingCandidates[idx];
      let hydrated = null;
      try {
        hydrated = await hydrateBoardZtCount(candidate);
        hydrated._rankIndex = idx;
      } catch {
        completed++;
        continue;
      }
      completed++;
      if (
        seq === state.loadSeq &&
        Number(hydrated.ztCount) >= MIN_BOARD_ZT_COUNT &&
        freshBoardCount() < BOARD_COUNT &&
        !shownIds.has(String(hydrated.plateId))
      ) {
        if (!scanState.freshStarted) {
          state.boards = [];
          state.cardData = {};
          scanState.freshStarted = true;
          renderBoardSkeletons([], { filtering: true });
        }
        shownIds.add(String(hydrated.plateId));
        state.boards = [...state.boards, hydrated]
          .sort((a, b) => Number(a._rankIndex ?? Number.MAX_SAFE_INTEGER) - Number(b._rankIndex ?? Number.MAX_SAFE_INTEGER));
        appendBoardSkeleton(hydrated);
        updateBoardHeader(hydrated);
        writePreviewCache();
        document.getElementById('update-meta').textContent =
          `已显示 ${state.boards.length}/${BOARD_COUNT}，继续筛选中...`;
      }
    }
  }

  await Promise.all(Array.from({ length: concurrency }, worker));
  if (seq !== state.loadSeq) return false;

  document.getElementById('update-meta').textContent =
    scanState.freshStarted && state.boards.length
      ? `更新: ${formatTime(new Date())}，显示 ${state.boards.length} 个符合条件板块`
      : '更新: ' + formatTime(new Date());
  if (scanState.freshStarted && state.boards.length) {
    warmGainRankCache(state.boards, state.date, seq).catch(() => {
      if (seq === state.loadSeq) setCacheStatus('缓存: 预热失败');
    });
  }
  return scanState.freshStarted && state.boards.length > 0;
}

function renderCachedPreviewIfAvailable(seq) {
  const cached = readPreviewCache();
  if (!cached?.boards?.length || seq !== state.loadSeq) return false;
  rememberBoardNames(cached.boards, state.zsType);
  const hiddenBoards = getHiddenBoards(state.zsType);
  state.boards = cached.boards
    .filter(board => !hiddenBoards.has(String(board.plateId)))
    .slice(0, BOARD_COUNT);
  if (!state.boards.length) return false;
  state.cardData = {};
  renderBoardSkeletons(state.boards, { pending: true });
  document.getElementById('update-meta').textContent = '上次预览: ' + formatTime(new Date(Number(cached.savedAt))) + '，正在刷新';
  return true;
}

async function loadBoards() {
  try {
    const seq = ++state.loadSeq;
    state.cardDetailLoads = {};
    state.expandedCards.clear();
    clearError();
    const today = chinaToday();
    let hadCachedPreview = false;
    setCacheStatus('缓存: 加载中');
    if (EMPTY_ZS_TYPES.has(Number(state.zsType))) {
      state.usingSnapshot = false;
      state.boards = [];
      state.cardData = {};
      renderBoardSkeletons([]);
      document.getElementById('update-meta').textContent = '数据源待接入';
      setCacheStatus('状态: OK');
      showError('东财概念数据源暂时为空：真实东财板块和成分股接口确认后再接入。');
      return;
    }
    if (state.date === today) {
      hadCachedPreview = renderCachedPreviewIfAvailable(seq);
      if (hadCachedPreview) setCacheStatus('缓存: 实时预览');
    }
    const snapshot = await fetchDashboardSnapshot(state.date, state.zsType).catch(() => null);
    if (seq !== state.loadSeq) return;
    if (snapshot?.boards?.length) {
      state.usingSnapshot = true;
      rememberBoardNames(snapshot.boards, state.zsType);
      const hiddenBoards = getHiddenBoards(state.zsType);
      state.boards = snapshot.boards
        .filter(board => !hiddenBoards.has(String(board.plateId)))
        .slice(0, BOARD_COUNT);
      state.cardData = snapshot.cardData || {};
      restoreKPIFromSnapshot(snapshot.kpi);
      renderBoardSkeletons(state.boards);
      for (const b of state.boards) {
        renderCardContent(b.plateId, state.cardData[b.plateId] || {});
      }
      if (isThsType(state.zsType) && state.date === chinaToday()) {
        hydratePreviewZtCounts(state.boards, seq);
      }
      document.getElementById('update-meta').textContent = `${snapshot.confirmed ? '已确认快照' : '快照'}: ${state.date}`;
      setCacheStatus('缓存: 历史快照');
      return;
    }
    state.usingSnapshot = false;
    if (state.date !== today) {
      state.boards = [];
      state.cardData = {};
      renderBoardSkeletons([]);
      document.getElementById('update-meta').textContent = `无快照: ${state.date}`;
      setCacheStatus('缓存: 历史只读');
      showError(`${state.date} 没有本地快照。历史日期只读取快照，不加载实时接口。`);
      return;
    }
    if (!hadCachedPreview && state.date === today) {
      hadCachedPreview = renderCachedPreviewIfAvailable(seq);
      setCacheStatus('缓存: 实时预览');
    }

    const hiddenBoards = getHiddenBoards(state.zsType);
    const cachedPreview = readPreviewCache();
    const cachedBoardMap = new Map((cachedPreview?.boards || []).map(board => [String(board.plateId), board]));
    let rankingLoaded = false;
    const scanState = { preservePreview: hadCachedPreview };
    for (let step = 1; seq === state.loadSeq; step += 1) {
      const rankingData = await fetchBoardRanking(state.zsType, getBoardFetchCount(step)).catch(e => ({ _err: e.message }));
      if (seq !== state.loadSeq) return;
      const rankingList = rankingData && !rankingData._err ? (rankingData?.List || rankingData?.list || rankingData?.data || []) : [];
      const rankingAll = rankingList.map(row => ({
        plateId: row[0],
        name: row[1],
        memberCount: row[2],
        gainPct: parseFloat(row[3]),
        turnover: row[4],
        amount: row[5],
        netInflow: parseFloat(row[6]),
        superLargeNetInflow: rankingOptionalNumber(row[7]),
        superLargeNetInflowRatio: rankingOptionalNumber(row[8]),
        largeNetInflow: rankingOptionalNumber(row[9]),
        largeNetInflowRatio: rankingOptionalNumber(row[10]),
        ztCount: cachedBoardMap.get(String(row[0]))?.ztCount ?? '--',
      }));
      const lastLoadedGain = rankingAll.length ? Number(rankingAll[rankingAll.length - 1].gainPct) : null;
      rememberBoardNames(rankingAll, state.zsType);
      renderDeletedBoardsPanel();
      const hasDeletedInLoadedRange = rankingAll.some(board => hiddenBoards.has(String(board.plateId)));
      const rankingCandidates = rankingAll
        .filter(board => !hiddenBoards.has(String(board.plateId)))
        .filter(board => boardPassesGainFloor(board, state.zsType));

      if (rankingCandidates.length) {
        await streamStrongBoards(rankingCandidates, seq, scanState);
        rankingLoaded = true;
      }
      if (
        state.boards.length >= BOARD_COUNT ||
        (Number.isFinite(lastLoadedGain) && lastLoadedGain < MIN_BOARD_GAIN_PCT) ||
        rankingList.length < getBoardFetchCount(step)
      ) {
        break;
      }
    }

    if (!state.boards.length && !rankingLoaded) {
      const liveData = await fetchDashboardLive(state.date, state.zsType).catch(e => ({ _err: e.message }));
      if (seq !== state.loadSeq) return;
      if (liveData && !liveData._err && Array.isArray(liveData.boards)) {
        rememberBoardNames(liveData.boards, state.zsType);
        state.boards = liveData.boards.slice(0, BOARD_COUNT);
        state.cardData = liveData.cardData || {};
        renderKPI(liveData.kpi);
        renderBoardSkeletons(state.boards);
        hydratePreviewZtCounts(state.boards, seq);
        writePreviewCache();
      }
    }

    if (!state.boards.length) {
      document.getElementById('update-meta').textContent = '更新: ' + formatTime(new Date());
      return;
    }

    document.getElementById('update-meta').textContent = '更新: ' + formatTime(new Date());
  } catch (e) {
    showError('板块列表加载失败: ' + e.message);
    document.getElementById('board-grid').innerHTML =
      `<div class="card-error" style="grid-column: 1/-1;">⚠ ${escapeHTML(e.message)}</div>`;
    renderBoardPicker();
    renderDeletedBoardsPanel();
  }
}

async function loadAllCards() {
  const plates = state.boards.map(b => b.plateId);
  const names = state.boards.map(b => b.name);
  if (!plates.length) return;

  initProgressiveCardBodies();

  const plateTasks = state.boards.map(async b => {
    const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
    try {
      await loadSinglePlateData(b);
    } finally {
      cardData._ztListDone = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  });

  const ztGeneTask = (isExternalConceptType() || isDisabledType() ? Promise.resolve(null) : fetchZtGene(plates, names, state.date)).then(ztGeneRes => {
    if (!ztGeneRes) return;
    const ztMap = unwrapAggregate(ztGeneRes, plates);
    if (!ztMap) return;
    const globalRows = collectAllZtCountRows(ztMap);
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      if (cardData.zt10Source === 'precise') continue;
      const perBoard = ztMap[b.plateId] || ztMap[String(b.plateId)] || ztMap[b.name] || ztMap[String(b.name)] || {};
      const fallbackZt10 = normalizeZtCountRows(pickArray(perBoard, [
        'top_zt_count',
        'zt_count',
        'top10d_zt_count',
        'top10_zt_count',
        'zt10',
        'top_zt',
        'items',
        'stocks',
        'list',
        'List',
      ]));
      cardData.globalZt10 = globalRows;
      cardData.zt10 = fallbackZt10;
      cardData._zt10Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  }).catch(() => {});

  const preciseTask = fetchPreciseZt10(plates, names, state.date).then(preciseZtRes => {
    const preciseZtMap = preciseZtRes?.boards;
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      const preciseRows = preciseZtMap?.[b.plateId] || preciseZtMap?.[String(b.plateId)] || preciseZtMap?.[b.name] || preciseZtMap?.[String(b.name)] || [];
      if (Array.isArray(preciseRows) && preciseRows.length) {
        cardData.zt10 = normalizeZtCountRows(preciseRows);
        cardData.zt10Source = 'precise';
      }
      cardData._zt10Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  }).catch(() => {
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      cardData._zt10Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  });

  const gainTask = fetchGainRank(plates, state.date).then(gainRankRes => {
    const gainMap = unwrapAggregate(gainRankRes, plates);
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      const perBoard = gainMap?.[b.plateId] || gainMap?.[String(b.plateId)] || {};
      cardData.gain10 = pickArray(perBoard, ['top10d_gain', 'gain10', 'top_10d']);
      cardData.gain30 = pickArray(perBoard, ['top30d_gain', 'gain30', 'top_30d']);
      cardData._gain10Done = true;

    }

      cardData._gain10Done = true;

}

/**
 * 把聚合接口返回剥到"板块代码 -> 板块数据"的 map
 * 兼容多种结构:
 *   1) { "801048": {...}, "801001": {...} }     直接以代码为 key
 *   2) { results: { "801048": {...} } }         results 下
 *   3) { data: { "801048": {...} } }             data 下
 *   4) { boards: [ { plate_id: "801048", ... } ] }  数组
 *   5) { List: [...] }
 */
function unwrapAggregate(res, plateIds) {
  if (!res || res._err) return null;
  const candidates = [res.plates, res, res.results, res.data, res.result, res.payload];
  // 先尝试直接以板块代码作为 key
  for (const c of candidates) {
    if (!c || typeof c !== 'object') continue;
    const hit = plateIds.some(p => c[p] || c[String(p)]);
    if (hit) return c;
  }
  // 再尝试数组形式,把数组转 map
  const arrCandidates = [res.boards, res.list, res.List, res.items, Array.isArray(res) ? res : null];
  for (const arr of arrCandidates) {
    if (!Array.isArray(arr)) continue;
    const map = {};
    for (const item of arr) {
      const pid = item.plate_id || item.plateId || item.code || item.id;
      if (pid != null) map[pid] = item;
      const name = item.name || item.plate_name || item.plateName;
      if (name != null) map[name] = item;
    }
    if (plateIds.some(p => map[p] || map[String(p)])) return map;
  }
  return null;
}

function pickArray(obj, keys) {
  for (const k of keys) {
    if (Array.isArray(obj[k])) return obj[k];
  }
  return [];
}

function collectAllZtCountRows(map) {
  const rows = [];
  if (!map || typeof map !== 'object') return rows;
  for (const value of Object.values(map)) {
    if (!value || typeof value !== 'object') continue;
    rows.push(...pickArray(value, [
      'top_zt_count',
      'zt_count',
      'top10d_zt_count',
      'top10_zt_count',
      'zt10',
      'top_zt',
      'items',
      'stocks',
      'list',
      'List',
    ]));
  }
  return rows;
}

function normalizeZtCountRows(rows) {
  return (rows || []).map(r => {
    if (Array.isArray(r)) {
      return {
        code: r[0],
        name: r[1],
        totalCount: r[2] ?? r[3] ?? 0,
        ztCount: r[3] ?? r[2] ?? 0,
        todayGain: parseFloat(r[4] ?? r[5] ?? 0),
      };
    }
    return {
      ...r,
      code: r.code ?? r.stock_code ?? r.stockCode ?? r.dm,
      name: r.name ?? r.stock_name ?? r.stockName ?? r.mc,
      totalCount: r.totalCount ?? r.total_count ?? r.total ?? r.count ?? r.ztTotal ?? r.zt_total ?? 0,
      ztCount: r.ztCount ?? r.zt_count ?? r.mainCount ?? r.main_count ?? r.main ?? r.primaryCount ?? r.primary_count ?? 0,
      todayGain: parseFloat(r.todayGain ?? r.today_gain ?? r.gain ?? r.zdf ?? r.change_pct ?? 0),
    };
  }).filter(r => r.code || r.name);
}

async function loadSinglePlateData(board) {
  const cardData = state.cardData[board.plateId] || (state.cardData[board.plateId] = {});

  // 并发拉成分股 + 净流入 + 涨停数
  const [stocksRes, qjRes, pankouRes] = await Promise.all([
    fetchPlateStocks(board.plateId).catch(e => ({ _err: e.message })),
    fetchPlateInfoQj(board.plateId).catch(e => ({ _err: e.message })),
    fetchPlatePankou(board.plateId).catch(() => null),
  ]);

  // 成分股 -> 涨停榜单
  if (stocksRes && !stocksRes._err) {
    const list = stocksRes.List || stocksRes.list || stocksRes.data || [];
    const stocks = list.map(s => ({
      code: s[0],
      name: s[1],
      price: parseFloat(s[5]),
      gain: parseFloat(s[6]),
      amount: s[7],
      turnover: s[8],
      ztState: s[23],
    }));
    // 涨停榜单：筛出今日封板的
    cardData.ztList = stocks.filter(isLimitUpRow)
      .sort((a, b) => b.gain - a.gain);
    cardData.ztListTotal = cardData.ztList.length;
    board.ztCount = cardData.ztList.length;
  }

  // 区间统计 -> 净流入 fallback
  if (qjRes && !qjRes._err) {
    const arr = qjRes.List || qjRes.list || [];
    if (arr.length > 5) {
      if (board.netInflow == null || isNaN(board.netInflow)) {
        board.netInflow = parseFloat(arr[3]);
      }
    }
  }

  // pankou -> 净流入(优先)
  if (pankouRes && pankouRes.pankou) {
    const ni = parseFloat(pankouRes.pankou[5]);
    if (!isNaN(ni)) board.netInflow = ni;
  }

  updateBoardHeader(board);
  writePreviewCache();

  return cardData;
}

// ===== 后台轮转刷新 =====
// 每 ~60 秒刷新一个“非当前查看”的源（东财→同花顺→KPL 轮流），任意时刻只刷 1 个、绝不同时；
// 绝不前台刷新正在看的源（不打断）；结果存入按源缓存，切到该源时秒出。仅管理员(有 apiKey)、
// 仅“今日”实时、仅看板页时运行。
const SOURCE_ROTATE_INTERVAL_MS = 60 * 1000;
const SOURCE_CACHE_TTL_MS = 150 * 1000;
let sourceRotateIdx = -1;
let sourceRotateRunning = false;
function dashboardSourceTypes() {
  const types = [...document.querySelectorAll('.seg-btn[data-zs]')]
    .map(b => Number(b.dataset.zs))
    .filter(zs => Number.isFinite(zs) && !EMPTY_ZS_TYPES.has(zs));
  return types.length ? types : [6, 5, 7];
}
async function backgroundRotateRefresh() {
  if (!state.sourceCache) state.sourceCache = {};
  if (sourceRotateRunning) return;
  if (state.page !== 'dashboard') return;
  if (!state.apiKey) return;                                  // 自动刷新仅在管理员(有key)时进行
  if (state.date !== chinaToday()) return;          // 仅“今日”做实时轮转
  const others = dashboardSourceTypes().filter(zs => zs !== Number(state.zsType));
  if (!others.length) return;
  sourceRotateIdx = (sourceRotateIdx + 1) % others.length;
  const zs = others[sourceRotateIdx];
  sourceRotateRunning = true;
  try {
    const data = await fetchDashboardLive(chinaToday(), zs);
    if (data && Array.isArray(data.boards)) {
      state.sourceCache[zs] = {
        boards: data.boards,
        cardData: data.cardData || {},
        kpi: data.kpi || null,
        at: Date.now(),
      };
    }
  } catch (e) {
    // 后台预取失败静默处理，不影响当前页面
  } finally {
    sourceRotateRunning = false;
  }
}
function hydrateDashboardFromCache(zs) {
  try {
    if (!state.sourceCache) state.sourceCache = {};
    const c = state.sourceCache[Number(zs)];
    if (!c || (Date.now() - c.at) > SOURCE_CACHE_TTL_MS) return false;
    const hiddenBoards = getHiddenBoards(zs);
    state.usingSnapshot = false;
    state.boards = (c.boards || [])
      .filter(b => !hiddenBoards.has(String(b.plateId)))
      .slice(0, BOARD_COUNT);
    state.cardData = c.cardData || {};
    if (c.kpi) renderKPI(c.kpi);
    renderBoardSkeletons(state.boards);
    for (const b of state.boards) renderCardContent(b.plateId, state.cardData[b.plateId] || {});
    document.getElementById('update-meta').textContent = '更新: ' + formatTime(new Date(c.at));
    return state.boards.length > 0;
  } catch (e) {
    return false;
  }
}

async function refreshAdminStatus() {
  state.adminToken = readSharedAuthToken();
  const snapshot = readSharedAccountSession();
  if (state.adminToken && snapshot?.name) {
    state.accountLoggedIn = true;
    state.accountName = snapshot.name;
    state.accountRole = snapshot.admin ? 'admin' : 'user';
    state.adminLoggedIn = !!snapshot.admin;
    state.adminName = snapshot.admin ? snapshot.name : '';
    updateAdminUi();
  }
  if (!state.adminToken) {
    resetAccountState();
    state.authChecked = true;
    updateAdminUi();
    return false;
  }
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/auth/me?_=${Date.now()}`, {
      cache: 'no-store',
      headers: adminHeaders(),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      resetAccountState({ clearToken: res.status === 401 || res.status === 403 });
      state.authChecked = true;
      updateAdminUi();
      return false;
    }
    const user = data.user || null;
    state.accountLoggedIn = !!user;
    state.accountName = user?.username || '';
    state.accountRole = user?.role || '';
    state.adminLoggedIn = !!data.admin;
    state.adminName = user?.username || '';
    if (state.adminToken) writeSharedAuthToken(state.adminToken);
    if (!user) {
      resetAccountState({ clearToken: true });
    }
    state.authChecked = true;
  } catch {
    resetAccountState();
    state.authChecked = true;
  }
  updateAdminUi();
  return !!state.adminLoggedIn;
}

  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(accountAuthErrorMessage(data.error || `HTTP ${res.status}`));
  if (data.delivery && data.delivery !== 'smtp') {
    throw new Error(accountAuthErrorMessage(data.smtpConfigured ? 'email delivery failed' : 'smtp not configured'));
  }
  return data;
}

function applyAccountLoginResult(data, fallbackUsername = '') {
  const user = data.user || {};
  state.adminToken = data.token;
  state.accountLoggedIn = true;
  state.accountName = user.username || data.username || fallbackUsername;
  state.accountRole = user.role || data.role || (data.admin ? 'admin' : 'user');
  state.adminLoggedIn = !!data.admin || state.accountRole === 'admin';
  state.adminName = state.adminLoggedIn ? (state.accountName || fallbackUsername) : '';
  writeSharedAuthToken(data.token);
  writeSharedAccountSession({
    name: state.accountName,
    admin: state.adminLoggedIn,
  });
}

async function loginAdmin() {
  const userInput = document.getElementById('admin-username-input');
  const passInput = document.getElementById('admin-password-input');
  const username = userInput?.value?.trim() || '';
  const password = passInput?.value?.trim() || '';
  if (!username || !password) {
    showError('请输入账号和密码');
    return;
  }
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.token) throw new Error(data.error || `HTTP ${res.status}`);
    applyAccountLoginResult(data, username);
    if (passInput) passInput.value = '';
    updateAdminUi();
    clearError();
    closeKeyModal();
  } catch (err) {
    showError(`登录失败：${err.message}`);

}

async function syncMainReasonDb() {
  setMainReasonSyncStatus('正在校验管理员...', 'running');
  await refreshAdminStatus();
  if (!state.adminLoggedIn) {
    setMainReasonSyncStatus('', 'idle');
    openKeyModal();
    showError('请先登录有权限的账号');
    return;
  }
  const btn = document.getElementById('main-reason-sync-btn');
  const oldText = btn?.textContent || '同步';
  if (btn) {
    btn.disabled = true;
    btn.textContent = '检查中...';
  }
  try {
    const mainReasonSyncDays = 3;
    setMainReasonSyncStatus(`检查近${mainReasonSyncDays}个交易日...`, 'running', `正在补齐近${mainReasonSyncDays}个交易日缺失或不完整的五来源主因库数据`);
    const res = await fetch(`${KPL_STATS_BASE}/api/limit-up-main-reason-db/sync?mode=missing&day=${encodeURIComponent(state.date)}&days=${mainReasonSyncDays}&_=${Date.now()}`, {
      cache: 'no-store',
      headers: adminHeaders(state.apiKey ? { 'x-api-key': state.apiKey } : {}),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      if (res.status === 401 || res.status === 403 || data.error === 'admin required') {
        resetAccountState({ clearToken: true });
        updateAdminUi();
        openKeyModal();
      }
      throw new Error(data.error === 'admin required' ? '登录已失效，请重新登录' : (data.error || `HTTP ${res.status}`));
    }
    const syncedDays = (data.days || []).filter(item => item.synced).map(item => item.day);
    const pendingDays = (data.days || []).filter(item => item.needsSync && !item.synced).map(item => item.day);
    const scanned = data.scanned ?? data.checkedDays ?? '--';
    const synced = data.synced ?? syncedDays.length;
    const pending = data.pending ?? pendingDays.length;
    const pendingSourceLabels = [...new Set((data.days || [])
      .flatMap(item => Array.isArray(item.missingSourceLabels) ? item.missingSourceLabels : []))]
      .filter(Boolean);
    const pendingReasonText = pendingSourceLabels.length ? `，缺${pendingSourceLabels.join('、')}` : '';
    const formatSyncDayDetail = (item) => {
      const stateText = item.synced ? '已同步' : (item.needsSync ? '待补齐' : '已完整');
      const countText = Number(item.mainReasonCount ?? item.count);
      const missingSources = Array.isArray(item.missingSourceLabels) && item.missingSourceLabels.length
        ? ` · 缺来源: ${item.missingSourceLabels.join('、')}`
        : '';
      const officialSourceStats = Array.isArray(item.sourceArtifactStats) && item.sourceArtifactStats.length
        ? item.sourceArtifactStats
        : (Array.isArray(item.sourceGroupStats) ? item.sourceGroupStats : []);
      const sourceStats = officialSourceStats.length
        ? ` · 底层文件: ${officialSourceStats.map(source => {
          const label = source.label || source.group || '--';
          const value = source.ok ? Number(source.count || source.stockCount || source.mainReasonStockCount || 0) : '缺';
          return `${label}:${value}`;
        }).join('，')}`
        : '';
      return `${item.day}: ${stateText}${Number.isFinite(countText) ? ` ${countText}只` : ''}${missingSources}${sourceStats}${item.error ? ` · ${item.error}` : ''}`;
    };
    const recentDetail = (Array.isArray(data.days) ? [...data.days] : [])
      .filter(item => item && item.day)
      .sort((a, b) => String(b.day).localeCompare(String(a.day)))
      .slice(0, 3)
      .map(formatSyncDayDetail)
      .join('\n');
    setMainReasonSyncStatus(
      `完成：扫${scanned}日，同步${synced}，待${pending}${pendingReasonText}`,
      pending ? 'running' : 'ok',
      `主因库检查完成\n扫描交易日：${scanned}\n已同步：${synced}\n仍待处理：${pending}${pendingSourceLabels.length ? `\n缺失来源：${pendingSourceLabels.join('、')}` : ''}\n规则：${data.ruleVersion || '--'}${recentDetail ? `\n\n最近3个交易日：\n${recentDetail}` : ''}`
    );
    if (state.page === 'review') refreshLimitupReviewPage();
    refreshJiuyangongsheAuthStatus();
    refreshAfterCloseStatus();
  } catch (err) {
    setMainReasonSyncStatus(`失败：${err.message}`, 'error', err.message || String(err));
    showError(`主因库同步失败：${err.message}`);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = oldText;
    }
  }
}

function openDatePicker() {

      picker.showPicker();

function normalizeDocsCards(cards, fallbackToDefault = true) {
  if (!Array.isArray(cards)) return fallbackToDefault ? DEFAULT_DOCS_CARDS.map(card => ({ ...card })) : [];
  const normalized = cards
    .map((card, index) => {
      if (typeof card === 'string') {
        return {
          id: `doc-${index}`,
          tone: index === 0 ? 'primary' : 'long',
          text: card,
        };
      }
      const text = String(card?.text ?? '').trimEnd();
      return {
        id: String(card?.id || `doc-${index}-${Date.now()}`),
        tone: card?.tone === 'primary' ? 'primary' : 'long',
        text,
      };
    })
    .filter(Boolean);
  return normalized.length ? normalized : (fallbackToDefault ? DEFAULT_DOCS_CARDS.map(card => ({ ...card })) : []);
}

function setDocsSaveStatus(text = '', type = '') {
  const el = document.getElementById('docs-save-status');
  if (!el) return;
  el.textContent = text || '';
  el.classList.toggle('is-ok', type === 'ok');
  el.classList.toggle('is-error', type === 'error');
}

function localDocsCardsExist() {
  try {
    return localStorage.getItem(DOCS_CARDS_STORAGE) !== null;
  } catch {
    return false;
  }
}

function readLocalDocsCards(fallbackToDefault = true) {
  try {
    const raw = localStorage.getItem(DOCS_CARDS_STORAGE);
    if (raw === null) return fallbackToDefault ? DEFAULT_DOCS_CARDS.map(card => ({ ...card })) : [];
    return normalizeDocsCards(JSON.parse(raw), false);
  } catch {
    return fallbackToDefault ? DEFAULT_DOCS_CARDS.map(card => ({ ...card })) : [];
  }
}

function writeLocalDocsCards(cards) {
  try {
    localStorage.setItem(DOCS_CARDS_STORAGE, JSON.stringify(normalizeDocsCards(cards, false)));
  } catch {}
}

function getDocsCards() {
  if (state.docsLoaded) return normalizeDocsCards(state.docsCards, false);
  return readLocalDocsCards(true);
}

async function loadDocsCards({ render = false } = {}) {
  if (state.docsLoading) return state.docsLoading;
  state.docsLoading = (async () => {
    const hasLocal = localDocsCardsExist();
    const localCards = readLocalDocsCards(true);
    try {
      if (render) setDocsSaveStatus('正在读取云端文档...', '');
      const res = await fetch(`${KPL_STATS_BASE}/api/docs-cards?_=${Date.now()}`, { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      if (data.exists && Array.isArray(data.cards)) {
        const cards = normalizeDocsCards(data.cards, false);
        state.docsCards = cards;
        state.docsLoaded = true;
        state.docsNeedsCloudSave = false;
        writeLocalDocsCards(cards);
        setDocsSaveStatus(data.updatedAt ? `云端已保存 ${formatTime(new Date(data.updatedAt))}` : '已读取云端文档', 'ok');
      } else {
        state.docsCards = localCards;
        state.docsLoaded = true;
        state.docsNeedsCloudSave = hasLocal;
        setDocsSaveStatus(hasLocal ? '使用本机文档，管理员登录后会保存到云端' : '云端暂无文档，显示默认内容', '');
        if (hasLocal && state.adminLoggedIn) saveDocsCards(localCards, { immediate: true, silent: true });
      }
    } catch {
      state.docsCards = localCards;
      state.docsLoaded = true;
      setDocsSaveStatus('云端读取失败，当前使用本机备份', 'error');
    } finally {
      state.docsLoading = null;
      if (render && state.page === 'docs') renderDocsCards({ skipLoad: true });
    }
  })();
  return state.docsLoading;
}

function scheduleDocsCloudSave(cards, { immediate = false, silent = false } = {}) {
  if (!state.adminLoggedIn) {
    state.docsNeedsCloudSave = true;
    setDocsSaveStatus('已保存到本机，管理员登录后才会保存到云端', '');
    return;
  }
  clearTimeout(state.docsSaveTimer);
  const run = async () => {
    try {
      if (!silent) setDocsSaveStatus('正在保存到云端...', '');
      const res = await fetch(`${KPL_STATS_BASE}/api/docs-cards`, {
        method: 'POST',
        cache: 'no-store',
        headers: adminHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ cards }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        if (res.status === 401 || res.status === 403 || data.error === 'admin required') {
          resetAccountState({ clearToken: true });
          updateAdminUi();
        }
        throw new Error(data.error || `HTTP ${res.status}`);
      }
      state.docsNeedsCloudSave = false;
      setDocsSaveStatus(data.updatedAt ? `云端已保存 ${formatTime(new Date(data.updatedAt))}` : '云端已保存', 'ok');
    } catch {
      state.docsNeedsCloudSave = true;
      setDocsSaveStatus('本机已保留，云端保存失败', 'error');
    }
  };
  if (immediate) {
    run();
  } else {
    state.docsSaveTimer = setTimeout(run, 650);
  }
}

function saveDocsCards(cards, options = {}) {
  const normalized = normalizeDocsCards(cards, false);
  state.docsCards = normalized;
  state.docsLoaded = true;
  state.docsNeedsCloudSave = true;
  writeLocalDocsCards(normalized);
  scheduleDocsCloudSave(normalized, options);
}

function resizeDocsEditor(editor) {
  if (!editor) return;
  editor.style.height = 'auto';
  editor.style.height = `${editor.scrollHeight}px`;
}

function handleDocsInput(editor) {
  if (!state.adminLoggedIn) return;
  const cards = getDocsCards();
  const id = editor.dataset.docId;
  const target = cards.find(card => card.id === id);
  if (target) {
    target.text = editor.value;
    saveDocsCards(cards);
  }
  resizeDocsEditor(editor);
}

function renderDocsCards({ skipLoad = false } = {}) {
  const stack = document.getElementById('docs-stack');
  if (!stack) return;
  if (!skipLoad && !state.docsLoaded) loadDocsCards({ render: true });
  const cards = getDocsCards();
  const canEdit = !!state.adminLoggedIn;
  stack.innerHTML = cards.map((card, index) => {
    const toneClass = card.tone === 'primary' || index === 0 ? 'docs-card-primary' : 'docs-card-long';
    return `
      <section class="docs-card ${toneClass}" data-doc-id="${escapeHTML(card.id)}">
        ${canEdit ? `<button class="docs-card-delete" type="button" title="删除卡片" aria-label="删除文档卡片" data-doc-id="${escapeHTML(card.id)}">&times;</button>` : ''}
        <textarea class="docs-editor" data-doc-id="${escapeHTML(card.id)}" spellcheck="false" aria-label="文档卡片" ${canEdit ? '' : 'readonly'}>${escapeHTML(card.text)}</textarea>
      </section>
    `;
  }).join('');
  stack.querySelectorAll('.docs-editor').forEach(editor => {
    editor.addEventListener('input', () => handleDocsInput(editor));
    resizeDocsEditor(editor);
  });
  stack.querySelectorAll('.docs-card-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteDocsCard(btn));
  });
}

function addDocsCard() {
  if (!state.adminLoggedIn) {
    openKeyModal();
    showError('请先登录有权限的账号再修改文档');
    return;
  }
  const cards = getDocsCards();
  const card = {
    id: `doc-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    tone: 'long',
    text: '',
  };
  cards.push(card);
  saveDocsCards(cards, { immediate: true });
  renderDocsCards();
  requestAnimationFrame(() => {
    const editor = document.querySelector(`.docs-editor[data-doc-id="${CSS.escape(card.id)}"]`);
    if (editor) {
      editor.focus();
      resizeDocsEditor(editor);
    }
  });
}

function deleteDocsCard(btnOrId) {
  if (!state.adminLoggedIn) {
    openKeyModal();
    showError('请先登录有权限的账号再修改文档');
    return;
  }
  const id = typeof btnOrId === 'string' ? btnOrId : btnOrId?.dataset?.docId;
  if (!id) return;
  if (!confirm('删除这张文档卡片？')) return;
  const cards = getDocsCards().filter(card => card.id !== id);
  saveDocsCards(cards, { immediate: true });
  renderDocsCards();
}

window.addDocsCard = addDocsCard;
window.deleteDocsCard = deleteDocsCard;
window.handleDocsInput = handleDocsInput;
window.renderDocsCards = renderDocsCards;

function switchPage(page, options = {}) {
  const nextPage = page === 'docs' || page === 'review' || page === 'strategy' ? page : 'dashboard';
  const pushHash = options.pushHash !== false;
  const shouldRefresh = options.refresh !== false;
  state.page = nextPage;
  const liveDateChanged = ensureLivePageToday(nextPage, options);
  document.body.classList.toggle('view-docs', nextPage === 'docs');
  document.body.classList.toggle('view-review', nextPage === 'review');
  document.body.classList.toggle('view-strategy', nextPage === 'strategy');
  document.querySelectorAll('.nav-item[data-page]').forEach(item => {
    item.classList.toggle('active', item.dataset.page === nextPage);
  });
  const titleEl = document.querySelector('.page-title');
  if (titleEl) {
    titleEl.textContent = nextPage === 'review' ? '涨停复盘' : nextPage === 'strategy' ? '今日策略' : (nextPage === 'docs' ? '文档' : '今日实时');
  }
  updateManualRefreshButton();
  syncDatePickerForPage();
  if (pushHash) {
    const targetHash = nextPage === 'docs' ? '#docs' : (nextPage === 'review' ? '#review' : (nextPage === 'strategy' ? '#strategy' : '#dashboard'));
    if (location.hash !== targetHash) location.hash = targetHash;
  }
  if (!ensureAccountAccess(nextPage)) return;
  if (nextPage === 'dashboard') armHotSearchAutoClear();
  if (nextPage === 'docs') renderDocsCards();
  if (nextPage === 'review' && shouldRefresh) refreshLimitupReviewPage();
  if (nextPage === 'strategy') {
    if (liveDateChanged) delete state.strategyData[state.date];
    renderStrategyPage();
    if (shouldRefresh) loadStrategyData(state.date);
  }
  if (nextPage === 'dashboard' && shouldRefresh && (liveDateChanged || !state.boards.length)) {
    if (liveDateChanged) {
      state.boards = [];
      state.cardData = {};
      state.usingSnapshot = false;
    }
    refreshAll({ force: liveDateChanged });
  }
}

datePicker.value = state.date;
datePicker.addEventListener('click', () => openDatePicker());

// 自动刷新读秒/勾选框已移除；改为后台轮转刷新（见 backgroundRotateRefresh）。
document.querySelector('.docs-add-card')?.addEventListener('click', addDocsCard);
window.addEventListener('hashchange', () => {

});
window.addEventListener('pageshow', () => {

  if (!refreshed && state.page === 'dashboard') armHotSearchAutoClear();
});
window.addEventListener('focus', () => {
  refreshAdminStatus();
  refreshLivePageAfterDateSync();
});
applySharedAccountSnapshot();
updateAdminUi();
switchPage(state.page, { pushHash: false, refresh: false });
refreshOpportunityBoardState();
refreshAfterCloseStatus();
refreshJiuyangongsheAuthStatus();
refreshAdminStatus();

syncAllPermanentHiddenBoards().catch(() => {}).finally(() => {
  if (state.page === 'docs') {
    loadIndexInfo().catch(() => {});
  } else if (state.page === 'review') {
    loadIndexInfo().catch(() => {});
    refreshLimitupReviewPage();
  } else if (state.page === 'strategy') {
    loadIndexInfo().catch(() => {});
    renderStrategyPage();
  } else {
    refreshAll();
  }
});

state.sourceCache = {};
state.countdownTimer = setInterval(backgroundRotateRefresh, SOURCE_ROTATE_INTERVAL_MS);
