<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>娱乐 · Qi</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 135'%3E%3Crect width='160' height='135' fill='%23232a3a' rx='28'/%3E%3Ccircle cx='61' cy='68' r='30' stroke='%23eef2f7' stroke-width='11' fill='none'/%3E%3Cpath d='M78 84 L92 98' stroke='%23eef2f7' stroke-width='11' stroke-linecap='round'/%3E%3Crect x='106.5' y='61' width='11' height='37' rx='5.5' fill='%23eef2f7'/%3E%3Ccircle cx='112' cy='43' r='9' fill='%234a9bff'/%3E%3C/svg%3E">
<link href="vendor/dreamerqi-fonts.css?v=2" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.145 0.012 265); --panel:oklch(0.19 0.014 265); --panel2:oklch(0.235 0.015 265);
    --ink:oklch(0.97 0.002 265); --sub:oklch(0.73 0.014 265); --faint:oklch(0.58 0.014 265);
    --line:oklch(0.29 0.014 265); --lineStrong:oklch(0.39 0.025 255);
    --blue:oklch(0.72 0.15 242); --blueSoft:oklch(0.82 0.10 240); --blueWash:oklch(0.28 0.055 248);
    --disp:"Space Grotesk","Helvetica Neue",sans-serif; --mono:"Space Mono",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;min-height:100%;overflow-x:hidden;}
  body{background:
    radial-gradient(circle at 84% -10%,oklch(0.37 0.085 248 / .18),transparent 30rem),
    radial-gradient(circle at -8% 28%,oklch(0.30 0.055 292 / .10),transparent 28rem),var(--bg);
    color:var(--ink);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  a{color:inherit;text-decoration:none;}
  button{font:inherit;}
  a:focus-visible,button:focus-visible{outline:2px solid var(--blueSoft);outline-offset:3px;}
  .nav{min-height:82px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:flex-start;
       gap:clamp(14px,3vw,30px);padding:12px clamp(18px,4vw,56px);background:oklch(0.145 0.012 265 / .94);z-index:40;}
  .nav a.brand{display:flex;align-items:center;min-width:0;flex:0 0 auto;}
  .nav a.brand svg{width:auto;height:56px;display:block;overflow:visible;}
  .nav .links{display:flex;align-items:center;justify-content:flex-start;flex:0 1 auto;flex-wrap:wrap;
              gap:clamp(16px,2.2vw,30px);min-width:0;}
  .nav .links a{font-size:15px;color:var(--sub);font-weight:500;display:inline-flex;align-items:center;justify-content:center;
                 padding:8px 0;border-bottom:2px solid transparent;white-space:nowrap;transition:color .18s,border-color .18s;}
  .nav .links a.active{color:var(--ink);font-weight:700;border-bottom-color:var(--blue);}
  .nav .links a:hover{color:var(--ink);}
  .account-area{margin-left:auto;display:flex;align-items:center;justify-content:flex-end;flex:0 1 auto;flex-wrap:wrap;gap:12px;min-width:0;}
  .account-pill{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;background:oklch(0.205 0.014 265 / .72);
                min-height:38px;padding:4px 5px 4px 10px;color:var(--sub);max-width:min(360px,42vw);}
  .account-pill.is-logged-in{border-color:oklch(0.72 0.15 242 / .42);background:oklch(0.205 0.026 250 / .78);}
  .account-avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--blue);
                  color:var(--bg);font-family:var(--disp);font-weight:800;font-size:12px;flex:0 0 auto;}
  .account-name{color:var(--ink);font-size:14px;font-weight:700;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .account-role{color:var(--faint);font-size:12px;white-space:nowrap;}
  .account-action{min-height:38px;border:1px solid var(--line);border-radius:8px;background:oklch(0.205 0.014 265 / .58);color:var(--sub);
                  padding:9px 15px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:14.5px;font-weight:600;
                  transition:background .18s,border-color .18s,color .18s,transform .18s;white-space:nowrap;}
  .account-action:hover{color:var(--ink);border-color:oklch(0.58 0.11 245);background:oklch(0.255 0.035 250 / .86);transform:translateY(-1px);}
  .account-action.primary{background:linear-gradient(135deg,var(--blue),var(--blueSoft));border-color:transparent;color:var(--bg);font-weight:700;
                          box-shadow:0 0 22px oklch(0.72 0.15 242 / .24);}
  .auth-ov{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.64);backdrop-filter:blur(14px);display:grid;place-items:center;padding:20px;}
  .auth-modal{width:min(420px,100%);background:var(--panel);border:1px solid var(--lineStrong);border-radius:10px;box-shadow:0 28px 90px rgba(0,0,0,.48);padding:22px;}
  .auth-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;}
  .auth-head h2{margin:0;font-family:var(--disp);font-size:24px;font-weight:650;}
  .auth-head p{margin:7px 0 0;color:var(--sub);font-size:14px;line-height:1.6;}
  .auth-close{height:34px;padding:0 10px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;}
  .auth-field{display:grid;gap:7px;margin-top:12px;}
  .auth-field label{font-size:12px;color:var(--faint);font-family:var(--mono);}
  .auth-field input{width:100%;height:44px;border-radius:9px;border:1px solid var(--line);background:oklch(0.165 0.013 265);color:var(--ink);padding:0 12px;outline:none;}
  .auth-field input:focus{border-color:oklch(0.58 0.11 245);}
  .auth-msg{min-height:20px;margin-top:12px;color:oklch(0.72 0.2 28);font-size:13px;line-height:1.5;}
  .auth-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:16px;}
  .wrap{max-width:1180px;margin:0 auto;padding:clamp(28px,5vw,64px) 16px 84px;}
  .hero{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(290px,.55fr);gap:clamp(28px,6vw,80px);align-items:end;
        padding:0 0 clamp(32px,5vw,52px);border-bottom:1px solid var(--line);}
  .hero-eyebrow{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--blueSoft);text-transform:uppercase;}
  .hero-eyebrow::before{content:"";width:26px;height:1px;background:var(--blue);}
  .hero h1{max-width:760px;font-family:var(--disp);font-size:clamp(42px,6.6vw,82px);font-weight:560;line-height:.98;letter-spacing:-.045em;margin:18px 0 0;}
  .hero h1 span{color:var(--blue);}
  .hero p{color:var(--sub);font-size:16px;margin:20px 0 0;max-width:650px;line-height:1.72;}
  .hero-brief{border-top:2px solid var(--blue);border-bottom:1px solid var(--line);padding:14px 0 16px;}
  .brief-label{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px;}
  .brief-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .brief-stat{display:grid;gap:5px;}
  .brief-stat strong{font-family:var(--disp);font-size:34px;font-weight:600;line-height:1;color:var(--ink);}
  .brief-stat span{color:var(--faint);font-size:12px;line-height:1.4;}
  .brief-meta{display:grid;gap:7px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
  .brief-update{display:flex;align-items:baseline;justify-content:space-between;gap:14px;font-family:var(--mono);}
  .brief-update-label{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}
  .brief-update time{font-size:11px;line-height:1.5;color:var(--ink);text-align:right;}
  .brief-update[data-state="error"] time{color:var(--faint);}
  .brief-note{margin:0!important;font-family:var(--mono);font-size:10.5px!important;line-height:1.55!important;color:var(--blueSoft)!important;}
  .channel-bar{position:sticky;top:0;z-index:30;display:grid;grid-template-columns:96px minmax(0,1fr);align-items:center;
               margin:0 0 28px;border-bottom:1px solid var(--line);background:oklch(0.145 0.012 265 / .94);backdrop-filter:blur(18px);}
  .channel-label{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;}
  .tabs{display:flex;gap:8px;overflow-x:auto;flex-wrap:nowrap;padding:12px 0;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{font-size:13.5px;color:var(--sub);border:1px solid transparent;background:transparent;
       min-height:38px;padding:0 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:color .18s,border-color .18s,background .18s;
       display:inline-flex;align-items:center;gap:7px;appearance:none;}
  .tab:hover{color:var(--ink);border-color:var(--lineStrong);background:var(--panel);}
  .tab.active{color:var(--bg);background:var(--blue);border-color:var(--blue);font-weight:750;}
  .tab .n{font-family:var(--mono);font-size:11px;color:inherit;opacity:.86;margin-left:0;min-width:22px;height:22px;padding:0 7px;border-radius:999px;
          display:inline-flex;align-items:center;justify-content:center;background:oklch(0.265 0.018 265 / .82);line-height:1;}
  .tab.active .n{background:oklch(0.16 0.018 265 / .18);}
  .today{margin:0 0 54px;}
  .today-head,.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:18px;}
  .section-kicker{font-family:var(--mono);font-size:10px;color:var(--blueSoft);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
  .today-head h2,.section h2{font-family:var(--disp);font-size:clamp(24px,3vw,32px);letter-spacing:-.02em;font-weight:600;margin:0;color:var(--ink);}
  .today-head span,.section .sub{font-family:var(--mono);font-size:11px;color:var(--faint);}
  .feature-grid{display:grid;grid-template-columns:minmax(0,1.38fr) minmax(300px,.62fr);gap:16px;}
  .lead-card{display:grid;grid-template-columns:minmax(280px,1.08fr) minmax(260px,.92fr);min-height:410px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:border-color .18s,transform .18s;}
  .lead-card:hover{border-color:var(--lineStrong);transform:translateY(-2px);}
  .lead-card img{width:100%;height:100%;object-fit:cover;background:var(--panel2);}
  .lead-card.poster img,.card.poster .thumb,.story.poster img,.detail .imgs img.poster{object-fit:contain;background:linear-gradient(135deg,var(--panel2),var(--bg));}
  .lead-card.poster img{padding:18px;}
  .card.poster .thumb,.story.poster img{padding:8px;}
  .lead-card .lead-body{padding:clamp(22px,3vw,34px);display:flex;flex-direction:column;justify-content:flex-end;gap:15px;}
  .lead-kicker,.card .src,.story .src{font-family:var(--mono);font-size:10px;color:var(--blueSoft);letter-spacing:.10em;text-transform:uppercase;}
  .lead-card h3{font-family:var(--disp);font-size:clamp(28px,3.4vw,42px);line-height:1.08;letter-spacing:-.03em;margin:0;color:var(--ink);}
  .lead-card p{margin:0;color:var(--sub);font-size:14px;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .side-list{display:grid;grid-template-rows:repeat(4,minmax(0,1fr));gap:8px;}
  .story{display:grid;grid-template-columns:32px 86px minmax(0,1fr);gap:12px;align-items:center;padding:9px 12px;border:1px solid var(--line);background:oklch(0.19 0.014 265 / .82);border-radius:8px;
         transition:background .18s,border-color .18s,transform .18s;}
  .story:hover{background:var(--panel2);border-color:var(--lineStrong);transform:translateX(2px);}
  .story-rank{font-family:var(--disp);font-size:20px;color:var(--faint);font-variant-numeric:tabular-nums;}
  .story img{width:86px;aspect-ratio:1.15/1;object-fit:cover;border-radius:6px;background:var(--panel2);}
  .story h3{font-size:14px;line-height:1.38;margin:5px 0 0;color:var(--ink);font-weight:650;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .section{margin-top:48px;padding-top:24px;border-top:1px solid var(--line);}
  .section-jump{border:0;background:transparent;color:var(--blueSoft);font-size:12.5px;font-weight:700;padding:8px 0;cursor:pointer;}
  .section-jump:hover{text-decoration:underline;text-underline-offset:4px;}
  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
  .card{background:oklch(0.19 0.014 265 / .78);border:1px solid var(--line);border-radius:8px;overflow:hidden;cursor:pointer;
        transition:transform .18s ease,border-color .18s ease,background .18s;display:flex;flex-direction:column;min-width:0;}
  .card:hover{transform:translateY(-2px);border-color:var(--lineStrong);background:var(--panel);}
  .card .thumb{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--panel2);display:block;}
  .card .body{padding:13px 14px 15px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .card .title{font-size:15.5px;font-weight:650;line-height:1.42;color:var(--ink);
               display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .summ{font-size:12.5px;color:var(--sub);line-height:1.55;
              display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .read-action{margin-top:auto;display:inline-flex;width:max-content;color:var(--blueSoft);font-size:12px;font-weight:750;
               border-bottom:1px solid transparent;padding-bottom:2px;transition:color .18s,border-color .18s;}
  .lead-card:hover .read-action,.card:hover .read-action{color:var(--ink);border-color:var(--ink);}
  .empty{color:var(--faint);font-size:14px;padding:30px 0;border:1px dashed var(--line);border-radius:8px;text-align:center;}
  /* modal */
  .ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.62);backdrop-filter:blur(12px);
      display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;}
  .modal{width:min(720px,100%);background:var(--panel);border:1px solid var(--lineStrong);border-radius:10px;
         box-shadow:0 30px 90px rgba(0,0,0,.5);overflow:hidden;}
  .modal .mhead{padding:22px 26px 6px;position:relative;}
  .modal .mhead .src{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;}
  .modal .mhead h3{font-family:var(--disp);font-size:24px;font-weight:600;margin:8px 0 0;line-height:1.3;}
  .modal .close{position:absolute;top:16px;right:18px;height:34px;padding:0 10px;border-radius:8px;border:1px solid var(--line);
                background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;}
  .modal .mbody{padding:14px 26px 26px;}
  .modal .mbody p{color:var(--sub);font-size:15px;line-height:1.75;white-space:pre-wrap;}
  .modal .imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:18px 0;}
  .modal .imgs img{width:100%;border-radius:10px;display:block;background:var(--panel2);}
  .modal .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:18px;padding-top:14px;border-top:1px solid var(--line);
               display:flex;gap:16px;flex-wrap:wrap;}
  .detail{max-width:1040px;margin:0 auto;padding:8px 0 40px;}
  .detail .back{display:inline-flex;align-items:center;gap:8px;color:var(--blueSoft);font-size:14px;font-weight:700;margin-bottom:28px;
                min-height:38px;padding:0;border:0;border-bottom:1px solid transparent;background:transparent;
                transition:border-color .18s,color .18s;}
  .detail .back:hover{color:var(--ink);border-color:var(--ink);}
  .detail .src{font-family:var(--mono);font-size:11.5px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
  .detail h1{font-family:var(--disp);font-size:clamp(38px,6vw,68px);line-height:1.04;font-weight:560;margin:0;color:var(--ink);letter-spacing:-.04em;max-width:880px;}
  .detail .summary{font-size:16px;color:var(--sub);line-height:1.7;margin:18px 0 0;max-width:720px;}
  .detail .imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));gap:12px;margin:28px 0;}
  .detail .imgs img{width:100%;border-radius:12px;display:block;background:var(--panel2);}
  .detail .body{font-size:16.5px;color:var(--sub);line-height:1.9;white-space:pre-wrap;background:var(--panel);border-top:2px solid var(--blue);border-right:1px solid var(--line);border-bottom:1px solid var(--line);border-left:1px solid var(--line);border-radius:8px;padding:28px 30px;}
  .detail .meta{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:18px;display:flex;gap:14px;flex-wrap:wrap;}
  .detail-layout{display:grid;grid-template-columns:minmax(0,680px) minmax(220px,1fr);gap:28px;margin-top:26px;align-items:start;}
  .detail .imgs{margin:0;grid-template-columns:1fr;gap:12px;}
  .detail .imgs img{border-radius:8px;}
  .detail .meta{border-top:1px solid var(--line);padding-top:14px;}
  @media (max-width:900px){
    .hero{grid-template-columns:1fr;}
    .feature-grid,.lead-card,.detail-layout{grid-template-columns:1fr;}
    .lead-card{min-height:auto;}
    .lead-card img{aspect-ratio:16/10;height:auto;}
    .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  }
  @media (max-width:680px){
    .nav{min-height:70px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;padding:9px 14px;flex-wrap:nowrap;}
    .nav a.brand svg{height:44px;width:auto;}
    .nav .links{min-width:0;overflow-x:auto;flex-wrap:nowrap;gap:14px;scrollbar-width:none;}
    .nav .links::-webkit-scrollbar{display:none;}
    .nav .links a{font-size:15px;}
    .account-area{margin-left:0;flex-wrap:nowrap;gap:7px;}
    .account-pill{min-height:40px;max-width:none;padding:3px;gap:3px;border-color:transparent;background:transparent;}
    .account-avatar,.account-role,.account-name{display:none;}
    .account-action{min-height:34px;padding:8px 10px;font-size:13px;}
  }
  @media (max-width:560px){
    .wrap{padding:30px 14px 64px;}
    .hero{gap:26px;padding-bottom:28px;}
    .hero h1{font-size:clamp(40px,13.5vw,56px);line-height:1.02;letter-spacing:-.04em;}
    .hero p{font-size:14px;line-height:1.65;margin-top:16px;}
    .brief-stat strong{font-size:30px;}
    .channel-bar{top:0;grid-template-columns:1fr;margin-bottom:24px;}
    .channel-label{display:none;}
    .tabs{margin:0 -14px;padding:10px 14px;}
    .tab{min-height:38px;font-size:13.5px;}
    .today{margin-bottom:42px;}
    .today-head,.section-head{align-items:flex-start;}
    .today-head>span{display:none;}
    .lead-card .lead-body{padding:18px;}
    .side-list{grid-template-rows:none;}
    .story{grid-template-columns:28px 74px minmax(0,1fr);padding:9px;}
    .story img{width:74px;}
    .grid{grid-template-columns:1fr;}
    .section{margin-top:40px;}
    .section-jump{font-size:12px;}
    .detail h1{font-size:clamp(38px,11vw,52px);}
    .detail .body{padding:22px 20px;}
  }
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition:none!important;animation-duration:.01ms!important;}}
  .skeleton{animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:.85;}}
</style>
</head>
<body>
<nav class="nav" aria-label="主导航">
  <a class="brand" href="https://dreamerqi.com/" aria-label="Qi home">
    <svg viewBox="0 0 160 135" fill="none"><ellipse cx="65" cy="68" rx="53.2" ry="22" transform="rotate(-28 65 68)" stroke="#313848" stroke-width="2.5"/><circle cx="61" cy="68" r="30" stroke="#eef2f7" stroke-width="11" fill="none"/><path d="M78 84 L92 98" stroke="#eef2f7" stroke-width="11" stroke-linecap="round"/><rect x="106.5" y="61" width="11" height="37" rx="5.5" fill="#eef2f7"/><circle cx="112" cy="43" r="9" fill="#4a9bff"/></svg>
  </a>
  <div class="links" aria-label="站点页面">
    <a href="https://market.dreamerqi.com/">行情</a>
    <a href="/" class="active">娱乐</a>
    <a href="https://explore.dreamerqi.com/">探索</a>
    <a href="https://dreamerqi.com/#chat">瞎聊聊</a>
    <a href="https://dreamerqi.com/#about">关于</a>
    <a href="https://dreamerqi.com/#contact">联系</a>
  </div>
  <div class="account-area" id="accountArea" aria-live="polite"></div>
</nav>

<main class="wrap">
  <header class="hero">
    <div class="hero-copy">
      <div class="hero-eyebrow">Daily entertainment edit</div>
      <h1>把今天最值得看的，<span>排在前面。</span></h1>
      <p>明星、影视、综艺、音乐与生活方式热点，按娱乐相关度、讨论热度和更新时间重新编排。少一点刷屏，多一点真正值得点开的内容。</p>
    </div>
    <aside class="hero-brief" aria-label="今日编辑台">
      <div class="brief-label">Today at a glance</div>
      <div class="brief-stats" id="heroStats" aria-live="polite">
        <div class="brief-stat"><strong>—</strong><span>条站内内容</span></div>
        <div class="brief-stat"><strong>—</strong><span>个持续更新频道</span></div>
      </div>
      <div class="brief-meta">
        <div class="brief-update" id="heroUpdateStatus" data-state="loading">
          <span class="brief-update-label">Updated</span>
          <time id="heroUpdatedAt" aria-live="polite">正在读取</time>
        </div>
        <p class="brief-note" id="heroNote">正在整理今日娱乐内容</p>
      </div>
    </aside>
  </header>

  <div class="channel-bar">
    <div class="channel-label">频道</div>
    <div class="tabs" id="tabs" aria-label="娱乐分类"></div>
  </div>
  <div id="content"></div>
</main>

<div id="modalRoot"></div>
<div id="authRoot"></div>

<script>
const API = '/api/yule';
const BASE_PATH = String(location.pathname || '').startsWith('/yule') ? '/yule' : '';
const CHANNEL_URL = BASE_PATH || '/';
const AUTH_API_BASE = (location.protocol === 'file:') ? 'http://127.0.0.1:8765' : 'https://dreamerqi.com';
const ADMIN_TOKEN_STORAGE = 'panda_admin_token_v1';
const AUTH_SESSION_KEY = 'qi_home_session_v1';
const SHARED_AUTH_TOKEN_COOKIE = 'panda_admin_token';
const SHARED_AUTH_SESSION_COOKIE = 'panda_account_session';
const AUTH_COOKIE_MAX_AGE = 60 * 60 * 24 * 30;
let CATS = [];
let activeCat = 'all';
const LIST_CACHE = new Map();
let renderRunId = 0;
let HOME_TEASER = null;
let homeTeaserPromise = null;
let authReturnFocus = null;
let modalReturnFocus = null;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isDreamerQiHost(){
  const host = String(location.hostname || '').toLowerCase();
  return host === 'dreamerqi.com' || host.endsWith('.dreamerqi.com');
}
function readCookie(name){
  const prefix = `${name}=`;
  const row = String(document.cookie || '').split('; ').find(item => item.startsWith(prefix));
  if(!row) return '';
  try{ return decodeURIComponent(row.slice(prefix.length)); }
  catch(e){ return row.slice(prefix.length); }
}
function writeCookie(name,value,maxAge=AUTH_COOKIE_MAX_AGE){
  const encoded = encodeURIComponent(String(value || ''));
  const secure = location.protocol === 'https:' ? '; Secure' : '';
  const domain = isDreamerQiHost() ? '; Domain=.dreamerqi.com' : '';
  document.cookie = `${name}=${encoded}; Path=/; Max-Age=${maxAge}; SameSite=Lax${secure}${domain}`;
  if(!domain) document.cookie = `${name}=${encoded}; Path=/; Max-Age=${maxAge}; SameSite=Lax${secure}`;
}
function clearCookie(name){
  writeCookie(name,'',0);
  document.cookie = `${name}=; Path=/; Max-Age=0; SameSite=Lax`;
}
function readJsonStore(key,fallback=null){
  try{ return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch(e){ return fallback; }
}
function readSharedAuthToken(){
  return localStorage.getItem(ADMIN_TOKEN_STORAGE) || readCookie(SHARED_AUTH_TOKEN_COOKIE) || '';
}
function writeSharedAuthToken(token){
  if(!token) return;
  localStorage.setItem(ADMIN_TOKEN_STORAGE, token);
  writeCookie(SHARED_AUTH_TOKEN_COOKIE, token);
}
function readSharedAccountSession(){
  const saved = readJsonStore(AUTH_SESSION_KEY, null);
  if(saved && saved.name) return saved;
  const raw = readCookie(SHARED_AUTH_SESSION_COOKIE);
  if(!raw) return null;
  try{
    const session = JSON.parse(raw);
    return session && session.name ? session : null;
  }catch(e){ return null; }
}
function writeSharedAccountSession(session){
  if(!session || !session.name) return;
  const clean = { name: session.name, admin: !!session.admin };
  localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(clean));
  writeCookie(SHARED_AUTH_SESSION_COOKIE, JSON.stringify(clean));
}
function clearSharedAuthState(){
  localStorage.removeItem(ADMIN_TOKEN_STORAGE);
  localStorage.removeItem(AUTH_SESSION_KEY);
  clearCookie(SHARED_AUTH_TOKEN_COOKIE);
  clearCookie(SHARED_AUTH_SESSION_COOKIE);
}
function renderAccount(session=readSharedAccountSession()){
  const area = document.getElementById('accountArea');
  if(!area) return;
  if(session && session.name){
    const role = session.admin ? '管理员' : '用户';
    area.innerHTML = `<div class="account-pill is-logged-in">
      <span class="account-avatar">${esc(String(session.name).slice(0,1).toUpperCase())}</span>
      <span class="account-name">${esc(session.name)}</span>
      <span class="account-role">${role}</span>
      ${session.admin ? '<a class="account-action" href="https://dreamerqi.com/admin">后台</a>' : ''}
      <button type="button" class="account-action" onclick="logoutAccount()">退出</button>
    </div>`;
    return;
  }
  area.innerHTML = `<button type="button" class="account-action" onclick="openAuthModal()">登录</button>
    <a class="account-action primary" href="https://dreamerqi.com/">注册</a>`;
}
function authMessage(error){
  const raw = String(error || '').trim().toLowerCase();
  if(!raw) return '登录失败，请稍后再试';
  if(raw.includes('invalid') || raw.includes('password') || raw.includes('not found')) return '账号或密码不正确';
  if(raw.includes('disabled')) return '账号已停用，请联系管理员';
  return String(error || '登录失败，请稍后再试');
}
async function refreshAccountStatus(){
  const token = readSharedAuthToken();
  const snapshot = readSharedAccountSession();
  if(snapshot) renderAccount(snapshot);
  if(!token){
    clearSharedAuthState();
    renderAccount(null);
    return;
  }
  try{
    const data = await getJSON(`${AUTH_API_BASE}/api/auth/me?_=${Date.now()}`, 8000, { 'x-admin-token': token });
    if(data && data.user){
      writeSharedAuthToken(token);
      const session = { name: data.user.username || snapshot?.name || 'user', admin: !!data.admin };
      writeSharedAccountSession(session);
      renderAccount(session);
    }else{
      clearSharedAuthState();
      renderAccount(null);
    }
  }catch(e){
    if(snapshot) renderAccount(snapshot);
  }
}
function openAuthModal(){
  authReturnFocus = document.activeElement;
  const root = document.getElementById('authRoot');
  root.innerHTML = `<div class="auth-ov" id="authOverlay">
    <form class="auth-modal" id="authForm" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <div class="auth-head">
        <div><h2 id="authTitle">登录 Qi</h2><p>登录后，主页、行情、娱乐、探索会显示同一个账户。</p></div>
        <button type="button" class="auth-close" id="authClose">关闭</button>
      </div>
      <div class="auth-field"><label for="authName">账号</label><input id="authName" autocomplete="username" required></div>
      <div class="auth-field"><label for="authPassword">密码</label><input id="authPassword" type="password" autocomplete="current-password" required></div>
      <div class="auth-msg" id="authMsg"></div>
      <div class="auth-actions">
        <a class="account-action" href="https://dreamerqi.com/">创建账号</a>
        <button class="account-action primary" type="submit">登录</button>
      </div>
    </form>
  </div>`;
  document.getElementById('authClose').onclick = closeAuthModal;
  document.getElementById('authOverlay').onclick = e => { if(e.target.id === 'authOverlay') closeAuthModal(); };
  document.getElementById('authForm').onsubmit = submitAuthLogin;
  setTimeout(()=>document.getElementById('authName')?.focus(), 0);
}
function closeAuthModal(){
  document.getElementById('authRoot').innerHTML = '';
  if(authReturnFocus && typeof authReturnFocus.focus === 'function') authReturnFocus.focus();
  authReturnFocus = null;
}
async function submitAuthLogin(event){
  event.preventDefault();
  const name = document.getElementById('authName')?.value?.trim() || '';
  const password = document.getElementById('authPassword')?.value || '';
  const msg = document.getElementById('authMsg');
  if(!name || !password){
    if(msg) msg.textContent = '请输入账号和密码';
    return;
  }
  if(msg) msg.textContent = '正在登录...';
  try{
    const res = await fetch(`${AUTH_API_BASE}/api/auth/login`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify({ username:name, password })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok || !data.token) throw new Error(authMessage(data.error || `HTTP ${res.status}`));
    const user = data.user || {};
    const session = { name: user.username || data.username || name, admin: !!data.admin || user.role === 'admin' };
    writeSharedAuthToken(data.token);
    writeSharedAccountSession(session);
    renderAccount(session);
    closeAuthModal();
  }catch(e){
    if(msg) msg.textContent = authMessage(e.message);
  }
}
function logoutAccount(){
  clearSharedAuthState();
  renderAccount(null);
}
function itemUrl(id){ return `${BASE_PATH}/item/${encodeURIComponent(id)}`; }
function detailIdFromPath(){
  const m = String(location.pathname || '').match(/^\/(?:yule\/)?item\/([^/]+)$/);
  return m ? decodeURIComponent(m[1]) : '';
}

async function getJSON(url, timeoutMs = 8000, headers = {}){
  const ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
  const timer = ctrl ? setTimeout(()=>ctrl.abort(), timeoutMs) : null;
  try{
    const opts = ctrl ? { cache:'no-store', signal: ctrl.signal, headers } : { cache:'no-store', headers };
    const r = await fetch(url, opts);
    if(!r.ok) return null;
    return await r.json();
  }
  catch(e){ return null; }
  finally{ if(timer) clearTimeout(timer); }
}
async function ensureCategories(){
  if(CATS.length) return;
  const data = await getJSON(`${API}/categories`);
  CATS = (data&&data.categories)||[];
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  const visibleCats = CATS.filter(c => Number(c.count || 0) > 0);
  if(activeCat !== 'all' && !visibleCats.some(c => c.key === activeCat)) activeCat = 'all';
  const total = visibleCats.reduce((sum,c)=>sum + Number(c.count || 0), 0);
  const all = `<button type="button" class="tab ${activeCat==='all'?'active':''}" data-k="all" aria-pressed="${activeCat==='all'}"><span class="label">全部</span><span class="n">${total}</span></button>`;
  const rest = visibleCats.map(c=>`<button type="button" class="tab ${activeCat===c.key?'active':''}" data-k="${esc(c.key)}" aria-pressed="${activeCat===c.key}"><span class="label">${esc(c.label)}</span><span class="n">${c.count}</span></button>`).join('');
  tabs.innerHTML = all + rest;
  tabs.querySelectorAll('.tab').forEach(el=>el.onclick=()=>{ activeCat = el.dataset.k; renderTabs(); renderContent(); });
}

function renderHeroStats(){
  const visibleCats = CATS.filter(c => Number(c.count || 0) > 0);
  const total = visibleCats.reduce((sum,c)=>sum + Number(c.count || 0), 0);
  const largest = visibleCats.slice().sort((a,b)=>Number(b.count || 0)-Number(a.count || 0))[0];
  const stats = document.getElementById('heroStats');
  const note = document.getElementById('heroNote');
  if(stats){
    stats.innerHTML = `<div class="brief-stat"><strong>${total}</strong><span>条站内内容</span></div>
      <div class="brief-stat"><strong>${visibleCats.length}</strong><span>个持续更新频道</span></div>`;
  }
  if(note) note.textContent = largest ? '编辑顺序 · 热度、相关度、更新时间' : '今日内容正在持续更新';
}

function formatBeijingUpdatedAt(value){
  const date = new Date(value);
  if(!value || Number.isNaN(date.getTime())) return '';
  const parts = new Intl.DateTimeFormat('zh-CN', {
    timeZone:'Asia/Shanghai', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', hour12:false
  }).formatToParts(date).reduce((map,part)=>{ map[part.type] = part.value; return map; }, {});
  if(!parts.month || !parts.day || !parts.hour || !parts.minute) return '';
  return `${parts.month}.${parts.day} ${parts.hour}:${parts.minute} 北京时间`;
}

async function renderHeroUpdatedAt(){
  const status = document.getElementById('heroUpdateStatus');
  const time = document.getElementById('heroUpdatedAt');
  if(!status || !time) return;
  const data = await getJSON(`/health?_=${Date.now()}`);
  const raw = data&&data.state&&data.state.lastCollectAt;
  const label = formatBeijingUpdatedAt(raw);
  if(!label){
    status.dataset.state = 'error';
    time.removeAttribute('datetime');
    time.textContent = '更新时间暂不可用';
    return;
  }
  status.dataset.state = 'ready';
  time.dateTime = new Date(raw).toISOString();
  time.textContent = label;
}

function catMeta(key){
  return CATS.find(c=>c.key===key) || { key, label:key || '', emoji:'' };
}
function itemScore(it){
  return Number(it.rankScore || 0) || Number(it.hotScore || 0) || Date.parse(it.createdAt || '') || 0;
}
function sortedItems(items){
  return items.slice().sort((a,b)=>itemScore(b)-itemScore(a));
}
function rankedTodayItems(items, preferredLead=null){
  const ranked = sortedItems(items).filter(Boolean);
  const preferredId = String(preferredLead&&preferredLead.id||'');
  if(!preferredId) return ranked;
  return [preferredLead, ...ranked.filter(item=>String(item&&item.id||'')!==preferredId)];
}
function imageClass(it){
  const w = Number(it.imageWidth || 0), h = Number(it.imageHeight || 0);
  return w && h && h > w * 1.08 ? 'poster' : 'landscape';
}
function imageSrc(src,w,h){
  const s = String(src || '');
  if(!s || /^data:/.test(s)) return s;
  const tag = `${Number(w||0)}x${Number(h||0)}`;
  return s + (s.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(tag);
}
function dayLabel(day){
  const s = String(day || '');
  return /^(\d{4})(\d{2})(\d{2})$/.test(s) ? s.replace(/^(\d{4})(\d{2})(\d{2})$/, '$1.$2.$3') : s;
}
function detailText(s){
  return String(s || '')
    .replace(/https?:\/\/\S+/g,'')
    .replace(/爱奇艺总榜/g,'热播总榜')
    .replace(/爱奇艺电视剧榜/g,'电视剧热播榜')
    .replace(/爱奇艺综艺榜/g,'综艺热播榜')
    .replace(/爱奇艺电影榜/g,'电影热播榜')
    .replace(/爱奇艺风云榜/g,'热播榜')
    .replace(/爱奇艺/g,'')
    .replace(/微博热搜/g,'热搜')
    .replace(/百度电影榜/g,'电影热榜')
    .replace(/百度电视剧榜/g,'电视剧热榜')
    .replace(/百度热榜/g,'热榜')
    .replace(/百度/g,'')
    .replace(/豆瓣正在上映电影/g,'正在上映电影')
    .replace(/豆瓣热播剧集/g,'热播剧集')
    .replace(/豆瓣热门综艺/g,'热门综艺')
    .replace(/豆瓣热门片单/g,'热门片单')
    .replace(/豆瓣评分/g,'评分')
    .replace(/豆瓣/g,'')
    .replace(/B站热门榜/g,'热门视频榜')
    .replace(/B站/g,'')
    .replace(/QQ音乐流行指数榜/g,'流行指数榜')
    .replace(/QQ音乐/g,'')
    .replace(/网易云音乐/g,'')
    .replace(/知乎热榜/g,'热榜')
    .replace(/知乎/g,'')
    .replace(/今日头条搜索/g,'热搜')
    .replace(/今日头条/g,'')
    .replace(/公开热榜/g,'热榜')
    .replace(/进入(热播榜|热搜|电影热榜|电视剧热榜|热榜|热门片单|热门视频榜)后/g,'进入当前热榜后')
    .replace(/出现在(热播榜|热搜|电影热榜|电视剧热榜|热榜|热门片单|热门视频榜)中/g,'进入当前热榜')
    .replace(/讨论来源/g,'讨论背景')
    .replace(/标题、来源和热度线索/g,'标题和热度线索')
    .replace(/来源和/g,'')
    .replace(/[ \t]{2,}/g,' ')
    .replace(/。{2,}/g,'。')
    .trim();
}
function cardHTML(it){
  const cat = catMeta(it.category);
  const cleanSummary = detailText(it.summary || '');
  return `<a class="card ${imageClass(it)}" href="${esc(itemUrl(it.id))}" data-id="${esc(it.id)}">
    <img class="thumb" src="${esc(imageSrc(it.cover,it.imageWidth,it.imageHeight))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
    <div class="body">
      <div class="src">${esc(cat.label||'娱乐')}</div>
      <div class="title">${esc(it.title)}</div>
      ${cleanSummary?`<div class="summ">${esc(cleanSummary)}</div>`:''}
      <span class="read-action">阅读全文</span>
    </div>
  </a>`;
}
function storyHTML(it,rank){
  const cat = catMeta(it.category);
  return `<a class="story ${imageClass(it)}" href="${esc(itemUrl(it.id))}">
    <span class="story-rank">${String(rank || 0).padStart(2,'0')}</span>
    <img src="${esc(imageSrc(it.cover,it.imageWidth,it.imageHeight))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
    <div>
      <div class="src">${esc(cat.label||'娱乐')}</div>
      <h3>${esc(it.title)}</h3>
    </div>
  </a>`;
}
function todayHTML(items, preferredLead=null){
  const ranked = rankedTodayItems(items, preferredLead);
  if(!ranked.length) return '';
  const lead = ranked[0];
  const side = ranked.slice(1,5);
  const cat = catMeta(lead.category);
  return `<section class="today">
    <div class="today-head">
      <div><div class="section-kicker">Top stories</div><h2>今日值得看</h2><span>按娱乐相关度、热度与更新时间排序</span></div>
      <span>${ranked.length} 条站内内容</span>
    </div>
    <div class="feature-grid">
      <a class="lead-card ${imageClass(lead)}" href="${esc(itemUrl(lead.id))}">
        <img src="${esc(imageSrc(lead.cover,lead.imageWidth,lead.imageHeight))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="lead-body">
          <div class="lead-kicker">01 · ${esc(cat.label||'娱乐')}</div>
          <h3>${esc(lead.title)}</h3>
          ${lead.summary?`<p>${esc(detailText(lead.summary))}</p>`:''}
          <span class="read-action">阅读全文</span>
        </div>
      </a>
      <div class="side-list">${side.length ? side.map((it,index)=>storyHTML(it,index+2)).join('') : '<div class="empty">更多内容采集后自动出现</div>'}</div>
    </div>
  </section>`;
}
function sectionHTML(cat, items){
  const jumpTarget = activeCat === 'all' ? cat.key : 'all';
  const jumpLabel = activeCat === 'all' ? '只看此频道' : '返回全部频道';
  return `<section class="section" data-sec="${esc(cat.key)}">
    <div class="section-head">
      <div><div class="section-kicker">Channel edit</div><h2>${esc(cat.label)}</h2><div class="sub">热度优先 · ${items.length} 条</div></div>
      <button class="section-jump" type="button" data-category="${esc(jumpTarget)}">${jumpLabel}</button>
    </div>
    ${items.length ? `<div class="grid">${items.map(cardHTML).join('')}</div>` : '<div class="empty">该板块暂无内容，采集后自动出现</div>'}
  </section>`;
}
function visibleCategories(){
  return CATS.filter(c => Number(c.count || 0) > 0);
}
async function listForCategory(key){
  if(LIST_CACHE.has(key)) return LIST_CACHE.get(key);
  const data = await getJSON(`${API}/list?category=${encodeURIComponent(key)}`);
  const items = (data&&data.items)||[];
  LIST_CACHE.set(key, items);
  return items;
}
function loadHomeTeaser(){
  if(!homeTeaserPromise){
    homeTeaserPromise = getJSON(`${API}/home-teaser?_=${Date.now()}`).then(data=>{
      HOME_TEASER = data&&data.teaser||null;
      return HOME_TEASER;
    });
  }
  return homeTeaserPromise;
}
function groupsHTML(groups, preferredLead=HOME_TEASER){
  const allItems = groups.flatMap(g => g.items);
  return todayHTML(allItems, preferredLead) + groups.map(g => sectionHTML(g.cat, g.items)).join('');
}

function bindSectionJumps(){
  document.querySelectorAll('.section-jump').forEach(button=>{
    button.onclick=()=>{
      activeCat = button.dataset.category || 'all';
      renderTabs();
      renderContent();
      document.querySelector('.channel-bar')?.scrollIntoView({behavior:'smooth',block:'start'});
    };
  });
}

async function renderContent(){
  const content = document.getElementById('content');
  const runId = ++renderRunId;
  if(activeCat==='all'){
    const cats = visibleCategories();
    const cached = cats.filter(c => LIST_CACHE.has(c.key)).map(c => ({ cat:c, items:LIST_CACHE.get(c.key)||[] }));
    if(cached.length){
      content.innerHTML = groupsHTML(cached);
      bindSectionJumps();
    }
    else content.innerHTML = '<div class="empty skeleton">正在加载内容…</div>';
    const [groups, preferredLead] = await Promise.all([
      Promise.all(cats.map(async c => ({ cat:c, items:await listForCategory(c.key) }))),
      loadHomeTeaser(),
    ]);
    if(runId !== renderRunId || activeCat !== 'all') return;
    if(groups.some(g => g.items.length)){
      content.innerHTML = groupsHTML(groups, preferredLead);
      bindSectionJumps();
    } else {
      content.innerHTML = '<div class="empty">暂时没有可显示的内容，请稍后刷新</div>';
    }
  } else {
    const c = CATS.find(x=>x.key===activeCat)||{label:''};
    if(LIST_CACHE.has(activeCat)){
      const items = LIST_CACHE.get(activeCat)||[];
      content.innerHTML = todayHTML(items) + sectionHTML(c, items);
      bindSectionJumps();
      return;
    }
    content.innerHTML = '<div class="empty skeleton">正在加载内容…</div>';
    const items = await listForCategory(activeCat);
    if(runId !== renderRunId || activeCat !== c.key) return;
    content.innerHTML = todayHTML(items) + sectionHTML(c, items);
    bindSectionJumps();
  }
}

async function renderDetailPage(id){
  await ensureCategories();
  const hero = document.querySelector('.hero');
  const channelBar = document.querySelector('.channel-bar');
  const content = document.getElementById('content');
  if(hero) hero.style.display = 'none';
  if(channelBar) channelBar.style.display = 'none';
  content.innerHTML = '<div class="detail skeleton">加载中…</div>';

  const data = await getJSON(`${API}/item/${encodeURIComponent(id)}`);
  const it = data&&data.item;
  if(!it){
    document.title = '内容不可用 · 娱乐 · Qi';
    content.innerHTML = `<div class="empty"><a href="${esc(CHANNEL_URL)}">返回娱乐频道</a><br><br>这条内容暂时不可用</div>`;
    return;
  }

  document.title = `${it.title} · 娱乐 · Qi`;
  const imgs = (it.images||[]).filter(im=>im&&im.src);
  const cat = catMeta(it.category);
  const cleanSummary = detailText(it.summary || '');
  const cleanBody = detailText(it.body || it.summary || '');
  const meta = [
    it.day ? `更新：${esc(dayLabel(it.day))}` : '',
    'Qi 站内内容'
  ].filter(Boolean);
  const detailKicker = [
    cat.label||'娱乐',
    it.day ? `更新 ${dayLabel(it.day)}` : ''
  ].filter(Boolean).join(' · ');
  content.innerHTML = `<article class="detail">
    <a class="back" href="${esc(CHANNEL_URL)}">返回娱乐频道</a>
    <div class="src">${esc(detailKicker)}</div>
    <h1>${esc(it.title)}</h1>
    ${cleanSummary ? `<p class="summary">${esc(cleanSummary)}</p>` : ''}
    <div class="detail-layout">
      <div>
        <div class="body">${esc(cleanBody)}</div>
        <div class="meta">${meta.map(x=>`<span>${x}</span>`).join('')}</div>
      </div>
      ${imgs.length ? `<div class="imgs">${imgs.map(im=>`<img class="${Number(im.height||0)>Number(im.width||0)*1.08?'poster':''}" src="${esc(imageSrc(im.src,im.width,im.height))}" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>` : '<div class="empty">暂无配图</div>'}
    </div>
  </article>`;
}

async function openItem(id){
  modalReturnFocus = document.activeElement;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="ov" id="ov"><div class="modal" role="dialog" aria-modal="true" aria-label="娱乐内容"><div class="mhead"><button class="close" id="x">关闭</button><div class="src">加载中…</div></div></div></div>`;
  document.getElementById('ov').onclick=(e)=>{ if(e.target.id==='ov') closeModal(); };
  document.getElementById('x').onclick=closeModal;
  const data = await getJSON(`${API}/item/${encodeURIComponent(id)}`);
  const it = data&&data.item;
  if(!it){ root.querySelector('.src').textContent='内容加载失败'; return; }
  const imgs = (it.images||[]).filter(im=>im&&im.src);
  const cat = catMeta(it.category);
  const cleanBody = detailText(it.body || it.summary || '');
  root.querySelector('.modal').innerHTML = `
    <div class="mhead"><button class="close" id="x">关闭</button>
      <div class="src">${esc(cat.label||'娱乐')}${it.day ? ' · 更新 ' + esc(dayLabel(it.day)) : ''}</div>
      <h3>${esc(it.title)}</h3></div>
    <div class="mbody">
      ${imgs.length?`<div class="imgs">${imgs.map(im=>`<img src="${esc(imageSrc(im.src,im.width,im.height))}" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>`:''}
      <p>${esc(cleanBody)}</p>
      <div class="meta">
        ${it.day?`<span>更新：${esc(dayLabel(it.day))}</span>`:''}
        <span>Qi 站内内容</span>
      </div>
    </div>`;
  root.querySelector('#x').onclick=closeModal;
}
function closeModal(){
  document.getElementById('modalRoot').innerHTML='';
  if(modalReturnFocus && typeof modalReturnFocus.focus === 'function') modalReturnFocus.focus();
  modalReturnFocus = null;
}
function trapDialogFocus(event, dialog){
  const focusable = Array.from(dialog.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),textarea:not([disabled]),select:not([disabled]),[tabindex]:not([tabindex="-1"])'))
    .filter(el=>el.offsetParent !== null);
  if(!focusable.length) return;
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if(event.shiftKey && document.activeElement === first){ event.preventDefault(); last.focus(); }
  else if(!event.shiftKey && document.activeElement === last){ event.preventDefault(); first.focus(); }
}
document.addEventListener('keydown',event=>{
  const dialog = document.querySelector('#authRoot [role="dialog"],#modalRoot [role="dialog"]');
  if(event.key === 'Escape'){
    if(document.querySelector('#authRoot [role="dialog"]')) closeAuthModal();
    else if(document.querySelector('#modalRoot [role="dialog"]')) closeModal();
    return;
  }
  if(event.key === 'Tab' && dialog) trapDialogFocus(event,dialog);
});
