  }
}

async function openJiuyangongsheAuthPrompt() {
  try {
    if (!state.adminLoggedIn) {
      return;
    }
    if (statusPillState.jygState === 'ok' || statusPillState.jygLabel === 'OK') {
      await refreshJiuyangongsheAuthStatus();
      return;
    }
    statusPillState.jygLabel = '打开中';
    statusPillState.jygState = 'checking';
    statusPillState.jygTitle = '正在打开韭研公社专用登录窗口';
    renderStatusPill();
    const res = await fetch(`${KPL_STATS_BASE}/api/jiuyangongshe-auth/launch?day=${encodeURIComponent(state.date)}`, {
      method: 'POST',
      headers: adminHeaders(),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      throw new Error(data.error || `启动授权失败 ${res.status}`);
    }
    renderJiuyangongsheAuthStatus(data);
    startJiuyangongsheAuthPolling();
  } catch (err) {
    statusPillState.jygLabel = '异常';
    statusPillState.jygState = 'error';
    statusPillState.jygTitle = err.message;
    renderStatusPill();
    showError(err.message || String(err));
  }
}

function startJiuyangongsheAuthPolling() {
  if (jiuyangongsheAuthPollTimer) clearInterval(jiuyangongsheAuthPollTimer);
  let attempts = 0;
  const poll = async () => {
    attempts += 1;
    try {
      const res = await fetch(`${KPL_STATS_BASE}/api/jiuyangongshe-auth/auto-status?day=${encodeURIComponent(state.date)}&_=${Date.now()}`, {
        cache: 'no-store',
        headers: adminHeaders(),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `授权状态读取失败 ${res.status}`);
      if (data.authStatus) renderJiuyangongsheAuthStatus(data.authStatus);
      else renderJiuyangongsheAuthStatus(data);
      if (data.ok || data.status === 'saved') {
        clearInterval(jiuyangongsheAuthPollTimer);
        jiuyangongsheAuthPollTimer = null;
        refreshJiuyangongsheAuthStatus();
      } else if (attempts >= 180) {
        clearInterval(jiuyangongsheAuthPollTimer);
        jiuyangongsheAuthPollTimer = null;
        statusPillState.jygLabel = '未完成';
        statusPillState.jygState = 'missing';
        statusPillState.jygTitle = '韭研公社授权超时，请重新点击状态栏授权';
        renderStatusPill();
      }
    } catch (err) {
      clearInterval(jiuyangongsheAuthPollTimer);
      jiuyangongsheAuthPollTimer = null;
      statusPillState.jygLabel = '异常';
      statusPillState.jygState = 'error';
      statusPillState.jygTitle = err.message;
      renderStatusPill();
      showError(err.message || String(err));
    }
  };
  poll();
  jiuyangongsheAuthPollTimer = setInterval(poll, 2000);
}

function formatReviewDateTime(value) {
  if (!value) return '--';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleString('zh-CN', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false,
  });
}

function formatLimitTime(value) {
  const raw = String(value ?? '').replace(/\D/g, '');
  if (!raw) return '--';
  const s = raw.padStart(6, '0').slice(-6);
  return `${s.slice(0, 2)}:${s.slice(2, 4)}:${s.slice(4, 6)}`;
}

function formatReviewConfidence(value) {
  const n = Number(value);
  if (!Number.isFinite(n) || n <= 0) return '--';
  return `${Math.round(n * 100)}%`;
}

function formatReviewSource(source, headline = '') {
  const raw = String(source || '').trim();
  const title = String(headline || '');
  if (title.includes('湖南人涨停复盘')) return 'TGB';
  if (!raw) return '--';
  if (raw.includes('tgb-hunan-ocr')) return 'TGB';
  if (raw.includes('tgb-hunan')) return 'TGB';
  if (raw.includes('tgb')) return 'TGB';
  if (raw.includes('jiuyangongshe')) return '韭研公社';
  if (raw.includes('ths-limitup-focus')) return '同花顺涨停聚焦';
  if (raw.includes('review-auto-consensus')) return '复盘多源共识';
  if (raw.includes('multi-source-consensus')) return '多源共识';
  if (raw.includes('kpl')) return 'KPL';
  if (raw.includes('limit-up-db')) return '涨停库';
  return raw;
}

function reviewSourceHeadline(source, headline) {
  const src = String(source || '');
  const text = String(headline || '').trim();
  if (!text) return '';
  if (src.includes('tgb-hunan') || text.includes('湖南人涨停复盘')) return '';
  return text;
}

    return ar - br

      || String(a.code || '').localeCompare(String(b.code || ''));

  const visibleStocks = normalizedSearch
    ? sortedStocks.filter(stock => {

function pinyinInitialForChar(char) {
  const text = String(char || '');
  if (!text) return '';
  if (/^[a-z0-9]$/i.test(text)) return text.toLowerCase();
  if (!/[\u3400-\u9fff]/u.test(text) || !PINYIN_COLLATOR) return '';
  for (let i = PINYIN_BOUNDARY_CHARS.length - 1; i >= 0; i--) {
    if (PINYIN_COLLATOR.compare(text, PINYIN_BOUNDARY_CHARS[i]) >= 0) {
      return PINYIN_INITIAL_CHARS[i] || '';
    }
  }
  return '';
}

function pinyinInitials(text) {
  return Array.from(String(text || '')).map(pinyinInitialForChar).join('');
}

function reviewStockSearchText(stock) {
  const name = String(stock?.name || '');
  const code = String(stock?.code || '');
  return [name, code, pinyinInitials(name)]
    .map(value => String(value || '').toLowerCase())
    .join(' ');
}

async function fetchLatestTradingDay(day = formatDate(new Date())) {
  const res = await fetch(`${KPL_STATS_BASE}/api/latest-trading-day?day=${encodeURIComponent(day)}`, {

  });
  if (!res.ok) return null;

}

async function fetchBoardNames(ids, zsType = state.zsType) {
  const plates = [...new Set((ids || []).map(String).filter(Boolean))];
  if (!plates.length) return {};
  const res = await fetch(`${KPL_STATS_BASE}/api/board-names?zs_type=${encodeURIComponent(zsType)}&ids=${encodeURIComponent(plates.join(','))}`, {
    cache: 'no-store',
    headers: { 'x-api-key': state.apiKey },

  return data.names || {};

async function saveDashboardSnapshot(options = {}) {
  const confirmed = !!options.confirmed;
  const force = !!options.force;
  if (!state.boards.length) return false;
  const latestDay = await fetchLatestTradingDay().catch(() => null);
  if (!force && latestDay && state.date !== latestDay) return false;
  const payload = {
    day: state.date,
    zsType: state.zsType,
    kpi: state.lastKpi || null,
    boards: state.boards,
    cardData: state.cardData,
    confirmed,
    confirmedAt: confirmed ? new Date().toISOString() : undefined,
  };
  const res = await fetch(`${KPL_STATS_BASE}/api/snapshot`, {
    method: 'POST',
    headers: adminHeaders({
      'content-type': 'application/json',
      'x-api-key': state.apiKey,
    }),
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`快照保存失败 ${res.status}: ${text.substring(0, 160)}`);
  }
  return res.json();
}

function isAfterChinaClose() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Shanghai',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
  }).formatToParts(now);
  const map = Object.fromEntries(parts.map(part => [part.type, part.value]));
  const hour = Number(map.hour);
  const minute = Number(map.minute);
  return hour > 15 || (hour === 15 && minute >= 0);
}

async function confirmDashboardSnapshot() {
  try {
    if (!state.boards.length) {
      alert('当前没有可保存的卡片。');
      return;
    }
    if (!isAfterChinaClose() && !confirm('现在还没到 15:00，确认快照可能不是收盘最终版。仍然保存吗？')) {
      return;
    }
    document.getElementById('update-meta').textContent = '正在补全快照数据...';
    await loadAllCards();
    const result = await saveDashboardSnapshot({ confirmed: true, force: true });
    refreshAfterCloseStatus();
    refreshJiuyangongsheAuthStatus();
    document.getElementById('update-meta').textContent = `已确认快照: ${state.date}`;
    alert(`已确认并保存 ${state.date} 的当前页面快照。`);
    return result;
  } catch (err) {
    showError(err.message || String(err));
  }
}

function getStockSecid(code) {
  const c = String(code || '').replace(/\D/g, '');
  if (!c) return '';
  return `${c.startsWith('6') ? '1' : '0'}.${c}`;
}

function shiftDateText(day, deltaDays) {
  const d = new Date(`${day}T00:00:00`);
  d.setDate(d.getDate() + deltaDays);
  return formatDate(d).replace(/-/g, '');
}

async function fetchStockDailyKline(code, day) {
  const secid = getStockSecid(code);
  if (!secid) return [];
  const beg = shiftDateText(day, -45);
  const end = String(day || '').replace(/-/g, '');
  const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&beg=${beg}&end=${end}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const json = await res.json();
  return json?.data?.klines || [];
}

function limitUpThreshold(code, name) {
  const c = String(code || '');
  const n = String(name || '').toUpperCase();
  if (n.includes('ST')) return 4.75;
  if (c.startsWith('30') || c.startsWith('68') || c.startsWith('43') || c.startsWith('83') || c.startsWith('87') || c.startsWith('92')) return 19.5;
  return 9.75;
}

async function calcRecentZtCount(stock, day) {
  const klines = await fetchStockDailyKline(stock.code, day).catch(() => []);
  const threshold = limitUpThreshold(stock.code, stock.name);
  return klines.slice(-10).reduce((sum, row) => {
    const cols = String(row).split(',');
    const pct = parseFloat(cols[8]);
    return sum + (Number.isFinite(pct) && pct >= threshold ? 1 : 0);
  }, 0);
}

function polarToPoint(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return {
    x: cx + r * Math.cos(rad),
    y: cy + r * Math.sin(rad),
  };
}

function describePieSlice(cx, cy, r, startDeg, endDeg) {
  const start = polarToPoint(cx, cy, r, startDeg);
  const end = polarToPoint(cx, cy, r, endDeg);
  const largeArc = endDeg - startDeg > 180 ? 1 : 0;
  return `M ${cx} ${cy} L ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)} Z`;
}

function renderBreadthDial(upCount, downCount) {
  const up = Number(upCount) || 0;
  const down = Number(downCount) || 0;
  const total = up + down;
  const upRatio = total ? up / total : 0.5;
  const upDeg = Math.round(upRatio * 360);
  const upPct = total ? Math.round(upRatio * 100) : '--';
  const upSlice = document.getElementById('breadth-up-slice');
  const downSlice = document.getElementById('breadth-down-slice');
  upSlice.setAttribute('d', describePieSlice(78, 78, 72, 0, Math.max(upDeg, 0.01)));
  downSlice.setAttribute('d', describePieSlice(78, 78, 72, Math.max(upDeg, 0.01), 360));
  document.getElementById('breadth-center-pct').textContent = total ? `${upPct}%` : '--';
  document.getElementById('breadth-ratio').textContent = total ? `${upPct}% 上涨` : '--';
  document.getElementById('breadth-up').textContent = `▲ ${up || '--'}`;
  document.getElementById('breadth-down').textContent = `▼ ${down || '--'}`;
}

function initProgressiveCardBodies() {

    data._zt10Done = !!(data.zt10 && data.zt10.length);
    data._gain10Done = !!(data.gain10 && data.gain10.length);
    data._gain30Done = !!(data.gain30 && data.gain30.length);

  }
}

function findBoardByPlateId(plateId) {
  const key = String(plateId);
  return state.boards.find(b => String(b.plateId) === key);
}

function boardAllowsMainStar(plateId) {
  const board = findBoardByPlateId(plateId);
  return Number(board?.netInflow) > MAIN_STAR_MIN_NET_INFLOW;
}

function hasLoadedCardDetails(data) {
  return !!(data && data._ztListDone && data._zt10Done && data._gain10Done && data._gain30Done);
}

async function loadCardDetails(board) {
  const plateId = board.plateId;
  const plateKey = String(plateId);
  const data = state.cardData[plateId] || (state.cardData[plateId] = {});
  const detailSeq = state.loadSeq;
  const renderIfCurrent = () => {
    if (detailSeq === state.loadSeq && findBoardByPlateId(plateId)) {
      renderProgressiveCardContent(plateId, data);
    }
  };

  if (hasLoadedCardDetails(data)) {
    renderIfCurrent();
    return data;
  }
  if (state.cardDetailLoads[plateKey]) {
    renderIfCurrent();
    return state.cardDetailLoads[plateKey];
  }

  data._ztListDone = !!(data.ztList && data.ztList.length);
  data._zt10Done = !!(data.zt10 && data.zt10.length && data.zt10Source === 'precise');
  data._gain10Done = !!(data.gain10 && data.gain10.length);
  data._gain30Done = !!(data.gain30 && data.gain30.length);
  setCacheStatus(data._gain10Done && data._gain30Done ? '缓存: 命中' : '缓存: 详情计算中');
  renderIfCurrent();

  const task = (async () => {
    const plates = [plateId];
    const names = [board.name];

    const plateTask = (async () => {
      try {
        await loadSinglePlateData(board);
      } finally {
        data._ztListDone = true;
        renderIfCurrent();
      }
    })();

    const ztGeneTask = (isExternalConceptType() || isDisabledType() ? Promise.resolve(null) : fetchZtGene(plates, names, state.date)).then(ztGeneRes => {
      if (!ztGeneRes) return;
      const ztMap = unwrapAggregate(ztGeneRes, plates);
      if (!ztMap || data.zt10Source === 'precise') return;
      const globalRows = collectAllZtCountRows(ztMap);
      const perBoard = ztMap[plateId] || ztMap[String(plateId)] || ztMap[board.name] || ztMap[String(board.name)] || {};
      const fallbackZt10 = normalizeZtCountRows(pickArray(perBoard, [
        'top_zt_count',
        'zt_count',
        'top10d_zt_count',
        'top10_zt_count',
        'zt10',
        'top_zt',
        'items',
        'stocks',
        'list',
        'List',
      ]));
      data.globalZt10 = globalRows;
      data.zt10 = fallbackZt10;
      data._zt10Done = true;
      renderIfCurrent();
    }).catch(() => {});

    const preciseTask = fetchPreciseZt10(plates, names, state.date).then(preciseZtRes => {
      const preciseZtMap = preciseZtRes?.boards;
      const preciseRows = preciseZtMap?.[plateId] || preciseZtMap?.[String(plateId)] || preciseZtMap?.[board.name] || preciseZtMap?.[String(board.name)] || [];
      if (Array.isArray(preciseRows) && preciseRows.length) {
        data.zt10 = normalizeZtCountRows(preciseRows);
        data.zt10Source = 'precise';
      }
      data._zt10Done = true;
      renderIfCurrent();
    }).catch(() => {
      data._zt10Done = true;
      renderIfCurrent();
    });

    const gainTask = fetchGainRank(plates, state.date).then(gainRankRes => {
      const gainMap = unwrapAggregate(gainRankRes, plates);
      const perBoard = gainMap?.[plateId] || gainMap?.[String(plateId)] || {};
      data.gain10 = pickArray(perBoard, ['top10d_gain', 'gain10', 'top_10d']);
      data.gain30 = pickArray(perBoard, ['top30d_gain', 'gain30', 'top_30d']);
      data._gain10Done = true;
      data._gain30Done = true;
      setCacheStatus('缓存: 详情已更新');
      renderIfCurrent();
    }).catch(() => {
      data._gain10Done = true;
      data._gain30Done = true;
      setCacheStatus('缓存: 详情失败');
      renderIfCurrent();
    });

    await Promise.allSettled([plateTask, ztGeneTask, preciseTask, gainTask]);
    data._detailLoaded = true;
    return data;
  })();

  state.cardDetailLoads[plateKey] = task.finally(() => {
    delete state.cardDetailLoads[plateKey];
  });
  return state.cardDetailLoads[plateKey];
}

function getStarStockCodes(data, mergedZt10 = mergeCurrentZtIntoZt10(data)) {
  const ztTop5 = new Set(mergedZt10.slice(0, 5).map(r => String(r.code)));
  return new Set((data.gain10 || [])
    .slice(0, 8)
    .map(r => String(r.code))
    .filter(code => ztTop5.has(code)));
}

function getCrownStarStockCodes(starCodes, mergedZt10) {
  return new Set((mergedZt10 || [])
    .filter(r => starCodes.has(String(r.code)) && Number(r.ztCount) > 0)
    .map(r => String(r.code)));
}

function getMainStarPreviewRows(data, mergedZt10, starCodes, crownStarCodes) {
  const sourceRows = [
    ...(data.ztList || []),
    ...(mergedZt10 || []),
    ...(data.gain10 || []),
    ...(data.gain30 || []),
  ];
  const byCode = new Map(sourceRows.filter(r => r.code).map(r => [String(r.code), r]));
  const result = [];
  for (const code of crownStarCodes || []) {
    const row = byCode.get(String(code));
    if (!row || isStStockName(row.name)) continue;
    result.push(row);
  }
  return result;
}

function isStStockName(name) {
  return /(^|\W)\*?ST|退市/i.test(String(name || ''));
}

function filterNonStRows(rows) {
  return (rows || []).filter(r => !isStStockName(r.name));
}

function mergeCurrentZtIntoZt10(data) {
  if (data.zt10Source === 'precise') {
    const rows = filterNonStRows(normalizeZtCountRows(data.zt10 || []));
    const currentByCode = new Map((data.ztList || []).filter(r => r.code).map(r => [String(r.code), r]));
    const currentByName = new Map((data.ztList || []).filter(r => r.name).map(r => [String(r.name), r]));
    return rows.map(r => {
      const current = currentByCode.get(String(r.code)) || currentByName.get(String(r.name));
      return current ? { ...r, todayGain: current.gain } : r;
    });
  }
  const rows = filterNonStRows(normalizeZtCountRows(data.zt10 || []));
  const globalRows = filterNonStRows(normalizeZtCountRows(data.globalZt10 || []));
  const globalByCode = new Map(globalRows.filter(r => r.code).map(r => [String(r.code), r]));
  const globalByName = new Map(globalRows.filter(r => r.name).map(r => [String(r.name), r]));
  const seen = new Set(rows.map(r => String(r.code || r.name)));
  for (const stock of data.ztList || []) {
    if (isStStockName(stock.name)) continue;
    const key = String(stock.code || stock.name);
    if (seen.has(key)) continue;
    const matched = globalByCode.get(String(stock.code)) || globalByName.get(String(stock.name));
    rows.unshift({
      code: stock.code,
      name: stock.name,
      totalCount: matched?.totalCount ?? null,
      ztCount: matched?.ztCount ?? matched?.totalCount ?? null,
      todayGain: stock.gain,
      fromCurrentZt: true,
    });
    seen.add(key);
  }
  return rows;
}

async function hydrateCurrentZtCountsFromKline(data) {
  const rows = normalizeZtCountRows(data.zt10 || []);
  const byCode = new Map(rows.filter(r => r.code).map(r => [String(r.code), r]));
  const byName = new Map(rows.filter(r => r.name).map(r => [String(r.name), r]));
  const additions = await Promise.all((data.ztList || []).map(async stock => {
    const count = await calcRecentZtCount(stock, state.date);
    return {
      code: stock.code,
      name: stock.name,
      totalCount: count,
      ztCount: count,
      todayGain: stock.gain,
    };
  }));

  for (const item of additions) {
    const existing = byCode.get(String(item.code)) || byName.get(String(item.name));
    if (existing) {
      existing.totalCount = Math.max(Number(existing.totalCount) || 0, item.totalCount);
      existing.ztCount = Math.max(Number(existing.ztCount) || 0, item.ztCount);
      if (existing.todayGain == null || isNaN(existing.todayGain)) existing.todayGain = item.todayGain;
    } else if (item.totalCount > 0 || item.ztCount > 0) {
      rows.unshift(item);
    }
  }

  data.zt10 = rows
    .filter(r => Number(r.totalCount) > 0 || Number(r.ztCount) > 0)
    .sort((a, b) => (Number(b.totalCount) || 0) - (Number(a.totalCount) || 0)
      || (Number(b.ztCount) || 0) - (Number(a.ztCount) || 0)
      || (Number(b.todayGain) || 0) - (Number(a.todayGain) || 0));
}

function fmtCount(v) {

function markStarRows(rows, starCodes, crownStarCodes = new Set()) {

async function hydrateBoardZtCount(board) {

  ]);
  const arr = qjRes?.List || qjRes?.list || [];
  if (arr.length > 5) {
    if (board.netInflow == null || isNaN(board.netInflow)) {
      board.netInflow = parseFloat(arr[3]);
    }
  }

  if (stocksRes) {
    const list = stocksRes.List || stocksRes.list || stocksRes.data || [];
    const stocks = list.map(s => ({
      code: s[0],
      name: s[1],
      gain: parseFloat(s[6]),
      ztState: s[23],
    }));
    const ztList = stocks.filter(isLimitUpRow)
      .sort((a, b) => b.gain - a.gain);
    board.ztCount = ztList.length;
    const gainValues = stocks
      .map(stock => Number(stock.gain))
      .filter(Number.isFinite);
    const shouldBackfillThsGain = isThsType()
      && Number(board.gainPct) === 0
      && gainValues.some(value => value !== 0);
    if ((!Number.isFinite(Number(board.gainPct)) || shouldBackfillThsGain) && gainValues.length) {
      board.gainPct = gainValues.reduce((sum, value) => sum + value, 0) / gainValues.length;
    }
    const cardData = state.cardData[board.plateId] || (state.cardData[board.plateId] = {});
    cardData.ztList = ztList;
    cardData.ztListTotal = ztList.length;
  } else if (arr.length > 5) {
    board.ztCount = Number(arr[5]) || 0;
  }
  return board;
}

async function hydratePreviewZtCount(board, seq) {
  const hydrated = await hydrateBoardZtCount(board).catch(() => board);
  if (seq !== state.loadSeq) return board;
  Object.assign(board, hydrated);
  updateBoardHeader(board);
  writePreviewCache();
  return board;
}

function hydratePreviewZtCounts(boards, seq) {
  for (const board of boards) {
    hydratePreviewZtCount(board, seq).catch(() => {});
  }
}

async function streamStrongBoards(rankingCandidates, seq, scanState = {}) {
  if (!scanState.initialized) {
    scanState.initialized = true;
    scanState.freshStarted = false;
    scanState.shownIds = new Set();
    setCacheStatus('缓存: 筛选预览');
    if (!scanState.preservePreview) {
      state.boards = [];
      state.cardData = {};
      scanState.freshStarted = true;
      renderBoardSkeletons([], { filtering: true });
    }
  }

  const concurrency = Math.min(6, rankingCandidates.length);
  let cursor = 0;
  let completed = 0;
  const shownIds = scanState.shownIds || new Set();
  scanState.shownIds = shownIds;

  function freshBoardCount() {
    return scanState.freshStarted ? state.boards.length : shownIds.size;
  }

  function shouldContinueScan() {
    return (
      seq === state.loadSeq &&
      cursor < rankingCandidates.length &&
      freshBoardCount() < BOARD_COUNT
    );
  }

  async function worker() {
    while (shouldContinueScan()) {
      const idx = cursor++;
      const candidate = rankingCandidates[idx];
      let hydrated = null;
      try {
        hydrated = await hydrateBoardZtCount(candidate);
        hydrated._rankIndex = idx;
      } catch {
        completed++;
        continue;
      }
      completed++;
      if (
        seq === state.loadSeq &&
        Number(hydrated.ztCount) >= MIN_BOARD_ZT_COUNT &&
        freshBoardCount() < BOARD_COUNT &&
        !shownIds.has(String(hydrated.plateId))
      ) {
        if (!scanState.freshStarted) {
          state.boards = [];
          state.cardData = {};
          scanState.freshStarted = true;
          renderBoardSkeletons([], { filtering: true });
        }
        shownIds.add(String(hydrated.plateId));
        state.boards = [...state.boards, hydrated]
          .sort((a, b) => Number(a._rankIndex ?? Number.MAX_SAFE_INTEGER) - Number(b._rankIndex ?? Number.MAX_SAFE_INTEGER));
        appendBoardSkeleton(hydrated);
        updateBoardHeader(hydrated);
        writePreviewCache();
        document.getElementById('update-meta').textContent =
          `已显示 ${state.boards.length}/${BOARD_COUNT}，继续筛选中...`;
      }
    }
  }

  await Promise.all(Array.from({ length: concurrency }, worker));
  if (seq !== state.loadSeq) return false;

  document.getElementById('update-meta').textContent =
    scanState.freshStarted && state.boards.length
      ? `更新: ${formatTime(new Date())}，显示 ${state.boards.length} 个符合条件板块`
      : '更新: ' + formatTime(new Date());
  if (scanState.freshStarted && state.boards.length) {
    warmGainRankCache(state.boards, state.date, seq).catch(() => {
      if (seq === state.loadSeq) setCacheStatus('缓存: 预热失败');
    });
  }
  return scanState.freshStarted && state.boards.length > 0;
}

function renderCachedPreviewIfAvailable(seq) {
  const cached = readPreviewCache();
  if (!cached?.boards?.length || seq !== state.loadSeq) return false;
  rememberBoardNames(cached.boards, state.zsType);
  const hiddenBoards = getHiddenBoards(state.zsType);
  state.boards = cached.boards
    .filter(board => !hiddenBoards.has(String(board.plateId)))
    .slice(0, BOARD_COUNT);
  if (!state.boards.length) return false;
  state.cardData = {};
  renderBoardSkeletons(state.boards, { pending: true });
  document.getElementById('update-meta').textContent = '上次预览: ' + formatTime(new Date(Number(cached.savedAt))) + '，正在刷新';
  return true;
}

async function loadBoards() {
  try {
    const seq = ++state.loadSeq;
    state.cardDetailLoads = {};
    state.expandedCards.clear();
    clearError();
    const today = formatDate(new Date());
    let hadCachedPreview = false;
    setCacheStatus('缓存: 加载中');
    if (EMPTY_ZS_TYPES.has(Number(state.zsType))) {
      state.usingSnapshot = false;
      state.boards = [];
      state.cardData = {};
      renderBoardSkeletons([]);
      document.getElementById('update-meta').textContent = '数据源待接入';
      setCacheStatus('状态: OK');
      showError('东财概念数据源暂时为空：真实东财板块和成分股接口确认后再接入。');
      return;
    }
    if (state.date === today) {
      hadCachedPreview = renderCachedPreviewIfAvailable(seq);
      if (hadCachedPreview) setCacheStatus('缓存: 实时预览');
    }
    const snapshot = await fetchDashboardSnapshot(state.date, state.zsType).catch(() => null);
    if (seq !== state.loadSeq) return;
    if (snapshot?.boards?.length) {
      state.usingSnapshot = true;
      rememberBoardNames(snapshot.boards, state.zsType);
      const hiddenBoards = getHiddenBoards(state.zsType);
      state.boards = snapshot.boards
        .filter(board => !hiddenBoards.has(String(board.plateId)))
        .slice(0, BOARD_COUNT);
      state.cardData = snapshot.cardData || {};
      restoreKPIFromSnapshot(snapshot.kpi);
      renderBoardSkeletons(state.boards);
      for (const b of state.boards) {
        renderCardContent(b.plateId, state.cardData[b.plateId] || {});
      }
      if (isThsType(state.zsType) && state.date === formatDate(new Date())) {
        hydratePreviewZtCounts(state.boards, seq);
      }
      document.getElementById('update-meta').textContent = `${snapshot.confirmed ? '已确认快照' : '快照'}: ${state.date}`;
      setCacheStatus('缓存: 历史快照');
      return;
    }
    state.usingSnapshot = false;
    if (state.date !== today) {
      state.boards = [];
      state.cardData = {};
      renderBoardSkeletons([]);
      document.getElementById('update-meta').textContent = `无快照: ${state.date}`;
      setCacheStatus('缓存: 历史只读');
      showError(`${state.date} 没有本地快照。历史日期只读取快照，不加载实时接口。`);
      return;
    }
    if (!hadCachedPreview && state.date === today) {
      hadCachedPreview = renderCachedPreviewIfAvailable(seq);
      setCacheStatus('缓存: 实时预览');
    }

    const hiddenBoards = getHiddenBoards(state.zsType);
    const cachedPreview = readPreviewCache();
    const cachedBoardMap = new Map((cachedPreview?.boards || []).map(board => [String(board.plateId), board]));
    let rankingLoaded = false;
    const scanState = { preservePreview: hadCachedPreview };
    for (let step = 1; seq === state.loadSeq; step += 1) {
      const rankingData = await fetchBoardRanking(state.zsType, getBoardFetchCount(step)).catch(e => ({ _err: e.message }));
      if (seq !== state.loadSeq) return;
      const rankingList = rankingData && !rankingData._err ? (rankingData?.List || rankingData?.list || rankingData?.data || []) : [];
      const rankingAll = rankingList.map(row => ({
        plateId: row[0],
        name: row[1],
        memberCount: row[2],
        gainPct: parseFloat(row[3]),
        turnover: row[4],
        amount: row[5],
        netInflow: parseFloat(row[6]),
        ztCount: cachedBoardMap.get(String(row[0]))?.ztCount ?? '--',
      }));
      const lastLoadedGain = rankingAll.length ? Number(rankingAll[rankingAll.length - 1].gainPct) : null;
      rememberBoardNames(rankingAll, state.zsType);
      renderDeletedBoardsPanel();
      const hasDeletedInLoadedRange = rankingAll.some(board => hiddenBoards.has(String(board.plateId)));
      const rankingCandidates = rankingAll
        .filter(board => !hiddenBoards.has(String(board.plateId)))
        .filter(board => boardPassesGainFloor(board, state.zsType));

      if (rankingCandidates.length) {
        await streamStrongBoards(rankingCandidates, seq, scanState);
        rankingLoaded = true;
      }
      if (
        state.boards.length >= BOARD_COUNT ||
        (Number.isFinite(lastLoadedGain) && lastLoadedGain < MIN_BOARD_GAIN_PCT) ||
        rankingList.length < getBoardFetchCount(step)
      ) {
        break;
      }
    }

    if (!state.boards.length && !rankingLoaded) {
      const liveData = await fetchDashboardLive(state.date, state.zsType).catch(e => ({ _err: e.message }));
      if (seq !== state.loadSeq) return;
      if (liveData && !liveData._err && Array.isArray(liveData.boards)) {
        rememberBoardNames(liveData.boards, state.zsType);
        state.boards = liveData.boards.slice(0, BOARD_COUNT);
        state.cardData = liveData.cardData || {};
        renderKPI(liveData.kpi);
        renderBoardSkeletons(state.boards);
        hydratePreviewZtCounts(state.boards, seq);
        writePreviewCache();
      }
    }

    if (!state.boards.length) {
      document.getElementById('update-meta').textContent = '更新: ' + formatTime(new Date());
      return;
    }

    document.getElementById('update-meta').textContent = '更新: ' + formatTime(new Date());
  } catch (e) {
    showError('板块列表加载失败: ' + e.message);
    document.getElementById('board-grid').innerHTML =
      `<div class="card-error" style="grid-column: 1/-1;">⚠ ${escapeHTML(e.message)}</div>`;
    renderBoardPicker();
    renderDeletedBoardsPanel();
  }
}

async function loadAllCards() {
  const plates = state.boards.map(b => b.plateId);
  const names = state.boards.map(b => b.name);
  if (!plates.length) return;

  initProgressiveCardBodies();

  const plateTasks = state.boards.map(async b => {
    const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
    try {
      await loadSinglePlateData(b);
    } finally {
      cardData._ztListDone = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  });

  const ztGeneTask = (isExternalConceptType() || isDisabledType() ? Promise.resolve(null) : fetchZtGene(plates, names, state.date)).then(ztGeneRes => {
    if (!ztGeneRes) return;
    const ztMap = unwrapAggregate(ztGeneRes, plates);
    if (!ztMap) return;
    const globalRows = collectAllZtCountRows(ztMap);
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      if (cardData.zt10Source === 'precise') continue;
      const perBoard = ztMap[b.plateId] || ztMap[String(b.plateId)] || ztMap[b.name] || ztMap[String(b.name)] || {};
      const fallbackZt10 = normalizeZtCountRows(pickArray(perBoard, [
        'top_zt_count',
        'zt_count',
        'top10d_zt_count',
        'top10_zt_count',
        'zt10',
        'top_zt',
        'items',
        'stocks',
        'list',
        'List',
      ]));
      cardData.globalZt10 = globalRows;
      cardData.zt10 = fallbackZt10;
      cardData._zt10Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  }).catch(() => {});

  const preciseTask = fetchPreciseZt10(plates, names, state.date).then(preciseZtRes => {
    const preciseZtMap = preciseZtRes?.boards;
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      const preciseRows = preciseZtMap?.[b.plateId] || preciseZtMap?.[String(b.plateId)] || preciseZtMap?.[b.name] || preciseZtMap?.[String(b.name)] || [];
      if (Array.isArray(preciseRows) && preciseRows.length) {
        cardData.zt10 = normalizeZtCountRows(preciseRows);
        cardData.zt10Source = 'precise';
      }
      cardData._zt10Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  }).catch(() => {
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      cardData._zt10Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  });

  const gainTask = fetchGainRank(plates, state.date).then(gainRankRes => {
    const gainMap = unwrapAggregate(gainRankRes, plates);
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      const perBoard = gainMap?.[b.plateId] || gainMap?.[String(b.plateId)] || {};
      cardData.gain10 = pickArray(perBoard, ['top10d_gain', 'gain10', 'top_10d']);
      cardData.gain30 = pickArray(perBoard, ['top30d_gain', 'gain30', 'top_30d']);
      cardData._gain10Done = true;
      cardData._gain30Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  }).catch(() => {
    for (const b of state.boards) {
      const cardData = state.cardData[b.plateId] || (state.cardData[b.plateId] = {});
      cardData._gain10Done = true;
      cardData._gain30Done = true;
      renderProgressiveCardContent(b.plateId, cardData);
    }
  });

  await Promise.allSettled([...plateTasks, ztGeneTask, preciseTask, gainTask]);
}

/**
 * 把聚合接口返回剥到"板块代码 -> 板块数据"的 map
 * 兼容多种结构:
 *   1) { "801048": {...}, "801001": {...} }     直接以代码为 key
 *   2) { results: { "801048": {...} } }         results 下
 *   3) { data: { "801048": {...} } }             data 下
 *   4) { boards: [ { plate_id: "801048", ... } ] }  数组
 *   5) { List: [...] }
 */
function unwrapAggregate(res, plateIds) {
  if (!res || res._err) return null;
  const candidates = [res.plates, res, res.results, res.data, res.result, res.payload];
  // 先尝试直接以板块代码作为 key
  for (const c of candidates) {
    if (!c || typeof c !== 'object') continue;
    const hit = plateIds.some(p => c[p] || c[String(p)]);
    if (hit) return c;
  }
  // 再尝试数组形式,把数组转 map
  const arrCandidates = [res.boards, res.list, res.List, res.items, Array.isArray(res) ? res : null];
  for (const arr of arrCandidates) {
    if (!Array.isArray(arr)) continue;
    const map = {};
    for (const item of arr) {
      const pid = item.plate_id || item.plateId || item.code || item.id;
      if (pid != null) map[pid] = item;
      const name = item.name || item.plate_name || item.plateName;
      if (name != null) map[name] = item;
    }
    if (plateIds.some(p => map[p] || map[String(p)])) return map;
  }
  return null;
}

function pickArray(obj, keys) {
  for (const k of keys) {
    if (Array.isArray(obj[k])) return obj[k];
  }
  return [];
}

function collectAllZtCountRows(map) {
  const rows = [];
  if (!map || typeof map !== 'object') return rows;
  for (const value of Object.values(map)) {
    if (!value || typeof value !== 'object') continue;
    rows.push(...pickArray(value, [
      'top_zt_count',
      'zt_count',
      'top10d_zt_count',
      'top10_zt_count',
      'zt10',
      'top_zt',
      'items',
      'stocks',
      'list',
      'List',
    ]));
  }
  return rows;
}

function normalizeZtCountRows(rows) {
  return (rows || []).map(r => {
    if (Array.isArray(r)) {
      return {
        code: r[0],
        name: r[1],
        totalCount: r[2] ?? r[3] ?? 0,
        ztCount: r[3] ?? r[2] ?? 0,
        todayGain: parseFloat(r[4] ?? r[5] ?? 0),
      };
    }
    return {
      ...r,
      code: r.code ?? r.stock_code ?? r.stockCode ?? r.dm,
      name: r.name ?? r.stock_name ?? r.stockName ?? r.mc,
      totalCount: r.totalCount ?? r.total_count ?? r.total ?? r.count ?? r.ztTotal ?? r.zt_total ?? 0,
      ztCount: r.ztCount ?? r.zt_count ?? r.mainCount ?? r.main_count ?? r.main ?? r.primaryCount ?? r.primary_count ?? 0,
      todayGain: parseFloat(r.todayGain ?? r.today_gain ?? r.gain ?? r.zdf ?? r.change_pct ?? 0),
    };
  }).filter(r => r.code || r.name);
}

async function loadSinglePlateData(board) {
  const cardData = state.cardData[board.plateId] || (state.cardData[board.plateId] = {});

  // 并发拉成分股 + 净流入 + 涨停数
  const [stocksRes, qjRes, pankouRes] = await Promise.all([
    fetchPlateStocks(board.plateId).catch(e => ({ _err: e.message })),
    fetchPlateInfoQj(board.plateId).catch(e => ({ _err: e.message })),
    fetchPlatePankou(board.plateId).catch(() => null),
  ]);

  // 成分股 -> 涨停榜单
  if (stocksRes && !stocksRes._err) {
    const list = stocksRes.List || stocksRes.list || stocksRes.data || [];
    const stocks = list.map(s => ({
      code: s[0],
      name: s[1],
      price: parseFloat(s[5]),
      gain: parseFloat(s[6]),
      amount: s[7],
      turnover: s[8],
      ztState: s[23],
    }));
    // 涨停榜单：筛出今日封板的
    cardData.ztList = stocks.filter(isLimitUpRow)
      .sort((a, b) => b.gain - a.gain);
    cardData.ztListTotal = cardData.ztList.length;
    board.ztCount = cardData.ztList.length;
  }

  // 区间统计 -> 净流入 fallback
  if (qjRes && !qjRes._err) {
    const arr = qjRes.List || qjRes.list || [];
    if (arr.length > 5) {
      if (board.netInflow == null || isNaN(board.netInflow)) {
        board.netInflow = parseFloat(arr[3]);
      }
    }
  }

  // pankou -> 净流入(优先)
  if (pankouRes && pankouRes.pankou) {
    const ni = parseFloat(pankouRes.pankou[5]);
    if (!isNaN(ni)) board.netInflow = ni;
  }

  updateBoardHeader(board);
  writePreviewCache();

  return cardData;
}

// ====================== Refresh logic ======================
async function refreshAll(options = {}) {
  if (state.refreshAllRunning && !options.force) return;
  const runId = ++state.refreshRunId;
  state.refreshAllRunning = true;
  beginBoardGridSettle();
  try {
    state.cardData = {};
    state.cardDetailLoads = {};
    state.usingSnapshot = false;
    const indexPromise = loadIndexInfo();
    await loadBoards();
    await indexPromise.catch(() => {});
    resetCountdown();
  } finally {
    if (runId === state.refreshRunId) {
      state.refreshAllRunning = false;
      endBoardGridSettle();
    }
  }
}

function updateManualRefreshButton() {
  const btn = document.getElementById('manual-refresh-btn');
  if (!btn) return;
  const remaining = Math.ceil((state.manualRefreshReadyAt - Date.now()) / 1000);
  const label = state.page === 'review' ? '⟳ 重新读取' : '⟳ 全量刷新';
  if (remaining > 0) {
    btn.disabled = true;
    btn.textContent = `⟳ ${remaining}s`;
  } else {
    btn.disabled = false;
    btn.textContent = label;
    if (state.manualRefreshTimer) {
      clearInterval(state.manualRefreshTimer);
      state.manualRefreshTimer = null;
    }
  }
}

function startManualRefreshCooldown() {
  state.manualRefreshReadyAt = Date.now() + MANUAL_REFRESH_COOLDOWN * 1000;
  updateManualRefreshButton();
  if (state.manualRefreshTimer) clearInterval(state.manualRefreshTimer);
  state.manualRefreshTimer = setInterval(updateManualRefreshButton, 250);
}

async function manualRefresh() {
  if (Date.now() < state.manualRefreshReadyAt) return;
  startManualRefreshCooldown();
  if (state.page === 'review') await refreshLimitupReviewPage();
  else await refreshAll({ force: true });
}

async function refreshLight() {
  if (state.refreshLightRunning || state.refreshAllRunning) return;
  state.refreshLightRunning = true;
  try {
    if (state.usingSnapshot) {
      document.getElementById('update-meta').textContent = `快照: ${state.date}`;
      return;
    }
    document.getElementById('update-meta').textContent = '自动刷新中...';
    await loadIndexInfo();
    for (const b of [...state.boards]) {
      await loadSinglePlateData(b);
      const card = document.getElementById(`card-${b.plateId}`);
      const data = state.cardData[b.plateId] || {};
      if (card?.classList.contains('expanded') || hasLoadedCardDetails(data)) {
        renderProgressiveCardContent(b.plateId, data);
      }
    }
    document.getElementById('update-meta').textContent = '更新: ' + formatTime(new Date());
  } finally {
    state.refreshLightRunning = false;
  }
}

function switchType(zs, btnEl) {
  state.loadSeq += 1;
  state.refreshAllRunning = false;
  state.refreshLightRunning = false;
  state.zsType = zs;
  document.querySelectorAll('.seg-btn[data-zs]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  refreshOpportunityBoardState();
  renderDeletedBoardsPanel();
  switchPage('dashboard', { refresh: false });
  state.boards = [];
  state.cardData = {};
  renderBoardSkeletons([], { filtering: true });
  refreshAll({ force: true });
}

function resetCountdown() {
  const sec = parseInt(document.getElementById('refresh-interval').value, 10) || 60;
  state.countdown = sec;
  updateCountdownDisplay();
}
function updateCountdownDisplay() {
  const countdownEl = document.getElementById('countdown');
  const autoEl = document.getElementById('auto-refresh');
  countdownEl.textContent = autoEl?.checked ? state.countdown + 's' : '待命';
}
async function tickCountdown() {
  if (state.page !== 'dashboard') {
    updateCountdownDisplay();
    return;
  }
  if (!document.getElementById('auto-refresh').checked) {
    updateCountdownDisplay();
    return;
  }
  if (state.refreshLightRunning) {
    document.getElementById('countdown').textContent = '刷新中';
    return;
  }
  state.countdown--;
  if (state.countdown <= 0) {
    document.getElementById('countdown').textContent = '刷新中';
    await refreshLight();
    resetCountdown();
  } else {
    updateCountdownDisplay();
  }
}

// ====================== Key modal ======================
function adminHeaders(extra = {}) {
  return state.adminToken ? { 'x-admin-token': state.adminToken, ...extra } : { ...extra };
}

function resetAccountState({ clearToken = false } = {}) {
  if (clearToken) {
    state.adminToken = '';
    localStorage.removeItem(ADMIN_TOKEN_STORAGE);
  }
  state.accountLoggedIn = false;
  state.accountName = '';
  state.accountRole = '';
  state.adminLoggedIn = false;
  state.adminName = '';
}

function syncSharedAccountSession() {
  if (state.accountLoggedIn && state.accountName) {
    localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify({
      name: state.accountName,
      admin: state.accountRole === 'admin' || !!state.adminLoggedIn,
    }));
    return;
  }
  localStorage.removeItem(AUTH_SESSION_KEY);
}

function updateAdminUi() {
  syncSharedAccountSession();
  const btn = document.getElementById('main-reason-sync-btn');
  if (btn) btn.classList.toggle('is-visible', !!state.adminLoggedIn);
  const syncStatus = document.getElementById('main-reason-sync-status');
  if (syncStatus) syncStatus.classList.toggle('is-visible', !!state.adminLoggedIn && !!syncStatus.textContent);
  const gear = document.querySelector('.topbar-gear');
  if (gear) gear.classList.toggle('is-visible', !!state.adminLoggedIn);
  const loginBtn = document.getElementById('admin-login-btn');
  if (loginBtn) loginBtn.classList.toggle('is-hidden', !!state.adminLoggedIn);
  const accountChip = document.getElementById('account-chip');
  if (accountChip) {
    if (state.accountLoggedIn) {
      const accountName = state.accountName || '账户';
      const accountRole = state.accountRole === 'admin' ? '管理员' : '用户';
      const avatarText = String(accountName).slice(0, 1).toUpperCase();
      accountChip.innerHTML = `
        <span class="account-chip-avatar">${escapeHTML(avatarText)}</span>
        <span class="account-chip-name">${escapeHTML(accountName)}</span>
        <span class="account-chip-role">${escapeHTML(accountRole)}</span>
      `;
      accountChip.title = `${accountName} · ${accountRole}`;
    } else {
      accountChip.textContent = '未登录 · 登录';
      accountChip.title = '登录';
    }
    accountChip.classList.toggle('is-logged-in', !!state.accountLoggedIn);
    accountChip.classList.toggle('is-admin', !!state.adminLoggedIn);
  }
  const cacheStatus = document.getElementById('cache-status');
  if (cacheStatus) {
    cacheStatus.classList.toggle('is-admin-action', !!state.adminLoggedIn);
    if (state.adminLoggedIn) {
      cacheStatus.setAttribute('role', 'button');
      cacheStatus.setAttribute('tabindex', '0');
      cacheStatus.onkeydown = handleJiuyangongsheAuthKey;
    } else {
      cacheStatus.removeAttribute('role');
      cacheStatus.removeAttribute('tabindex');
      cacheStatus.onkeydown = null;
    }
  }
  const keyConfigBlock = document.getElementById('key-config-block');
  if (keyConfigBlock) keyConfigBlock.style.display = state.adminLoggedIn ? 'block' : 'none';
  const keySaveBtn = document.getElementById('key-save-btn');
  if (keySaveBtn) keySaveBtn.style.display = state.adminLoggedIn ? 'inline-flex' : 'none';
  const adminUserInput = document.getElementById('admin-username-input');
  const adminPassInput = document.getElementById('admin-password-input');
  const adminLoginSubmit = document.querySelector('.admin-login-block button[onclick="loginAdmin()"]');
  const adminLogoutBtn = document.querySelector('.admin-login-block button[onclick="logoutAdmin()"]');
  if (adminUserInput) adminUserInput.style.display = state.accountLoggedIn ? 'none' : 'block';
  if (adminPassInput) adminPassInput.style.display = state.accountLoggedIn ? 'none' : 'block';
  if (adminLoginSubmit) adminLoginSubmit.style.display = state.accountLoggedIn ? 'none' : 'inline-flex';
  if (adminLogoutBtn) adminLogoutBtn.style.display = state.accountLoggedIn ? 'inline-flex' : 'none';
  document.body.classList.toggle('admin-logged-in', !!state.adminLoggedIn);
  const docsAddBtn = document.querySelector('.docs-add-card');
  if (docsAddBtn) docsAddBtn.style.display = state.adminLoggedIn ? 'inline-flex' : 'none';
  const status = document.getElementById('admin-status-text');
  if (status) {
    status.textContent = state.adminLoggedIn
      ? `${state.adminName || state.accountName || '账户'} 已登录，可同步主因库`
      : (state.accountLoggedIn ? `${state.accountName || '用户'} 已登录` : '未登录');
    status.style.color = state.adminLoggedIn ? 'rgba(189,255,210,0.92)' : 'var(--text-dim)';
  }
  renderDataHealthPanel();
  if (state.page === 'docs') renderDocsCards();
}

async function refreshAdminStatus() {
  if (!state.adminToken) {
    resetAccountState();
    updateAdminUi();
    return false;
  }
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/auth/me?_=${Date.now()}`, {
      cache: 'no-store',
      headers: adminHeaders(),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      resetAccountState({ clearToken: res.status === 401 || res.status === 403 });
      updateAdminUi();
      return false;
    }
    const user = data.user || null;
    state.accountLoggedIn = !!user;
    state.accountName = user?.username || '';
    state.accountRole = user?.role || '';
    state.adminLoggedIn = !!data.admin;
    state.adminName = user?.username || '';
    if (!user) {
      resetAccountState({ clearToken: true });
    }
  } catch {
    resetAccountState();
  }
  updateAdminUi();
  return !!state.adminLoggedIn;
}

async function loginAdmin() {
  const userInput = document.getElementById('admin-username-input');
  const passInput = document.getElementById('admin-password-input');
  const username = userInput?.value?.trim() || '';
  const password = passInput?.value?.trim() || '';
  if (!username || !password) {
    showError('请输入账号和密码');
    return;
  }
  try {
    const res = await fetch(`${KPL_STATS_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.token) throw new Error(data.error || `HTTP ${res.status}`);
    const user = data.user || {};
    state.adminToken = data.token;
    state.accountLoggedIn = true;
    state.accountName = user.username || data.username || username;
    state.accountRole = user.role || data.role || (data.admin ? 'admin' : 'user');
    state.adminLoggedIn = !!data.admin || state.accountRole === 'admin';
    state.adminName = state.adminLoggedIn ? (state.accountName || username) : '';
    localStorage.setItem(ADMIN_TOKEN_STORAGE, data.token);
    if (passInput) passInput.value = '';
    updateAdminUi();
    clearError();
    closeKeyModal();
  } catch (err) {
    showError(`登录失败：${err.message}`);
  }
}

function logoutAdmin() {
  state.adminToken = '';
  state.accountLoggedIn = false;
  state.accountName = '';
  state.accountRole = '';
  state.adminLoggedIn = false;
  state.adminName = '';
  localStorage.removeItem(ADMIN_TOKEN_STORAGE);
  localStorage.removeItem(AUTH_SESSION_KEY);
  updateAdminUi();
  closeKeyModal();
}

function goHome() {
  if (location.protocol === 'file:') {
    location.href = 'Qi/index.html';
    return;
  }
  location.href = '/';
}

async function syncMainReasonDb() {
  setMainReasonSyncStatus('正在校验管理员...', 'running');
  await refreshAdminStatus();
  if (!state.adminLoggedIn) {
    setMainReasonSyncStatus('', 'idle');
    openKeyModal();
    showError('请先登录有权限的账号');
    return;
  }
  const btn = document.getElementById('main-reason-sync-btn');
  const oldText = btn?.textContent || '同步';
  if (btn) {
    btn.disabled = true;
    btn.textContent = '检查中...';
  }
  try {
    const mainReasonSyncDays = 2;
    setMainReasonSyncStatus(`扫描近${mainReasonSyncDays}个交易日...`, 'running', `正在检查近${mainReasonSyncDays}个交易日未同步或不完整的主因库日期`);
    const res = await fetch(`${KPL_STATS_BASE}/api/limit-up-main-reason-db/sync?day=${encodeURIComponent(state.date)}&mode=missing&days=${mainReasonSyncDays}&_=${Date.now()}`, {
      cache: 'no-store',
      headers: adminHeaders(state.apiKey ? { 'x-api-key': state.apiKey } : {}),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      if (res.status === 401 || res.status === 403 || data.error === 'admin required') {
        resetAccountState({ clearToken: true });
        updateAdminUi();
        openKeyModal();
      }
      throw new Error(data.error === 'admin required' ? '登录已失效，请重新登录' : (data.error || `HTTP ${res.status}`));
    }
    const syncedDays = (data.days || []).filter(item => item.synced).map(item => item.day);
    const pendingDays = (data.days || []).filter(item => item.needsSync && !item.synced).map(item => item.day);
    const scanned = data.scanned ?? data.checkedDays ?? '--';
    const synced = data.synced ?? syncedDays.length;
    const pending = data.pending ?? pendingDays.length;
    const detail = (data.days || []).map(item => {
      const stateText = item.synced ? '已同步' : (item.needsSync ? '待处理' : '已完整');
      const countText = Number(item.mainReasonCount ?? item.count);
      return `${item.day}: ${stateText}${Number.isFinite(countText) ? ` ${countText}只` : ''}${item.error ? ` · ${item.error}` : ''}`;
    }).join('\n');
    setMainReasonSyncStatus(
      `完成：扫${scanned}日，同步${synced}，待${pending}`,
      pending ? 'running' : 'ok',
      `主因库检查完成\n扫描交易日：${scanned}\n已同步：${synced}\n仍待处理：${pending}${syncedDays.length ? `\n同步日期：${syncedDays.join('、')}` : ''}${pendingDays.length ? `\n待处理：${pendingDays.join('、')}` : ''}\n规则：${data.ruleVersion || '--'}${detail ? `\n\n${detail}` : ''}`
    );
    if (state.page === 'review') refreshLimitupReviewPage();
    refreshJiuyangongsheAuthStatus();
    refreshAfterCloseStatus();
  } catch (err) {
    setMainReasonSyncStatus(`失败：${err.message}`, 'error', err.message || String(err));
    showError(`主因库同步失败：${err.message}`);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = oldText;
    }
  }
}

function openKeyModal() {
  document.getElementById('key-input').value = state.apiKey;
  refreshAdminStatus();
  document.getElementById('key-modal').classList.add('show');
}
function closeKeyModal() {
  document.getElementById('key-modal').classList.remove('show');
}
function saveKey() {
  if (!state.adminLoggedIn) {
    showError('请先登录有权限的账号再保存 API Key');
    return;
  }
  const v = document.getElementById('key-input').value.trim();
  if (!v) return;
  state.apiKey = v;
  localStorage.setItem(KEY_STORAGE, v);
  closeKeyModal();
  if (state.page === 'review') refreshLimitupReviewPage();
  else refreshAll();
}

function openDatePicker() {
  const picker = document.getElementById('date-picker');
  if (!picker) return;
  try {
    if (typeof picker.showPicker === 'function') {
      picker.showPicker();
      return;
    }
  } catch {}
  picker.focus();
}

function normalizeDocsCards(cards, fallbackToDefault = true) {
  if (!Array.isArray(cards)) return fallbackToDefault ? DEFAULT_DOCS_CARDS.map(card => ({ ...card })) : [];
  const normalized = cards
    .map((card, index) => {
      if (typeof card === 'string') {
        return {
          id: `doc-${index}`,
          tone: index === 0 ? 'primary' : 'long',
          text: card,
        };
      }
      const text = String(card?.text ?? '').trimEnd();
      return {
        id: String(card?.id || `doc-${index}-${Date.now()}`),
        tone: card?.tone === 'primary' ? 'primary' : 'long',
        text,
      };
    })
    .filter(Boolean);
  return normalized.length ? normalized : (fallbackToDefault ? DEFAULT_DOCS_CARDS.map(card => ({ ...card })) : []);
}

function getDocsCards() {
  try {
    const raw = localStorage.getItem(DOCS_CARDS_STORAGE);
    if (raw === null) return DEFAULT_DOCS_CARDS.map(card => ({ ...card }));
    return normalizeDocsCards(JSON.parse(raw), false);
  } catch {
    return DEFAULT_DOCS_CARDS.map(card => ({ ...card }));
  }
}

function saveDocsCards(cards) {
  localStorage.setItem(DOCS_CARDS_STORAGE, JSON.stringify(normalizeDocsCards(cards, false)));
}

function resizeDocsEditor(editor) {
  if (!editor) return;
  editor.style.height = 'auto';
  editor.style.height = `${editor.scrollHeight}px`;
}

function handleDocsInput(editor) {
  if (!state.adminLoggedIn) return;
  const cards = getDocsCards();
  const id = editor.dataset.docId;
  const target = cards.find(card => card.id === id);
  if (target) {
    target.text = editor.value;
    saveDocsCards(cards);
  }
  resizeDocsEditor(editor);
}

function renderDocsCards() {
  const stack = document.getElementById('docs-stack');
  if (!stack) return;
  const cards = getDocsCards();
  const canEdit = !!state.adminLoggedIn;
  stack.innerHTML = cards.map((card, index) => {
    const toneClass = card.tone === 'primary' || index === 0 ? 'docs-card-primary' : 'docs-card-long';
    return `
      <section class="docs-card ${toneClass}" data-doc-id="${escapeHTML(card.id)}">
        ${canEdit ? `<button class="docs-card-delete" type="button" title="删除卡片" aria-label="删除文档卡片" data-doc-id="${escapeHTML(card.id)}">&times;</button>` : ''}
        <textarea class="docs-editor" data-doc-id="${escapeHTML(card.id)}" spellcheck="false" aria-label="文档卡片" ${canEdit ? '' : 'readonly'}>${escapeHTML(card.text)}</textarea>
      </section>
    `;
  }).join('');
  stack.querySelectorAll('.docs-editor').forEach(editor => {
    editor.addEventListener('input', () => handleDocsInput(editor));
    resizeDocsEditor(editor);
  });
  stack.querySelectorAll('.docs-card-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteDocsCard(btn));
  });
}

function addDocsCard() {
  if (!state.adminLoggedIn) {
    openKeyModal();
    showError('请先登录有权限的账号再修改文档');
    return;
  }
  const cards = getDocsCards();
  const card = {
    id: `doc-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    tone: 'long',
    text: '',
  };
  cards.push(card);
  saveDocsCards(cards);
  renderDocsCards();
  requestAnimationFrame(() => {
    const editor = document.querySelector(`.docs-editor[data-doc-id="${CSS.escape(card.id)}"]`);
    if (editor) {
      editor.focus();
      resizeDocsEditor(editor);
    }
  });
}

function deleteDocsCard(btnOrId) {
  if (!state.adminLoggedIn) {
    openKeyModal();
    showError('请先登录有权限的账号再修改文档');
    return;
  }
  const id = typeof btnOrId === 'string' ? btnOrId : btnOrId?.dataset?.docId;
  if (!id) return;
  if (!confirm('删除这张文档卡片？')) return;
  const cards = getDocsCards().filter(card => card.id !== id);
  saveDocsCards(cards);
  renderDocsCards();
}

window.addDocsCard = addDocsCard;
window.deleteDocsCard = deleteDocsCard;
window.handleDocsInput = handleDocsInput;
window.renderDocsCards = renderDocsCards;

function switchPage(page, options = {}) {
  const nextPage = page === 'docs' || page === 'review' ? page : 'dashboard';
  const pushHash = options.pushHash !== false;
  const shouldRefresh = options.refresh !== false;
  state.page = nextPage;
  document.body.classList.toggle('view-docs', nextPage === 'docs');
  document.body.classList.toggle('view-review', nextPage === 'review');
  document.querySelectorAll('.nav-item[data-page]').forEach(item => {
    item.classList.toggle('active', item.dataset.page === nextPage);
  });
  const titleEl = document.querySelector('.page-title');
  if (titleEl) {
    titleEl.textContent = nextPage === 'review' ? '涨停复盘' : (nextPage === 'docs' ? '文档' : '强势板块');
  }
  updateManualRefreshButton();
  if (pushHash) {
    const targetHash = nextPage === 'docs' ? '#docs' : (nextPage === 'review' ? '#review' : '#dashboard');
    if (location.hash !== targetHash) location.hash = targetHash;
  }
  if (nextPage === 'docs') renderDocsCards();
  if (nextPage === 'review' && shouldRefresh) refreshLimitupReviewPage();
  if (nextPage === 'dashboard' && shouldRefresh && !state.boards.length) {
    refreshAll();
  }
}

datePicker.value = state.date;
datePicker.addEventListener('click', () => openDatePicker());
document.querySelector('.date-field-mark')?.addEventListener('click', event => {
  event.preventDefault();
  event.stopPropagation();
  openDatePicker();
});
datePicker.addEventListener('change', e => {
  state.date = e.target.value;
  state.reviewSelectedTopic = '';
  state.reviewSearchTerm = '';
  refreshOpportunityBoardState();
  refreshAfterCloseStatus();
  refreshJiuyangongsheAuthStatus();

  else refreshAll({ force: true });
});
document.getElementById('refresh-interval').addEventListener('change', resetCountdown);
const autoRefreshInput = document.getElementById('auto-refresh');
autoRefreshInput.checked = localStorage.getItem(AUTO_REFRESH_STORAGE) === '1';
autoRefreshInput.addEventListener('change', event => {
  localStorage.setItem(AUTO_REFRESH_STORAGE, event.target.checked ? '1' : '0');
  resetCountdown();
});
document.querySelector('.docs-add-card')?.addEventListener('click', addDocsCard);
window.addEventListener('hashchange', () => {
  switchPage(pageFromHash(), { pushHash: false, refresh: false });
});
switchPage(state.page, { pushHash: false, refresh: false });
refreshOpportunityBoardState();
refreshAfterCloseStatus();
refreshJiuyangongsheAuthStatus();
refreshAdminStatus();

if (state.page === 'docs') {
  syncAllPermanentHiddenBoards().catch(() => {});
  loadIndexInfo().catch(() => {});
} else if (state.page === 'review') {
  syncAllPermanentHiddenBoards().catch(() => {});
  loadIndexInfo().catch(() => {});
  refreshLimitupReviewPage();
} else {
  syncAllPermanentHiddenBoards().catch(() => {});
  refreshAll();
}

state.countdownTimer = setInterval(tickCountdown, 1000);
